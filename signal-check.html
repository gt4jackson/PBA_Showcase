<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Check — PBA Showcase</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ETS 2024 Rebrand Palette */
  --bg: #f2e9d8;
  --surface: #ffffff;
  --text: #1a212b;
  --text-secondary: #4a4740;
  --text-tertiary: #7e7a72;
  --border: rgba(26,33,43,0.1);
  --border-strong: rgba(26,33,43,0.2);
  --accent: #4dd3fe;
  --accent-dark: #103d4b;
  --accent-light: rgba(77,211,254,0.1);
  --periwinkle: #9e9eff;
  --ets-dark: #1a212b;
  --ets-cream: #f2e9d8;
  --ets-teal: #103d4b;
  --ets-green: #468254;
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Beausite Classic', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  background: var(--ets-dark);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 24px;
}

/* ── BACK NAV ──────────────────────────────── */
.back-link {
  position: fixed;
  top: 20px;
  left: 20px;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 50;
  transition: color 0.15s;
}

.back-link:hover { color: #fff; }

/* ── INFO TOGGLE ───────────────────────────── */
.info-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 50;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s;
}

.info-toggle:hover { background: rgba(255,255,255,0.2); }

/* ── CONSTRUCT BANNER ──────────────────────── */
.construct-banner {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(26,33,43,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(242,233,216,0.1);
  border-radius: 12px;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 50;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  max-width: 90vw;
  transition: opacity 0.3s;
}

.construct-banner-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.construct-banner-name {
  font-weight: 600;
  color: rgba(255,255,255,0.9);
}

.construct-banner-expand {
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  font-size: 12px;
  text-decoration: underline;
  font-family: inherit;
  white-space: nowrap;
}

.construct-banner-expand:hover { color: rgba(255,255,255,0.8); }

.construct-banner.hidden { opacity: 0; pointer-events: none; }

/* ── PHONE FRAME ───────────────────────────── */
.phone-wrap { width: 390px; position: relative; }

.phone-frame {
  width: 390px;
  height: 844px;
  border-radius: 50px;
  background: var(--ets-dark);
  box-shadow:
    0 0 0 3px #2a2a2a,
    0 0 0 6px #1a1a1a,
    0 0 0 9px #333,
    0 50px 100px rgba(0,0,0,0.6),
    0 20px 40px rgba(0,0,0,0.4);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── STATUS BAR ────────────────────────────── */
.status-bar {
  background: #242e3d;
  padding: 14px 20px 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  z-index: 2;
}

.status-time { font-size: 15px; font-weight: 600; color: var(--ets-cream); letter-spacing: -0.3px; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { fill: var(--ets-cream); color: var(--ets-cream); }

/* ── CHAT HEADER ───────────────────────────── */
.chat-header {
  background: rgba(36,46,61,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid rgba(242,233,216,0.1);
  padding: 8px 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  z-index: 2;
}

.header-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--periwinkle) 100%);
  color: var(--ets-dark);
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.header-info { flex: 1; padding-left: 6px; }
.header-name { font-size: 17px; font-weight: 600; color: var(--ets-cream); line-height: 1.2; }
.header-status-row { display: flex; align-items: center; gap: 4px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ets-green); flex-shrink: 0; }
.header-status { font-size: 12px; color: var(--text-tertiary); }

/* ── CHAT BODY ─────────────────────────────── */
.chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
  background: var(--ets-dark);
}

.chat-body::-webkit-scrollbar { width: 0; }

.timestamp { text-align: center; font-size: 12px; color: var(--text-tertiary); margin: 10px 0 6px; }

.msg-row { display: flex; align-items: flex-end; gap: 6px; margin: 1px 0; }
.msg-row.received { justify-content: flex-start; }
.msg-row.sent { justify-content: flex-end; }

.msg-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--periwinkle) 100%);
  color: var(--ets-dark); font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-bottom: 2px;
}

.bubble {
  max-width: 72%; padding: 9px 14px; font-size: 16px; line-height: 1.4; word-break: break-word;
  animation: bubbleIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0;
}

.bubble.gray { background: #2c3849; color: var(--ets-cream); border-radius: 18px 18px 18px 4px; }
.bubble.blue { background: var(--accent); color: var(--ets-dark); border-radius: 18px 18px 4px 18px; margin-left: auto; }

@keyframes bubbleIn {
  from { opacity: 0; transform: scale(0.88) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── TYPING INDICATOR ──────────────────────── */
.typing-row { display: flex; align-items: flex-end; gap: 6px; margin: 2px 0; }
.typing-bubble {
  background: #2c3849; border-radius: 18px 18px 18px 4px; padding: 12px 16px;
  display: flex; gap: 5px; align-items: center;
  animation: bubbleIn 0.2s ease-out forwards;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary);
  animation: typingBounce 1.3s infinite ease-in-out;
}
.typing-dot:nth-child(1) { animation-delay: 0s; }
.typing-dot:nth-child(2) { animation-delay: 0.18s; }
.typing-dot:nth-child(3) { animation-delay: 0.36s; }

@keyframes typingBounce {
  0%, 55%, 100% { transform: translateY(0); opacity: 0.5; }
  27% { transform: translateY(-7px); opacity: 1; }
}

/* ── INPUT BAR ─────────────────────────────── */
.input-bar {
  padding: 10px 12px 30px;
  background: rgba(36,46,61,0.97);
  backdrop-filter: blur(20px);
  border-top: 0.5px solid rgba(242,233,216,0.1);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0; z-index: 2;
}

.input-field {
  flex: 1; border: 1.5px solid rgba(242,233,216,0.15); border-radius: 20px;
  padding: 8px 14px; font-size: 16px; font-family: inherit; outline: none;
  background: #1a212b; color: var(--ets-cream); transition: border-color 0.15s;
}
.input-field:focus { border-color: var(--accent); }
.input-field:disabled { background: #242e3d; color: var(--text-tertiary); cursor: not-allowed; }
.input-field::placeholder { color: var(--text-tertiary); }

.send-btn {
  width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0.35; transition: opacity 0.15s, transform 0.1s; flex-shrink: 0;
}
.send-btn.active { opacity: 1; }
.send-btn:active { transform: scale(0.92); }
.send-btn svg { fill: var(--ets-dark); color: var(--ets-dark); }

/* ── RESULTS OVERLAY ───────────────────────── */
.results-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #1a212b 0%, #103d4b 50%, #1a212b 100%);
  transform: translateY(100%);
  transition: transform 0.55s cubic-bezier(0.34, 1.2, 0.64, 1);
  overflow-y: auto; z-index: 10;
  display: flex; flex-direction: column;
}
.results-overlay.visible { transform: translateY(0); }
.results-overlay::-webkit-scrollbar { width: 0; }

.results-header { padding: 50px 24px 20px; text-align: center; }
.results-title { font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.results-from { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 24px; }
.result-animation-area { font-size: 48px; margin-bottom: 16px; min-height: 60px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.overall-score-big { font-size: 72px; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #4dd3fe, #9e9eff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.overall-label { font-size: 15px; color: rgba(255,255,255,0.7); max-width: 260px; margin: 0 auto 24px; line-height: 1.4; }

.results-body { padding: 0 16px 40px; display: flex; flex-direction: column; gap: 10px; }

.score-card {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 14px 18px;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.score-card.visible { opacity: 1; transform: translateY(0); }
.score-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.score-card-name { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.85); }
.score-card-pct { font-size: 20px; font-weight: 700; color: #fff; }
.score-card-desc { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 10px; line-height: 1.4; }
.score-bar-track { height: 5px; background: rgba(255,255,255,0.12); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 1.1s cubic-bezier(0.25, 1, 0.5, 1); }

/* Dynamic fill colors — set via JS from construct pack */

#confettiCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
.thumbs-emoji { display: inline-block; font-size: 48px; animation: thumbBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
.thumbs-emoji:nth-child(1) { animation-delay: 0.1s; }
.thumbs-emoji:nth-child(2) { animation-delay: 0.3s; }
@keyframes thumbBounce { from { opacity: 0; transform: scale(0) rotate(-20deg); } to { opacity: 1; transform: scale(1) rotate(0deg); } }
.broken-emoji { display: inline-block; font-size: 30px; opacity: 0; animation: brokenDrop 0.5s ease-out forwards; }
.broken-emoji:nth-child(1) { animation-delay: 0.0s; font-size: 40px; }
.broken-emoji:nth-child(2) { animation-delay: 0.15s; }
.broken-emoji:nth-child(3) { animation-delay: 0.3s; }
.broken-emoji:nth-child(4) { animation-delay: 0.45s; font-size: 24px; }
.broken-emoji:nth-child(5) { animation-delay: 0.6s; font-size: 24px; }
@keyframes brokenDrop { from { opacity: 0; transform: translateY(-30px) rotate(15deg); } to { opacity: 1; transform: translateY(0) rotate(0deg); } }

/* ── INFO SIDE PANEL ───────────────────────── */
.side-info {
  position: fixed; top: 0; right: 0; width: min(420px, 90vw); height: 100vh;
  background: #242e3d; z-index: 60;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 30px rgba(0,0,0,0.4);
}
.side-info.open { transform: translateX(0); }

.side-info-header {
  padding: 20px 24px; border-bottom: 1px solid rgba(242,233,216,0.08);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.side-info-header h2 { font-size: 16px; font-weight: 600; color: var(--ets-cream); font-family: 'Speckless', Georgia, 'Times New Roman', serif; }
.side-close {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: rgba(242,233,216,0.08); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text-tertiary);
}
.side-close:hover { background: rgba(242,233,216,0.15); }

.side-info-body { flex: 1; overflow-y: auto; padding: 24px; color: var(--ets-cream); }
.side-info-body::-webkit-scrollbar { width: 5px; }
.side-info-body::-webkit-scrollbar-thumb { background: rgba(242,233,216,0.15); border-radius: 3px; }
.info-tabs { display: flex; gap: 1px; border-bottom: 1px solid rgba(242,233,216,0.1); margin-bottom: 20px; }
.info-tab { background: none; border: none; color: rgba(242,233,216,0.45); font-size: 12px; font-weight: 500; cursor: pointer; padding: 8px 12px; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.info-tab:hover { color: var(--ets-cream); }
.info-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.info-tab-pane { display: none; }
.info-tab-pane.active { display: block; }
.json-viewer { font-size: 11px; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; white-space: pre-wrap; word-break: break-word; color: var(--accent); background: rgba(0,0,0,0.3); border: 1px solid rgba(77,211,254,0.15); border-radius: 6px; padding: 12px; line-height: 1.5; }
.side-info-body h3 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: var(--ets-cream); font-family: 'Speckless', Georgia, 'Times New Roman', serif; }
.side-info-body h3:first-child { margin-top: 0; }
.side-info-body p { font-size: 13px; color: #b8b0a0; line-height: 1.7; margin-bottom: 10px; }
.side-info-body .si-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-bottom: 14px; }
.side-info-body .si-table th { text-align: left; font-weight: 600; padding: 6px 8px; background: var(--ets-dark); border-bottom: 1px solid rgba(242,233,216,0.08); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #b8b0a0; }
.side-info-body .si-table td { padding: 6px 8px; border-bottom: 1px solid rgba(242,233,216,0.08); color: #b8b0a0; }
.side-info-body .si-table td:first-child { font-weight: 500; color: var(--ets-cream); }
.si-callout { background: rgba(77,211,254,0.08); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; margin: 12px 0; font-size: 12px; color: var(--ets-cream); line-height: 1.6; }

.side-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 55;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.side-overlay.open { opacity: 1; pointer-events: auto; }

/* ── RESPONSIVE ────────────────────────────── */
@media (max-width: 430px) {
  body { padding: 0; align-items: flex-start; background: var(--ets-dark); }
  .phone-wrap { width: 100%; }
  .phone-frame { width: 100%; height: 100dvh; border-radius: 0; box-shadow: none; }
  .back-link { top: auto; bottom: 8px; left: 8px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 8px; }
  .construct-banner { display: none; }
}

/* ── SC WELCOME OVERLAY ─────────────────────── */
.sc-welcome {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 1; transition: opacity 0.35s;
}
.sc-welcome.hidden { opacity: 0; pointer-events: none; }
.sc-welcome-card {
  background: var(--surface); border-radius: 20px;
  padding: 40px 36px 32px; max-width: 420px; width: 90%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  text-align: center; position: relative;
}
.sc-welcome-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #2aa3c8);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: var(--ets-dark);
  margin-bottom: 4px;
}
.sc-welcome-title {
  font-size: 20px; font-weight: 700; color: var(--ets-cream); line-height: 1.3;
}
.sc-welcome-sub {
  font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 320px;
}
.sc-welcome-construct {
  background: rgba(77,211,254,0.1); border: 1px solid rgba(77,211,254,0.3);
  border-radius: 8px; padding: 10px 16px; font-size: 13px;
  color: var(--accent); width: 100%;
}
.sc-tut-toggle {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text-secondary); cursor: pointer;
  margin-top: 4px;
}
.sc-tut-toggle input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
}
.sc-welcome-start {
  margin-top: 8px; padding: 13px 36px;
  background: var(--accent); color: var(--ets-dark);
  border: none; border-radius: 12px; font-size: 15px;
  font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  width: 100%;
}
.sc-welcome-start:hover { opacity: 0.88; }

/* ── TUTORIAL SYSTEM ────────────────────────── */
.tut-dim {
  position: fixed; background: rgba(0,0,0,0.72);
  z-index: 300; pointer-events: auto; transition: all 0.3s ease;
}
.tut-ring {
  position: fixed; border: 2.5px solid var(--accent);
  border-radius: 12px; z-index: 301; pointer-events: none;
  box-shadow: 0 0 0 4px rgba(77,211,254,0.18);
  transition: all 0.3s ease;
}
.tut-card {
  position: fixed; z-index: 302;
  background: var(--surface); border: 1px solid rgba(77,211,254,0.35);
  border-radius: 14px; padding: 16px 18px; max-width: 280px; min-width: 220px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.55);
  transition: all 0.3s ease;
}
.tut-step-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 6px;
}
.tut-card-title { font-size: 14px; font-weight: 700; color: var(--ets-cream); margin-bottom: 6px; }
.tut-card-body  { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }
.tut-card-footer { display: flex; align-items: center; justify-content: space-between; }
.tut-skip { font-size: 11px; color: var(--text-tertiary); cursor: pointer; background: none; border: none; padding: 0; }
.tut-skip:hover { color: var(--text-secondary); }
.tut-next {
  padding: 7px 18px; background: var(--accent); color: var(--ets-dark);
  border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
}
.tut-next:hover { opacity: 0.88; }

/* ── Version indicator ── */
.version-badge {
  font-size: 10px;
  color: rgba(242,233,216,0.3);
  font-family: 'Courier New', monospace;
  letter-spacing: 0.05em;
  position: fixed;
  bottom: 8px;
  right: 12px;
  z-index: 100;
  pointer-events: none;
  user-select: none;
}
</style>
</head>
<body>

<a class="back-link" href="index.html">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back to Showcase
</a>

<!-- SC WELCOME OVERLAY -->
<div class="sc-welcome" id="scWelcome">
  <div class="sc-welcome-card">
    <div class="sc-welcome-avatar" id="welcomeAvatar">R</div>
    <div class="sc-welcome-title" id="welcomeTitle">Signal Check</div>
    <div class="sc-welcome-sub" id="welcomeSub">You'll have a short conversation with an AI persona who will ask you questions to assess your knowledge and reasoning.</div>
    <div class="sc-welcome-construct" id="welcomeConstruct">Assessing: AI Literacy</div>
    <label class="sc-tut-toggle">
      <input type="checkbox" id="scTutEnabled" />
      Show guided tour first
    </label>
    <button class="sc-welcome-start" onclick="startFromWelcome()">Start Chat →</button>
  </div>

/* ═══════════════════════════════════════════════════════════════

const TYPING_MIN   = 700;
const TYPING_MAX   = 2800;

// ── UTILS ──
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function typingDuration(text) { return Math.min(TYPING_MAX, Math.max(TYPING_MIN, text.length * TYPING_SPEED)); }
function getTimeString() { const n = new Date(); let h = n.getHours(); const m = n.getMinutes().toString().padStart(2,'0'); const a = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${m} ${a}`; }
function updateStatusTime() { const n = new Date(); statusTimeEl.textContent = `${(n.getHours()%12||12)}:${n.getMinutes().toString().padStart(2,'0')}`; }

function scrollToBottom() { requestAnimationFrame(() => { chatBody.scrollTop = chatBody.scrollHeight; }); }

// ── EVIDENCE LOGGER ──
function logEvidence(event, data) {
  STATE.evidence.push({
    event,
    timestamp: Date.now(),
    elapsed_ms: STATE.taskStartTime ? Date.now() - STATE.taskStartTime : 0,
    data
  });
}

// ── GENERIC SCORER ──
function scoreResponse(text, scorerSpec) {
  if (!scorerSpec) return 0;
  const T = text.toLowerCase();

  if (scorerSpec.type === 'keyword_count') {
    const count = scorerSpec.keywords.filter(w => T.includes(w)).length;
    if (scorerSpec.neg && scorerSpec.neg.some(w => T.includes(w)) && T.length < (scorerSpec.neg_length || 20)) return 0;
    if (count >= scorerSpec.threshold_high) return 2;
    if (count >= scorerSpec.threshold_mid) return 1;
    return T.length > (scorerSpec.length_mid || 30) ? 1 : 0;
  }

  // Default: keyword type
  const hasHigh = scorerSpec.high && scorerSpec.high.some(w => T.includes(w));
  const hasMid  = scorerSpec.mid  && scorerSpec.mid.some(w => T.includes(w));
  const hasLow  = scorerSpec.low  && scorerSpec.low.some(w => T.includes(w));

  if (hasLow && T.length < (scorerSpec.low_max_length || 999)) return 0;
  if (hasHigh) {
    if (scorerSpec.high_requires_length && T.length < scorerSpec.high_requires_length) return 1;
    return 2;
  }
  if (hasMid) return 1;
  if (scorerSpec.length_high && T.length > scorerSpec.length_high) return 2;
  if (T.length > (scorerSpec.length_mid || 999)) return 1;
  return 0;
}

  const el = document.createElement('div');

}

  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${type === 'persona' ? 'gray' : 'blue'}`;
  bubble.textContent = text;
  row.appendChild(bubble);
  chatBody.appendChild(row);
  STATE.msgCount++;
  if (STATE.msgCount % 7 === 0) addTimestamp();
  scrollToBottom();
}

let typingEl = null;
function showTypingIndicator() {
  if (typingEl) return;
  const row = document.createElement('div');
  row.className = 'typing-row';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = PACK.persona.avatar_letter;
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(av);
  row.appendChild(bubble);
  chatBody.appendChild(row);
  typingEl = row;
  scrollToBottom();
}

function hideTypingIndicator() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// ── MESSAGE QUEUE ──
function enqueue(item) { STATE.queue.push(item); }
function enqueuePersonaMessage(text, preDelay = 500) {
  enqueue({ type: 'delay', ms: preDelay });
  enqueue({ type: 'typing_start' });
  enqueue({ type: 'delay', ms: typingDuration(text) });
  enqueue({ type: 'typing_end', text });
}

function drainQueue() {
  if (STATE.draining) return;
  STATE.draining = true;
  processNext();
}

function processNext() {
  if (STATE.queue.length === 0) { STATE.draining = false; return; }
  const item = STATE.queue.shift();
  switch (item.type) {
    case 'delay': setTimeout(processNext, item.ms); break;
    case 'typing_start': showTypingIndicator(); processNext(); break;
    case 'typing_end': hideTypingIndicator(); renderBubble(item.text, 'persona'); processNext(); break;
    case 'unlock_input': unlockInput(); STATE.draining = false; break;
    case 'show_results': setTimeout(showResults, 1200); STATE.draining = false; break;
    default: processNext();
  }
}

// ── INPUT ──
function lockInput() { inputField.disabled = true; sendBtn.disabled = true; sendBtn.classList.remove('active'); }
function unlockInput() { inputField.disabled = false; sendBtn.disabled = false; inputField.focus(); STATE.phase = 'WAITING'; }

// ── OFF-TOPIC DETECTION ──────────────────────────────────────────────────────

const OFF_TOPIC_FOOD = [
  'steak','porterhouse','ribeye','burger','pizza','taco','burrito','sushi',
  'sandwich','pasta','salad','chicken','salmon','lobster','shrimp','ramen',
  'lunch','dinner','breakfast','brunch','snack','dessert','cake','cookie',
  'hungry','starving','hangry','restaurant','menu','waiter','chef','recipe',
  'donut','bagel','coffee','beer','wine','cocktail','whiskey','vodka'
];
const OFF_TOPIC_RANDOM = [
  'weather','raining','sunny','hot outside','cold outside',
  'sports','football','baseball','basketball','soccer','nfl','nba','mlb',
  'movie','netflix','tv show','episode','season','streaming','spotify',
  'tired','sleepy','exhausted','bored','distracted',
  'traffic','commute','parking','uber','lyft',
  'weekend','vacation','holiday','trip','travel',
  'my dog','my cat','my kid','my boss','my friend',
  'instagram','tiktok','twitter','social media','going viral'
];
const EVASIVE_PATTERNS = [
  /^(skip|pass|next|nope|nah|na|n\/a|idk|dunno|no idea|no clue)\.?$/i,
  /^i (don'?t|do not) (know|care|have a clue|want to)/i,
  /^(whatever|who cares|doesn'?t matter|not relevant|this is dumb|this is boring)/i,
  /^(can we skip|can i skip|just skip|move on|next question)/i,
];

// Redirect message banks — casual, in-persona voice
const REDIRECTS = {
  too_short: [
    "ha, that's brief! 😄 can you give me a little more to work with?",
    "okay but i need more than that — what do you actually think?",
    "come on, i know you've got more to say than that 😄",
  ],
  evasive: [
    "no wrong answers here, i promise! just tell me what comes to mind.",
    "seriously, whatever you think is fine — i'm just curious about your take.",
    "don't overthink it! share your honest thoughts and we'll roll with it. 😊",
  ],
  gibberish: [
    "okay i think your keyboard got away from you there 😂 want to try again?",
    "...i'm gonna need that in actual words 😄 give it another shot!",
    "lol did your cat walk across the keyboard? try that again for real.",
  ],
  off_topic: [
    "haha okay i appreciate the vibe, but let's stay on track 😄 back to my question —",
    "lol you're trying to distract me! but seriously though —",
    "ha! love the energy but let's circle back — what do you actually think about",
  ],
};
const REDIRECT_GIVE_UP = [
  "okay, i'll let that one slide 😄 let's keep it moving!",
  "fair enough, we'll move on! next one —",
  "alright, i'll take it 😄 moving on...",
];

function detectOffTopic(text) {
  const T = text.trim();
  const lower = T.toLowerCase();
  const words = T.split(/\s+/).filter(w => w.length > 0);

  // Single-word responses
  if (words.length === 1) return 'too_short';

  // Gibberish: no vowels at all, OR 5+ repeated chars
  if (words.length <= 4 && !/[aeiou]/i.test(T)) return 'gibberish';
  if (/(.)\1{4,}/.test(T)) return 'gibberish';

  // Evasive patterns
  if (EVASIVE_PATTERNS.some(p => p.test(T))) return 'evasive';

  // Food & drink
  if (OFF_TOPIC_FOOD.some(w => lower.includes(w))) return 'off_topic';

  // Random life topics
  if (OFF_TOPIC_RANDOM.some(w => lower.includes(w))) return 'off_topic';

  return null;
}

// ── INPUT ────────────────────────────────────────────────────────────────────

async function onUserSend() {
  const text = inputField.value.trim();
  if (!text || STATE.phase !== 'WAITING') return;
  lockInput();
  renderBubble(text, 'user');
  inputField.value = '';
  STATE.phase = 'THINKING';

  const q = PACK.questions[STATE.qIndex];

  // ── OFF-TOPIC CHECK ───────────────────────────────────────────────
  const offType = detectOffTopic(text);
  if (offType && STATE.redirectCount < 2) {
    STATE.redirectCount++;
    const bank = REDIRECTS[offType];
    let msg = pick(bank);
    // For clearly off-topic, append a shortened re-ask
    if (offType === 'off_topic') {
      const questionText = Array.isArray(q.messages) ? q.messages[0] : q.messages;
      // Trim to first sentence so it's not too long
      const shortQ = questionText.split(/[.!?]/)[0].trim();
      msg = msg + ' ' + shortQ + '?';
    }
    logEvidence('off_topic_redirect', { type: offType, response_text: text, redirect_count: STATE.redirectCount });
    enqueuePersonaMessage(msg, 400);
    enqueue({ type: 'unlock_input' });
    drainQueue();
    return;
  }
  if (offType && STATE.redirectCount >= 2) {
    // Gave it two chances — accept gracefully and move on
    enqueuePersonaMessage(pick(REDIRECT_GIVE_UP), 300);
    STATE.redirectCount = 0;
    STATE.qIndex++;
    if (STATE.qIndex < PACK.questions.length) {
      const nextMsg = pick(PACK.questions[STATE.qIndex].messages);
      STATE.history.push({ role: 'assistant', content: nextMsg });
      enqueuePersonaMessage(nextMsg, 500);
      enqueue({ type: 'unlock_input' });
    } else {
      enqueue({ type: 'show_results' });
    }
    drainQueue();
    return;
  }
  // Valid response — reset redirect counter
  STATE.redirectCount = 0;
  // ─────────────────────────────────────────────────────────────────

  // Add user message to history before calling LLM
  STATE.history.push({ role: 'user', content: text });

  // Show typing indicator immediately while we wait for LLM
  showTypingIndicator();
  scrollToBottom();

  // ── CALL LLM ──────────────────────────────────────────────────────
  let llmResult = null;
  try {
    const resp = await fetch('/api/score', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        persona: PACK.persona,
        construct: PACK.construct_name,
        question: {
          text: Array.isArray(q.messages) ? q.messages[0] : q.messages,
          dimension: q.dimension,
          scorer: q.scorer,
        },
        history: STATE.history.slice(-12), // last 12 msgs for context
        followUpCount: STATE.inFollowUp ? 1 : 0,
      }),
    });
    if (resp.ok) {
      const data = await resp.json();
      if (!data.error) llmResult = data;
    }
  } catch (e) {
    console.warn('LLM scoring unavailable, using local fallback:', e.message);
  }
  // ──────────────────────────────────────────────────────────────────

  hideTypingIndicator();

  // Score: use LLM score if available, else local keyword scorer
  const score = llmResult
    ? Math.max(0, Math.min(2, parseInt(llmResult.score) || 0))
    : scoreResponse(text, q.scorer);

  // Only accumulate dimension score on the initial answer (not follow-up)
  if (!STATE.inFollowUp && q.dimension) {
    STATE.scores[q.dimension] = (STATE.scores[q.dimension] || 0) + score;
  }

  // Log rich evidence
  logEvidence('user_response', {
    question_id: q.id,
    dimension: q.dimension,
    response_text: text,
    response_length: text.length,
    score,
    llm_scored: !!llmResult,
    in_follow_up: STATE.inFollowUp,
    evidence: llmResult?.evidence ?? null,
    response_time_ms: Date.now() - (STATE._lastQuestionTime || Date.now()),
  });

  // Reply: use LLM-generated reply, else random acknowledgment
  const replyText = llmResult?.reply || pick(q.acknowledgments);
  STATE.history.push({ role: 'assistant', content: replyText });

  // Decide: issue follow-up or advance to next question
  const followUpText = !STATE.inFollowUp && llmResult?.followUp ? llmResult.followUp : null;

  if (followUpText) {
    // ── FOLLOW-UP PATH ──────────────────────────────────────────────
    STATE.inFollowUp = true;
    STATE.history.push({ role: 'assistant', content: followUpText });
    enqueuePersonaMessage(replyText, 200);
    enqueuePersonaMessage(followUpText, 350);
    enqueue({ type: 'unlock_input' });
  } else {
    // ── ADVANCE PATH ────────────────────────────────────────────────
    STATE.inFollowUp = false;
    STATE.redirectCount = 0;
    STATE.qIndex++;
    enqueuePersonaMessage(replyText, 200);

    if (STATE.qIndex >= PACK.questions.length) {
      enqueue({ type: 'show_results' });
    } else {
      STATE._lastQuestionTime = Date.now();
      const nextMsg = pick(PACK.questions[STATE.qIndex].messages);
      STATE.history.push({ role: 'assistant', content: nextMsg });
      enqueuePersonaMessage(nextMsg, 400);
      enqueue({ type: 'unlock_input' });
    }
  }

  drainQueue();
}

// ── SCORING ENGINE ──
function calculateScores() {
  const dimScores = {};
  let total = 0;
  let count = 0;
  PACK.dimensions.forEach(d => {
    const max = d.max_questions * d.max_points_per;
    const raw = STATE.scores[d.id] || 0;
    const pct = Math.min(100, Math.max(0, Math.round((raw / max) * 100)));
    dimScores[d.id] = pct;
    total += pct;
    count++;
  });
  dimScores._overall = Math.round(total / count);
  return dimScores;
}

function getOverallLabel(score) {
  for (const l of PACK.overall_labels) {
    if (score >= l.min) return l.text;
  }
  return "";
}

// ── CONFETTI ──
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const colors = ['#f43f5e','#fb923c','#fbbf24','#34d399','#60a5fa','#a78bfa','#f9a8d4','#fff'];
  const particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push({ x: Math.random()*canvas.width, y: -10-Math.random()*100, w: 6+Math.random()*8, h: 3+Math.random()*5, vx: (Math.random()-0.5)*4, vy: 3+Math.random()*4, rot: Math.random()*360, vr: (Math.random()-0.5)*8, color: colors[Math.floor(Math.random()*colors.length)], alpha: 1 });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.vr;
      if (p.y > canvas.height*0.8) p.alpha -= 0.025;
      if (p.alpha <= 0) continue;
      alive = true;
      ctx.save(); ctx.globalAlpha = Math.max(0, p.alpha); ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    }
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

  const scores = calculateScores();

  logEvidence('task_end', { overall_score: scores._overall, dimension_scores: scores, total_time_ms: Date.now() - STATE.taskStartTime });

  PACK.dimensions.forEach((d, i) => {
    const pct = scores[d.id];
    const card = document.createElement('div');
    card.className = 'score-card';
    card.innerHTML = `
      <div class="score-card-header">

      </div>
      <div class="score-card-desc">${d.description}</div>

        <div class="score-bar-fill" style="background: ${d.color};" data-pct="${pct}"></div>
      </div>
    `;
    resultsBody.appendChild(card);
  });

  // Sign-off
  const signoff = document.createElement('div');
  signoff.style.cssText = 'text-align:center; color:rgba(255,255,255,0.4); font-size:13px; padding: 20px 0 10px; line-height:1.6;';
  signoff.innerHTML = `assessed with ❤️ by ${PACK.persona.name}<br><span style="font-size:11px;">refresh to try again</span>`;
  resultsBody.appendChild(signoff);

  // Animate
  resultsOverlay.classList.add('visible');

  const cards = resultsBody.querySelectorAll('.score-card');
  cards.forEach((card, i) => { setTimeout(() => card.classList.add('visible'), 200 + i * 120); });

    resultsBody.querySelectorAll('.score-bar-fill').forEach((bar, i) => {
      setTimeout(() => { bar.style.width = bar.dataset.pct + '%'; }, i * 150);
    });
  }, 600);

  setTimeout(() => {
    if (scores._overall >= 75) { resultAnimArea.innerHTML = '\u{1F389}'; launchConfetti(); }
    else if (scores._overall >= 45) { resultAnimArea.innerHTML = '<span class="thumbs-emoji">\u{1F44D}</span><span class="thumbs-emoji">\u{1F44D}</span>'; }
    else { resultAnimArea.innerHTML = ['<span class="broken-emoji">\u{1F5A5}️</span>','<span class="broken-emoji">\u{1F50C}</span>','<span class="broken-emoji">\u{1F4BE}</span>','<span class="broken-emoji">\u{1F4DF}</span>','<span class="broken-emoji">\u{1F527}</span>'].join(''); }
  }, 400);
}

let _tutSteps = [], _tutIndex = 0, _tutDone = null;

function tutStart(steps, onDone) {
  _tutSteps = steps;
  _tutIndex = 0;
  _tutDone  = onDone;
  document.getElementById('tut-next').addEventListener('click', tutNext, { once: false });
  document.getElementById('tut-skip').addEventListener('click', tutEnd,  { once: false });
  // Replace listeners cleanly
  const nextBtn = document.getElementById('tut-next');
  const skipBtn = document.getElementById('tut-skip');
  nextBtn.replaceWith(nextBtn.cloneNode(true));
  skipBtn.replaceWith(skipBtn.cloneNode(true));
  document.getElementById('tut-next').addEventListener('click', tutNext);
  document.getElementById('tut-skip').addEventListener('click', tutEnd);
  tutShow(_tutIndex);
}

function tutShow(i) {
  const step   = _tutSteps[i];
  const target = document.querySelector(step.selector);
  if (!target) { tutNext(); return; }

  const r    = target.getBoundingClientRect();
  const PAD  = 8;
  const top  = r.top  - PAD;
  const left = r.left - PAD;
  const w    = r.width  + PAD * 2;
  const h    = r.height + PAD * 2;
  const vw   = window.innerWidth;
  const vh   = window.innerHeight;

  // 4-panel cutout
  const dims = {
    'tut-dim-top':    { top: 0,       left: 0,       width: vw,           height: top },
    'tut-dim-bottom': { top: top + h, left: 0,       width: vw,           height: vh - top - h },
    'tut-dim-left':   { top: top,     left: 0,       width: left,         height: h },
    'tut-dim-right':  { top: top,     left: left + w, width: vw - left - w, height: h }
  };
  Object.entries(dims).forEach(([id, s]) => {
    const el = document.getElementById(id);
    el.style.display = 'block';
    Object.assign(el.style, { top: s.top + 'px', left: s.left + 'px', width: s.width + 'px', height: s.height + 'px' });
  });

  // Ring
  const ring = document.getElementById('tut-ring');
  ring.style.display = 'block';
  Object.assign(ring.style, { top: top + 'px', left: left + 'px', width: w + 'px', height: h + 'px' });

  // Card content
  document.getElementById('tut-step-label').textContent = `Step ${i + 1} of ${_tutSteps.length}`;
  document.getElementById('tut-card-title').textContent = step.title;
  document.getElementById('tut-card-body').textContent  = step.body;
  document.getElementById('tut-next').textContent = (i === _tutSteps.length - 1) ? 'Start Chat →' : 'Next →';

  // Card position
  const card   = document.getElementById('tut-card');
  card.style.display = 'block';
  const CPAD   = 16;
  const cw     = 280;
  let cx, cy;
  const pos    = step.cardPosition || 'auto';

  if (pos === 'left') {
    cx = Math.max(CPAD, left - cw - 12);
    cy = Math.min(top, vh - 180);
  } else if (pos === 'right') {
    cx = Math.min(left + w + 12, vw - cw - CPAD);
    cy = Math.min(top, vh - 180);
  } else {
    // below if room, else above
    cy = (top + h + 12 + 170 < vh) ? top + h + 12 : top - 170;
    cx = Math.max(CPAD, Math.min(left, vw - cw - CPAD));
  }
  card.style.top  = cy + 'px';
  card.style.left = cx + 'px';
}

function tutNext() {
  _tutIndex++;
  if (_tutIndex >= _tutSteps.length) { tutEnd(); return; }
  tutShow(_tutIndex);
}

function tutEnd() {
  ['tut-dim-top','tut-dim-bottom','tut-dim-left','tut-dim-right','tut-ring','tut-card'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  if (_tutDone) { const cb = _tutDone; _tutDone = null; cb(); }
}

// ── START FROM WELCOME ──
function startFromWelcome() {
  const tutEnabled = document.getElementById('scTutEnabled').checked;
  const overlay    = document.getElementById('scWelcome');
  overlay.classList.add('hidden');
  setTimeout(() => { overlay.style.display = 'none'; }, 380);

  if (tutEnabled) {
    tutStart(TUTORIAL_STEPS, startConversation);
  } else {
    startConversation();
  }
}

// ── PACK LOADER ──
async function loadPack() {
  const params = new URLSearchParams(window.location.search);
  const url = params.get('scenario') || DEFAULT_SCENARIO;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    return await resp.json();
  } catch (e) {
    console.warn('Could not fetch scenario JSON (' + url + '), using inline fallback:', e.message);
    return CONSTRUCT_PACK_INLINE;
  }
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  CONSTRUCT_PACK = await loadPack();
  PACK = CONSTRUCT_PACK;

  // Initialize dimension scores now that PACK is loaded
  PACK.dimensions.forEach(d => { STATE.scores[d.id] = 0; });

  initFromPack();
  updateStatusTime();
  setInterval(updateStatusTime, 30000);

  inputField.addEventListener('input', () => {
    const hasText = inputField.value.trim().length > 0;
    sendBtn.classList.toggle('active', hasText);
    sendBtn.disabled = !hasText || inputField.disabled;
  });
  inputField.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onUserSend(); } });
  sendBtn.addEventListener('click', onUserSend);

  document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.getElementById('sideInfo').classList.remove('open'); document.getElementById('sideOverlay').classList.remove('open'); } });

  // Show welcome overlay — user clicks "Start Chat" to begin
  document.getElementById('scWelcome').style.display = 'flex';
});
</script>
