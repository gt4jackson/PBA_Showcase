<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Take — PBA Showcase</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ETS 2024 Rebrand Palette */
  --bg: #1a212b;
  --surface: #242e3d;
  --surface-alt: #2c3849;
  --surface-hover: #344256;
  --text: #f2e9d8;
  --text-secondary: #b8b0a0;
  --text-tertiary: #7e7a72;
  --border: rgba(242,233,216,0.08);
  --border-strong: rgba(242,233,216,0.15);
  --accent: #4dd3fe;
  --accent-light: rgba(77,211,254,0.12);
  --accent-glow: rgba(77,211,254,0.3);
  --emerald: #468254;
  --emerald-bg: rgba(70,130,84,0.15);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.15);
  --rose: #f43f5e;
  --rose-bg: rgba(244,63,94,0.15);
  --violet: #9e9eff;
  --violet-bg: rgba(158,158,255,0.15);
  --teal: #103d4b;
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: 'Beausite Classic', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  padding: 8px;
  display: flex;
  flex-direction: column;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── TOP BAR ──────────────────────────────── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); border-radius: 10px 10px 0 0; flex-shrink: 0;
}
.top-bar-left { display: flex; align-items: center; gap: 12px; }
.top-bar-right { display: flex; align-items: center; gap: 10px; }

.back-btn {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 13px; padding: 4px 8px;
  border-radius: var(--radius-sm); transition: all 0.15s;
}
.back-btn:hover { color: var(--text); background: var(--surface-alt); }

.scenario-title { font-size: 14px; font-weight: 600; color: var(--text); }

.topic-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  background: var(--violet-bg); color: var(--violet);
  border: 1px solid rgba(158,158,255,0.2);
}

.timer-tag {
  font-size: 12px; font-weight: 600; padding: 3px 10px;
  border-radius: 4px; background: var(--surface-alt);
  color: var(--text-secondary); border: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}

.submit-btn, .info-toggle-btn {
  font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.15s; font-weight: 500;
}
.info-toggle-btn { background: none; color: var(--text-secondary); }
.info-toggle-btn:hover { color: var(--text); background: var(--surface-alt); }
.submit-btn { background: var(--accent); color: #0a1628; border-color: var(--accent); font-weight: 600; }
.submit-btn:hover { background: #3bbde5; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── CONSTRUCT BANNER ────────────────────── */
.construct-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; background: rgba(26,33,43,0.85);
  border-bottom: 1px solid var(--border); font-size: 12px; flex-shrink: 0;
}
.construct-banner.hidden { display: none; }
.construct-banner-label { color: var(--text-tertiary); }
.construct-banner-name { color: var(--accent); font-weight: 600; }
.construct-banner-dims { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
.construct-dim-tag {
  padding: 2px 8px; border-radius: 3px; font-size: 10px;
  background: var(--accent-light); color: var(--accent);
  border: 1px solid rgba(77,211,254,0.15);
}

/* ── MAIN LAYOUT: 2-PANEL ─────────────────── */
.workspace {
  flex: 1; display: flex; gap: 8px; padding: 6px; overflow: hidden; border-radius: 0 0 10px 10px;
}

/* LEFT: Sources panel */
.sources-panel {
  width: 42%; min-width: 0;
  display: flex; flex-direction: column; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  flex-shrink: 0; overflow: hidden;
}

.sources-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; overflow-x: auto;
}
.source-tab {
  padding: 10px 14px; font-size: 12px; font-weight: 500;
  color: var(--text-tertiary); cursor: pointer; border: none;
  background: none; white-space: nowrap; position: relative;
  transition: color 0.15s;
}
.source-tab:hover { color: var(--text-secondary); }
.source-tab.active { color: var(--accent); }
.source-tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 8px; right: 8px;
  height: 2px; background: var(--accent); border-radius: 1px;
}
.source-tab .reliability-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  margin-left: 5px; vertical-align: middle;
}
.rel-high { background: var(--emerald); }
.rel-mixed { background: var(--amber); }
.rel-low { background: var(--rose); }

.source-content {
  flex: 1; overflow-y: auto; padding: 20px;
}
.source-content h4 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 15px; color: var(--text); margin-bottom: 4px;
}
.source-meta {
  font-size: 11px; color: var(--text-tertiary); margin-bottom: 14px;
  display: flex; gap: 10px; flex-wrap: wrap;
}
.source-meta-tag {
  padding: 1px 6px; border-radius: 3px; font-size: 10px;
}
.source-content p, .source-content li {
  font-size: 13px; color: var(--text-secondary); line-height: 1.65;
  margin-bottom: 10px;
}
.source-content ul { padding-left: 18px; }
.source-content table {
  width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px;
}
.source-content th {
  text-align: left; padding: 6px 8px; background: var(--surface);
  color: var(--text-secondary); border-bottom: 1px solid var(--border-strong);
  font-weight: 600;
}
.source-content td {
  padding: 5px 8px; border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}

.source-highlight-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px; background: var(--surface);
  border-top: 1px solid var(--border); flex-shrink: 0; font-size: 11px;
}
.source-highlight-bar span { color: var(--text-tertiary); }
.highlight-btn {
  background: var(--accent-light); color: var(--accent); border: 1px solid rgba(77,211,254,0.2);
  font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
}
.highlight-btn:hover { background: rgba(77,211,254,0.2); }

/* RIGHT: Writing panel */
.writing-panel {
  flex: 1; display: flex; flex-direction: column; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}

.editor-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.editor-header-left { display: flex; align-items: center; gap: 10px; }
.editor-header h3 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 14px; font-weight: 600;
}
.word-count-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  background: var(--surface-alt); color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}
.word-count-tag.in-range { background: var(--emerald-bg); color: var(--emerald); }
.word-count-tag.over { background: var(--amber-bg); color: var(--amber); }

.editor-sections {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}

.editor-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.editor-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--surface-alt);
  border-bottom: 1px solid var(--border);
}
.editor-section-label {
  font-size: 12px; font-weight: 600; color: var(--text);
}
.editor-section-hint {
  font-size: 11px; color: var(--text-tertiary); font-style: italic;
}
.editor-section textarea {
  width: 100%; min-height: 90px; padding: 12px 14px;
  background: transparent; border: none; color: var(--text);
  font-family: inherit; font-size: 13px; line-height: 1.65;
  resize: vertical; outline: none;
}
.editor-section textarea::placeholder { color: var(--text-tertiary); }
.editor-section textarea:focus {
  background: rgba(77,211,254,0.03);
}

.section-tag-bar {
  display: flex; gap: 6px; padding: 6px 14px 10px;
  flex-wrap: wrap;
}
.source-ref-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 3px;
  background: var(--violet-bg); color: var(--violet);
  border: 1px solid rgba(158,158,255,0.15); cursor: pointer;
}
.source-ref-tag:hover { background: rgba(158,158,255,0.25); }
.source-ref-tag.inserted { background: var(--emerald-bg); color: var(--emerald); border-color: rgba(70,130,84,0.3); }

/* ── INFO DRAWER ──────────────────────────── */
.info-drawer {
  position: fixed; top: 0; right: -400px; width: 380px;
  height: 100vh; background: var(--surface); border-left: 1px solid var(--border);
  z-index: 100; transition: right 0.25s ease; display: flex; flex-direction: column;
  box-shadow: -8px 0 24px rgba(0,0,0,0.3);
}
.info-drawer.open { right: 0; }
.info-drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.info-drawer-header h3 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 14px;
}
.info-close-btn {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 18px; padding: 2px 6px;
}
.info-drawer-body {
  flex: 1; overflow-y: auto; padding: 16px; font-size: 13px;
  color: var(--text-secondary); line-height: 1.6;
}
.info-drawer-body h4 {
  font-size: 13px; color: var(--text); margin: 14px 0 6px;
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
}
.info-drawer-body h4:first-child { margin-top: 0; }
.info-drawer-body ul { padding-left: 16px; margin: 4px 0 10px; }
.info-drawer-body li { margin-bottom: 4px; }
.info-tabs { display: flex; gap: 1px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.info-tab { background: none; border: none; color: var(--text-tertiary); font-size: 12px; font-weight: 500; cursor: pointer; padding: 8px 12px; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.info-tab:hover { color: var(--text); }
.info-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.info-tab-pane { display: none; }
.info-tab-pane.active { display: block; }
.json-viewer { font-size: 11px; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; white-space: pre-wrap; word-break: break-word; color: var(--accent); background: var(--bg); border: 1px solid rgba(77,211,254,0.15); border-radius: 6px; padding: 12px; line-height: 1.5; }
.rubric-preview {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px; margin: 8px 0;
}
.rubric-preview-row {
  display: flex; justify-content: space-between; padding: 4px 0;
  border-bottom: 1px solid var(--border); font-size: 12px;
}
.rubric-preview-row:last-child { border-bottom: none; }

/* ── RESULTS OVERLAY ──────────────────────── */
.results-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: linear-gradient(160deg, #1a212b 0%, #103d4b 50%, #1a212b 100%);
  overflow-y: auto;
}
.results-overlay.open { display: block; }
.results-container {
  max-width: 680px; margin: 40px auto; padding: 0 20px 60px;
}
.results-header {
  text-align: center; margin-bottom: 30px;
}
.results-header h2 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 26px; margin-bottom: 4px;
}
.results-header p { color: var(--text-secondary); font-size: 14px; }
.results-score-circle {
  width: 120px; height: 120px; border-radius: 50%; margin: 20px auto;
  background: linear-gradient(135deg, var(--accent), var(--violet));
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; box-shadow: 0 0 40px rgba(77,211,254,0.15);
}
.results-score-circle .score-num { font-size: 36px; font-weight: 700; color: #fff; line-height: 1; }
.results-score-circle .score-of { font-size: 11px; color: rgba(255,255,255,0.7); }
.results-tier {
  text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 20px;
  padding: 6px 18px; border-radius: 20px; display: inline-block;
}
.tier-gold { background: rgba(245,158,11,0.15); color: #f59e0b; }
.tier-silver { background: rgba(148,163,184,0.15); color: #94a3b8; }
.tier-bronze { background: rgba(205,127,50,0.15); color: #cd7f32; }
.tier-developing { background: rgba(244,63,94,0.1); color: var(--rose); }

.results-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
}
.results-card h4 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 14px; margin-bottom: 12px;
}

.skill-bar-row { margin-bottom: 10px; }
.skill-bar-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: var(--text-secondary); }
.skill-bar-track { height: 6px; border-radius: 3px; background: var(--bg); overflow: hidden; }
.skill-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.bar-high { background: linear-gradient(90deg, var(--emerald), #5cb86f); }
.bar-mid { background: linear-gradient(90deg, var(--amber), #fbbf24); }
.bar-low { background: linear-gradient(90deg, var(--rose), #fb7185); }

.feedback-item {
  display: flex; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.feedback-item:last-child { border-bottom: none; }
.feedback-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
.feedback-good { color: var(--emerald); }
.feedback-bad { color: var(--rose); }
.feedback-dim { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.feedback-note { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

.process-stat {
  display: flex; justify-content: space-between; padding: 6px 0;
  border-bottom: 1px solid var(--border); font-size: 12px;
}
.process-stat:last-child { border-bottom: none; }
.process-stat-label { color: var(--text-secondary); }
.process-stat-value { color: var(--text); font-weight: 600; }

.coaching-list { padding-left: 16px; margin: 0; }
.coaching-list li { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.5; }

.results-actions {
  display: flex; gap: 10px; justify-content: center; margin-top: 20px;
}
.results-actions a, .results-actions button {
  padding: 10px 22px; border-radius: var(--radius-sm); font-size: 13px;
  font-weight: 600; cursor: pointer; text-decoration: none; border: 1px solid var(--border);
  transition: all 0.15s;
}
.results-primary { background: var(--accent); color: #0a1628; border-color: var(--accent); }
.results-primary:hover { background: #3bbde5; }
.results-secondary { background: none; color: var(--text-secondary); }
.results-secondary:hover { background: var(--surface-alt); color: var(--text); }

/* ── WELCOME MODAL ────────────────────────── */
.welcome-overlay {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(10,22,40,0.85); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
}
.welcome-overlay.hidden { display: none; }
.welcome-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); max-width: 520px; width: 90%;
  padding: 28px 32px; box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.welcome-card h2 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 20px; margin-bottom: 8px;
}
.welcome-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
.welcome-card .construct-info {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; margin: 12px 0;
}
.welcome-card .construct-info .ci-label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 3px; }
.welcome-card .construct-info .ci-name { font-size: 14px; font-weight: 600; color: var(--accent); }
.welcome-card .construct-info .ci-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }
.welcome-dims {
  display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 16px;
}
.welcome-dims .construct-dim-tag { font-size: 11px; }
.welcome-start-btn {
  width: 100%; padding: 12px; background: var(--accent); color: #0a1628;
  border: none; border-radius: var(--radius-sm); font-size: 14px;
  font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.welcome-start-btn:hover { background: #3bbde5; }
.splash-back {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-tertiary); text-decoration: none; font-size: 13px;
  padding: 4px 0; margin-bottom: 12px; transition: color 0.15s; width: fit-content;
}
.splash-back:hover { color: var(--text); }

/* ── TUTORIAL SYSTEM ─────────────────────── */
.tut-overlay{display:none;position:fixed;inset:0;z-index:9000}
.tut-overlay.active{display:block}
.tut-dim{position:fixed;background:rgba(0,0,0,.72)}
.tut-ring{position:fixed;border:2px solid var(--accent,#4dd3fe);border-radius:6px;box-shadow:0 0 16px rgba(77,211,254,.35);pointer-events:none;transition:all .2s}
.tut-card{position:fixed;background:var(--surface,#242e3d);border:1px solid rgba(77,211,254,.4);border-radius:10px;padding:16px 18px;max-width:280px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9002;transition:top .2s,left .2s}
.tut-step-count{font-size:11px;color:var(--text-tertiary,#666);margin-bottom:4px}
.tut-card h4{font-size:14px;font-weight:600;color:var(--text,#f2e9d8);margin:0 0 7px;font-family:Georgia,serif}
.tut-card p{font-size:12px;color:var(--text-secondary,#b8b0a0);line-height:1.65;margin:0 0 14px}
.tut-actions{display:flex;gap:8px;justify-content:space-between;align-items:center}
.tut-skip-btn{background:none;border:none;color:var(--text-tertiary,#666);font-size:12px;cursor:pointer;padding:5px 0}
.tut-skip-btn:hover{color:var(--text,#eee);text-decoration:underline}
.tut-next-btn{background:var(--accent,#4dd3fe);color:#0a1628;border:none;font-size:12px;font-weight:700;cursor:pointer;padding:7px 14px;border-radius:5px}
.tut-next-btn:hover{background:#3bbde5}
.tut-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:14px 0;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid rgba(255,255,255,.08);cursor:pointer}
.tut-toggle-label{font-size:13px;color:var(--text-secondary,#b8b0a0);pointer-events:none}
.tut-switch{position:relative;width:36px;height:20px;flex-shrink:0}
.tut-switch input{opacity:0;width:0;height:0;position:absolute}
.tut-track{position:absolute;inset:0;background:rgba(255,255,255,.08);border-radius:20px;border:1px solid rgba(255,255,255,.15);cursor:pointer;transition:.2s}
.tut-track:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:rgba(255,255,255,.3);border-radius:50%;transition:.2s}
.tut-switch input:checked+.tut-track{background:rgba(77,211,254,.15);border-color:var(--accent,#4dd3fe)}
.tut-switch input:checked+.tut-track:before{transform:translateX(16px);background:var(--accent,#4dd3fe)}

/* ── UTILITY ──────────────────────────────── */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     CONSTRUCT PACK LOADER
     Default: scenarios/the-take-argumentation.json
     Override via URL param: ?scenario=path.json
     ═══════════════════════════════════════════ -->
<script>
const DEFAULT_SCENARIO = 'scenarios/the-take-argumentation.json';

const CONSTRUCT_PACK_INLINE = {
  construct_id: "argumentation",
  construct_name: "Argumentation & Evidence Evaluation",
  construct_description: "The ability to formulate clear claims, select and evaluate evidence from multiple sources, address counterarguments, and communicate a well-reasoned position in writing.",
  dimensions: [
    { id: "claim_clarity", name: "Claim Clarity", icon: "🎯", description: "States a clear, specific position that directly addresses the prompt", max_score: 20 },
    { id: "evidence_use", name: "Evidence Use", icon: "📊", description: "Selects relevant evidence from provided sources and integrates it effectively", max_score: 25 },
    { id: "source_evaluation", name: "Source Evaluation", icon: "🔍", description: "Distinguishes stronger from weaker sources and addresses credibility", max_score: 20 },
    { id: "counterargument", name: "Counterargument", icon: "⚖️", description: "Acknowledges opposing viewpoints and responds substantively", max_score: 20 },
    { id: "writing_quality", name: "Writing Quality", icon: "✍️", description: "Organized, clear, professional tone appropriate for the audience", max_score: 15 }

async function loadPack() {

  const url = params.get('scenario') || DEFAULT_SCENARIO;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    return await resp.json();
  } catch (e) {
    console.warn('Could not fetch scenario JSON (' + url + '), using inline fallback:', e.message);
    return CONSTRUCT_PACK_INLINE;
  }

<script>
/* ── STATE ─────────────────────────────────── */
const STATE = {
  startTime: null,
  currentSourceIndex: 0,
  sourceReadTimes: {},       // { src_id: total_ms }
  sourceEnteredAt: null,
  evidence: [],
  sectionSnapshots: [],      // periodic writing snapshots
  snapshotInterval: null,
  submitted: false
};

/* ── HELPERS ────────────────────────────────── */
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function logEvidence(event, data = {}) {
  STATE.evidence.push({ event, ...data, ts: Date.now(), elapsed_ms: STATE.startTime ? Date.now() - STATE.startTime : 0 });
}

function getTotalWords() {
  let total = 0;
  document.querySelectorAll('.section-textarea').forEach(ta => {
    const w = ta.value.trim().split(/\s+/).filter(Boolean).length;
    total += w;
  });
  return total;
}

function updateWordCount() {
  const words = getTotalWords();
  const el = document.getElementById('word-count');
  el.textContent = `${words} word${words !== 1 ? 's' : ''}`;

  const [lo, hi] = SCENARIO.word_range;
  el.classList.remove('in-range', 'over');
  if (words >= lo && words <= hi) el.classList.add('in-range');
  else if (words > hi) el.classList.add('over');

  // Enable submit if minimum met
  const btn = document.getElementById('submit-btn');
  btn.disabled = words < Math.round(lo * 0.5); // allow submit at 50% of minimum for flexibility
}

/* ── TIMER ──────────────────────────────────── */
function startTimer() {
  STATE.startTime = Date.now();
  setInterval(() => {
    const s = Math.floor((Date.now() - STATE.startTime) / 1000);
    const m = Math.floor(s / 60);
    document.getElementById('timer').textContent =
      `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
  }, 1000);
}

/* ── SOURCE READING ─────────────────────────── */
function renderSourceTabs() {
  const tabs = document.getElementById('source-tabs');
  tabs.innerHTML = SCENARIO.sources.map((s, i) => {
    const relClass = s.reliability === 'high' ? 'rel-high' : s.reliability === 'mixed' ? 'rel-mixed' : 'rel-low';
    return `<button class="source-tab ${i === 0 ? 'active' : ''}" data-idx="${i}" onclick="switchSource(${i})">
      ${esc(s.tab_label)}<span class="reliability-dot ${relClass}"></span>
    </button>`;
  }).join('');
}

function switchSource(idx) {
  // Log time on previous source
  flushReadTime();

  STATE.currentSourceIndex = idx;
  STATE.sourceEnteredAt = Date.now();

  // Update tabs
  document.querySelectorAll('.source-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  // Render content
  const src = SCENARIO.sources[idx];
  const relLabel = src.reliability === 'high' ? 'High reliability' : src.reliability === 'mixed' ? 'Mixed reliability' : 'Lower reliability';
  const relClass = src.reliability === 'high' ? 'emerald' : src.reliability === 'mixed' ? 'amber' : 'rose';

  document.getElementById('source-content').innerHTML = `
    <h4>${esc(src.title)}</h4>
    <div class="source-meta">
      <span>${esc(src.author)}</span>
      <span>·</span>
      <span>${esc(src.publication)}</span>
      <span class="source-meta-tag" style="background:var(--${relClass}-bg);color:var(--${relClass})">${relLabel}</span>
    </div>
    ${src.content_html}
  `;

  logEvidence('source_opened', { source_id: src.id, source_label: src.tab_label });
}

function flushReadTime() {
  if (STATE.sourceEnteredAt) {
    const src = SCENARIO.sources[STATE.currentSourceIndex];
    const dt = Date.now() - STATE.sourceEnteredAt;
    STATE.sourceReadTimes[src.id] = (STATE.sourceReadTimes[src.id] || 0) + dt;
    STATE.sourceEnteredAt = null;

    const totalSec = Math.round(STATE.sourceReadTimes[src.id] / 1000);
    logEvidence('source_read_time', { source_id: src.id, cumulative_seconds: totalSec });
  }
}

function updateReadTimeDisplay() {
  const src = SCENARIO.sources[STATE.currentSourceIndex];
  let ms = STATE.sourceReadTimes[src.id] || 0;
  if (STATE.sourceEnteredAt) ms += Date.now() - STATE.sourceEnteredAt;
  document.getElementById('read-time-display').textContent = `Reading: ${Math.round(ms / 1000)}s`;
}

function insertSourceRef() {
  const src = SCENARIO.sources[STATE.currentSourceIndex];
  // Find the focused or last-focused textarea
  const active = document.activeElement;
  let target = active && active.classList.contains('section-textarea') ? active : document.querySelector('.section-textarea');
  if (target) {
    const ref = `[${src.tab_label}]`;
    const pos = target.selectionStart || target.value.length;
    target.value = target.value.slice(0, pos) + ref + target.value.slice(pos);
    target.focus();
    target.selectionStart = target.selectionEnd = pos + ref.length;
    updateWordCount();
    logEvidence('source_cited', { source_id: src.id, section: target.dataset.section });

    // Mark tag as inserted
    document.querySelectorAll(`.source-ref-tag[data-src="${src.id}"]`).forEach(t => t.classList.add('inserted'));
  }
}

/* ── EDITOR SECTIONS ────────────────────────── */
const SECTIONS = [
  { id: 'position', label: 'Your Position', hint: 'State your recommendation clearly in 1-2 sentences', placeholder: 'I recommend that the Riverside school board...' },
  { id: 'evidence', label: 'Key Evidence', hint: 'What evidence supports your position? Reference specific sources.', placeholder: 'The strongest evidence for this recommendation comes from...' },
  { id: 'counterargument', label: 'Counterargument', hint: 'What is the strongest objection? How do you respond?', placeholder: 'Opponents of this position might argue that...' },
  { id: 'recommendation', label: 'Recommendation & Next Steps', hint: 'What specifically should the board do?', placeholder: 'Based on this analysis, I recommend the following actions...' }
];

function renderEditor() {
  const container = document.getElementById('editor-sections');
  const sourceTagsHtml = SCENARIO.sources.map(s =>
    `<span class="source-ref-tag" data-src="${s.id}" onclick="citeFromTag('${s.id}')">${esc(s.tab_label)}</span>`
  ).join('');

  container.innerHTML = SECTIONS.map(sec => `
    <div class="editor-section">
      <div class="editor-section-header">
        <span class="editor-section-label">${esc(sec.label)}</span>
        <span class="editor-section-hint">${esc(sec.hint)}</span>
      </div>
      <textarea class="section-textarea" data-section="${sec.id}"
        placeholder="${esc(sec.placeholder)}"
        oninput="onSectionInput('${sec.id}', this)"
        onfocus="onSectionFocus('${sec.id}')"></textarea>
      <div class="section-tag-bar">${sourceTagsHtml}</div>
    </div>
  `).join('');
}

function citeFromTag(srcId) {
  const src = SCENARIO.sources.find(s => s.id === srcId);
  if (!src) return;
  const active = document.activeElement;
  let target = active && active.classList.contains('section-textarea') ? active : document.querySelector('.section-textarea');
  if (target) {
    const ref = `[${src.tab_label}]`;
    const pos = target.selectionStart || target.value.length;
    target.value = target.value.slice(0, pos) + ref + target.value.slice(pos);
    target.focus();
    updateWordCount();
    logEvidence('source_cited', { source_id: src.id, section: target.dataset.section });
    document.querySelectorAll(`.source-ref-tag[data-src="${srcId}"]`).forEach(t => t.classList.add('inserted'));
  }
}

let firstKeystrokeLogged = false;
function onSectionInput(sectionId, textarea) {
  updateWordCount();
  if (!firstKeystrokeLogged && textarea.value.trim().length > 0) {
    logEvidence('first_keystroke', { section: sectionId, elapsed_ms: Date.now() - STATE.startTime });
    firstKeystrokeLogged = true;
  }
}

function onSectionFocus(sectionId) {
  logEvidence('section_focused', { section: sectionId });
}

/* ── WRITING SNAPSHOTS ──────────────────────── */
function takeSnapshot() {
  const snap = {};
  document.querySelectorAll('.section-textarea').forEach(ta => {
    snap[ta.dataset.section] = { text: ta.value, words: ta.value.trim().split(/\s+/).filter(Boolean).length };
  });
  STATE.sectionSnapshots.push({ ts: Date.now(), elapsed_ms: Date.now() - STATE.startTime, sections: snap, total_words: getTotalWords() });
}

/* ── INFO DRAWER ────────────────────────────── */
function toggleInfo() {
  document.getElementById('info-drawer').classList.toggle('open');
}

function renderInfoDrawer() {
  const rubricRows = PACK.dimensions.map(d =>
    `<div class="rubric-preview-row"><span>${d.icon} ${esc(d.name)}</span><span>${d.max_score} pts</span></div>`
  ).join('');

  const _overview = `
    <h4>Your Task</h4>
    <p>${esc(SCENARIO.prompt)}</p>
    <h4>Audience</h4>
    <p>${esc(SCENARIO.audience)}</p>
    <h4>Word Range</h4>
    <p>${SCENARIO.word_range[0]}–${SCENARIO.word_range[1]} words across all sections</p>
    <h4>Scoring Rubric</h4>
    <div class="rubric-preview">${rubricRows}</div>
    <h4>Memo Structure</h4>
    <ul>${SECTIONS.map(s => `<li><strong>${esc(s.label)}</strong> — ${esc(s.hint)}</li>`).join('')}</ul>
    <h4>Tips</h4>
    <ul>${PACK.coaching_tips.slice(0, 3).map(t => `<li>${esc(t)}</li>`).join('')}</ul>
  `;
  const _jsonStr = JSON.stringify(PACK, null, 2).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  document.getElementById('info-body').innerHTML = `<div class="info-tabs"><button class="info-tab active" onclick="switchInfoTab('overview',this)">Overview</button><button class="info-tab" onclick="switchInfoTab('json',this)">Construct JSON</button></div><div class="info-tab-pane active" id="info-pane-overview">${_overview}</div><div class="info-tab-pane" id="info-pane-json"><pre class="json-viewer">${_jsonStr}</pre></div>`;
}

function switchInfoTab(tab, btn) {
  btn.closest('.info-tabs').querySelectorAll('.info-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('info-pane-overview').classList.toggle('active', tab === 'overview');
  document.getElementById('info-pane-json').classList.toggle('active', tab === 'json');
}

/* ── TUTORIAL ────────────────────────────── */
const TUTORIAL_STEPS = [
  { target: '.sources-panel', title: 'Source Documents', text: 'Read all 5 sources before writing. The coloured reliability dot on each tab hints at how much to trust that source.' },
  { target: '.writing-panel', title: 'Position Memo',    text: 'Write your structured memo here section by section. Click "📌 Cite this source" while reading to insert a reference.' },
  { target: '#submit-btn',    title: 'Submit When Ready', text: 'When you\'ve hit the word target and addressed each section, submit for scoring across all rubric dimensions.' },
];
const TUT = { step: 0, steps: [], done: null };
function tutStart(steps, onDone) { TUT.steps = steps; TUT.done = onDone; TUT.step = 0; document.getElementById('tut-overlay').classList.add('active'); tutShow(0); }
function tutShow(i) {
  const s = TUT.steps[i], n = TUT.steps.length, PAD = 8, VW = window.innerWidth, VH = window.innerHeight;
  document.getElementById('tut-step-count').textContent = `${i+1} of ${n}`;
  document.getElementById('tut-title').textContent = s.title;
  document.getElementById('tut-text').textContent = s.text;
  document.getElementById('tut-next-btn').textContent = i === n-1 ? 'Start Task →' : 'Next →';
  const el = s.target ? document.querySelector(s.target) : null;
  if (el) {
    const r = el.getBoundingClientRect();
    const x1 = Math.max(0,r.left-PAD), y1 = Math.max(0,r.top-PAD), x2 = Math.min(VW,r.right+PAD), y2 = Math.min(VH,r.bottom+PAD);
    document.getElementById('tut-dim-top').style.cssText = `left:0;top:0;right:0;height:${y1}px`;
    document.getElementById('tut-dim-bottom').style.cssText = `left:0;bottom:0;right:0;height:${VH-y2}px`;
    document.getElementById('tut-dim-left').style.cssText = `left:0;top:${y1}px;width:${x1}px;height:${y2-y1}px`;
    document.getElementById('tut-dim-right').style.cssText = `right:0;top:${y1}px;width:${VW-x2}px;height:${y2-y1}px`;
    const ring = document.getElementById('tut-ring'); ring.style.cssText = `left:${x1}px;top:${y1}px;width:${x2-x1}px;height:${y2-y1}px`; ring.style.display='';
    const card = document.getElementById('tut-card'), cW=280, cH=160;
    let cx=x2+14; if(cx+cW>VW-12) cx=x1-cW-14; if(cx<12) cx=Math.round((VW-cW)/2);
    let cy=Math.max(12,Math.min(y1+(r.height/2)-(cH/2),VH-cH-12));
    card.style.cssText=`left:${cx}px;top:${cy}px;transform:none`;
  } else {
    ['tut-dim-top','tut-dim-bottom','tut-dim-left','tut-dim-right'].forEach(id=>document.getElementById(id).style.cssText='inset:0');
    document.getElementById('tut-ring').style.display='none';
    document.getElementById('tut-card').style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';
  }
}
function tutNext() { TUT.step++; TUT.step>=TUT.steps.length ? tutEnd() : tutShow(TUT.step); }
function tutSkip() { tutEnd(); }
function tutEnd() { document.getElementById('tut-overlay').classList.remove('active'); if(TUT.done) TUT.done(); }

/* ── WELCOME MODAL ──────────────────────────── */
function renderWelcome() {
  const dims = PACK.dimensions.map(d =>
    `<span class="construct-dim-tag">${d.icon} ${esc(d.name)}</span>`
  ).join('');

  document.getElementById('welcome-card').innerHTML = `
    <a href="index.html" class="splash-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</a>
    <h2>${esc(SCENARIO.title)}</h2>
    <p>${esc(SCENARIO.prompt)}</p>
    <div class="construct-info">
      <div class="ci-label">Construct being assessed</div>
      <div class="ci-name">${esc(PACK.construct_name)}</div>
      <div class="ci-desc">${esc(PACK.construct_description)}</div>
    </div>
    <div class="welcome-dims">${dims}</div>
    <p style="font-size:12px;color:var(--text-tertiary)">
      You'll read 5 source documents on the left and write a structured position memo on the right.
      Target: ${SCENARIO.word_range[0]}–${SCENARIO.word_range[1]} words · ~15–20 minutes
    </p>
    <label class="tut-toggle-row" for="tut-enabled"><span class="tut-toggle-label">🎓 Guided tutorial</span><span class="tut-switch"><input type="checkbox" id="tut-enabled" checked><span class="tut-track"></span></span></label>
    <button class="welcome-start-btn" onclick="beginTask()">Begin Task</button>
  `;
}

function beginTask() {
  document.getElementById('welcome-overlay').classList.add('hidden');
  const useTut = document.getElementById('tut-enabled')?.checked !== false;
  const go = () => {
    startTimer();
    STATE.sourceEnteredAt = Date.now();
    logEvidence('task_started', {});

    // Periodic snapshots every 30s
    STATE.snapshotInterval = setInterval(takeSnapshot, 30000);

    // Update read time display
    setInterval(updateReadTimeDisplay, 1000);
  };
  if (useTut) { tutStart(TUTORIAL_STEPS, go); } else { go(); }
}

/* ── SCORING ────────────────────────────────── */
function scoreRun() {
  const sections = {};
  document.querySelectorAll('.section-textarea').forEach(ta => {
    sections[ta.dataset.section] = ta.value;
  });

  const fullText = Object.values(sections).join(' ').toLowerCase();
  const totalWords = getTotalWords();
  const dimScores = {};
  const feedback = [];

  // 1. Claim Clarity
  const claimText = (sections.position || '').toLowerCase();
  const claimMax = (PACK.dimensions.find(d => d.id === 'claim_clarity') || {}).max_score || 20;
  const ccRubric = (PACK.rubric || {}).claim_clarity || {};
  let claimScore = 0;
  const strongClaim = (ccRubric.strong_indicators || []).some(i => claimText.includes(i.toLowerCase()));
  const weakClaim = (ccRubric.weak_indicators || []).some(i => claimText.includes(i.toLowerCase()));
  const hasKeywords = (ccRubric.keywords || []).filter(k => claimText.includes(k)).length;

  if (strongClaim) claimScore = claimMax;
  else if (hasKeywords >= 2 && !weakClaim) claimScore = Math.round(claimMax * 0.75);
  else if (hasKeywords >= 1) claimScore = Math.round(claimMax * 0.5);
  else if (claimText.length > 20) claimScore = Math.round(claimMax * 0.25);

  dimScores.claim_clarity = Math.round((claimScore / claimMax) * 100);
  feedback.push({
    dim: '🎯 Claim Clarity',
    good: claimScore >= claimMax * 0.6,
    note: strongClaim
      ? 'Clear, specific position stated — the board knows exactly what you recommend.'
      : claimScore >= claimMax * 0.5
        ? 'Position is present but could be more specific. Try leading with a direct recommendation.'
        : 'Your position is unclear. Start with "I recommend..." to anchor the reader.'
  });

  // 2. Evidence Use
  const evidMax = (PACK.dimensions.find(d => d.id === 'evidence_use') || {}).max_score || 25;
  const euRubric = (PACK.rubric || {}).evidence_use || {};
  const sourceRefs = (euRubric.source_refs || []).filter(k => fullText.includes(k.toLowerCase())).length;
  const sourceRefsTotal = Math.max(1, (euRubric.source_refs || []).length);
  const integrationHits = (euRubric.integration_keywords || []).filter(k => fullText.includes(k.toLowerCase())).length;
  const sourcesRead = Object.keys(STATE.sourceReadTimes).length;
  const citedSources = new Set();
  (SCENARIO.sources || []).forEach(s => {
    if (fullText.includes((s.tab_label || '').toLowerCase())) citedSources.add(s.id);
  });

  let evidScore = 0;
  evidScore += Math.min(evidMax * 0.5, (sourceRefs / sourceRefsTotal) * evidMax * 0.5);
  evidScore += Math.min(evidMax * 0.3, (citedSources.size / Math.max(1, euRubric.min_sources_referenced || 2)) * evidMax * 0.3);
  evidScore += Math.min(evidMax * 0.2, integrationHits * (evidMax * 0.05));
  evidScore = Math.min(evidMax, Math.round(evidScore));

  dimScores.evidence_use = Math.round((evidScore / evidMax) * 100);
  feedback.push({
    dim: '📊 Evidence Use',
    good: evidScore >= evidMax * 0.6,
    note: citedSources.size >= 3
      ? `Strong evidence integration — referenced ${citedSources.size} sources with ${sourceRefs} specific data points.`
      : `Only ${citedSources.size} source(s) explicitly referenced. Aim for at least ${euRubric.min_sources_referenced || 2} to show balanced analysis.`
  });

  // 3. Source Evaluation
  const seMax = PACK.dimensions.find(d => d.id === 'source_evaluation').max_score;
  const credHits = PACK.rubric.source_evaluation.credibility_keywords.filter(k => fullText.includes(k.toLowerCase())).length;
  const identifiedStrong = PACK.rubric.source_evaluation.strongest_sources.some(id => {
    const s = SCENARIO.sources.find(src => src.id === id);
    return s && fullText.includes(s.tab_label.toLowerCase());
  });
  const identifiedWeak = PACK.rubric.source_evaluation.weakest_sources.some(id => {
    const s = SCENARIO.sources.find(src => src.id === id);
    return s && (fullText.includes('stakeholder') || fullText.includes('anecdotal') || fullText.includes('parent'));
  });

  let seScore = 0;
  seScore += Math.min(seMax * 0.4, credHits * (seMax * 0.08));
  if (identifiedStrong) seScore += seMax * 0.3;
  if (identifiedWeak) seScore += seMax * 0.3;
  seScore = Math.min(seMax, Math.round(seScore));

  dimScores.source_evaluation = Math.round((seScore / seMax) * 100);
  feedback.push({
    dim: '🔍 Source Evaluation',
    good: seScore >= seMax * 0.6,
    note: credHits >= 3
      ? `Good critical lens — you used ${credHits} credibility-related terms and distinguished source quality.`
      : 'Try to explicitly evaluate source credibility. Which sources are peer-reviewed? Which are vendor-provided?'
  });

  // 4. Counterargument
  const caMax = PACK.dimensions.find(d => d.id === 'counterargument').max_score;
  const caText = (sections.counterargument || '').toLowerCase();
  const caKeywords = PACK.rubric.counterargument.keywords.filter(k => caText.includes(k)).length;
  const caConcepts = PACK.rubric.counterargument.counter_concepts.filter(k => caText.includes(k)).length;
  const caFullKeywords = PACK.rubric.counterargument.keywords.filter(k => fullText.includes(k)).length;

  let caScore = 0;
  caScore += Math.min(caMax * 0.4, caKeywords * (caMax * 0.1));
  caScore += Math.min(caMax * 0.4, caConcepts * (caMax * 0.1));
  // Bonus if counter-language appears elsewhere too (shows integrated thinking)
  if (caFullKeywords > caKeywords) caScore += caMax * 0.2;
  caScore = Math.min(caMax, Math.round(caScore));

  dimScores.counterargument = Math.round((caScore / caMax) * 100);
  feedback.push({
    dim: '⚖️ Counterargument',
    good: caScore >= caMax * 0.6,
    note: caConcepts >= 2
      ? `Solid engagement with ${caConcepts} opposing concerns — your memo addresses key objections.`
      : 'Your counterargument section needs more depth. What would opponents say, and how do you respond?'
  });

  // 5. Writing Quality
  const wqMax = PACK.dimensions.find(d => d.id === 'writing_quality').max_score;
  const [minW, maxW] = SCENARIO.word_range;
  const inRange = totalWords >= minW && totalWords <= maxW;
  const sectionsUsed = SECTIONS.filter(s => (sections[s.id] || '').trim().length > 10).length;
  const allSections = sectionsUsed === SECTIONS.length;

  let wqScore = 0;
  if (inRange) wqScore += wqMax * 0.4;
  else if (totalWords >= minW * 0.7) wqScore += wqMax * 0.2;
  wqScore += (sectionsUsed / SECTIONS.length) * wqMax * 0.4;
  // Basic coherence: does position align with recommendation?
  const posText = (sections.position || '').toLowerCase();
  const recText = (sections.recommendation || '').toLowerCase();
  const positionTerms = ['adopt', 'reject', 'modify', 'conditional', 'phase'];
  const aligned = positionTerms.some(t => posText.includes(t) && recText.includes(t));
  if (aligned) wqScore += wqMax * 0.2;
  wqScore = Math.min(wqMax, Math.round(wqScore));

  dimScores.writing_quality = Math.round((wqScore / wqMax) * 100);
  feedback.push({
    dim: '✍️ Writing Quality',
    good: wqScore >= wqMax * 0.6,
    note: allSections && inRange
      ? `Well-structured memo — all sections completed within the ${minW}–${maxW} word target.`
      : !allSections
        ? `Only ${sectionsUsed} of ${SECTIONS.length} sections completed. Each section contributes to your score.`
        : `Word count (${totalWords}) is outside the ${minW}–${maxW} target range.`
  });

  // Composite
  const totalScore = claimScore + evidScore + seScore + caScore + wqScore;
  const maxTotal = PACK.dimensions.reduce((a, d) => a + d.max_score, 0);
  const composite = Math.round((totalScore / maxTotal) * 100);

  // Process metrics
  const readSources = Object.keys(STATE.sourceReadTimes).length;
  const totalReadSec = Math.round(Object.values(STATE.sourceReadTimes).reduce((a, b) => a + b, 0) / 1000);
  const elapsedMin = STATE.startTime ? Math.round((Date.now() - STATE.startTime) / 60000) : 0;

  const processScore = Math.min(100, Math.round(
    (readSources / SCENARIO.sources.length) * 40 +
    (citedSources.size >= 3 ? 30 : citedSources.size * 10) +
    (totalReadSec >= 60 ? 20 : totalReadSec / 3) +
    (STATE.sectionSnapshots.length >= 3 ? 10 : STATE.sectionSnapshots.length * 3)
  ));

  const overallLabel = PACK.overall_labels.find(l => composite >= l.min && composite <= l.max) || PACK.overall_labels[PACK.overall_labels.length - 1];

  return {
    dimScores, composite, totalScore, maxTotal, feedback, overallLabel,
    processScore, readSources, totalReadSec, citedSources: citedSources.size,
    totalWords, elapsedMin, snapshots: STATE.sectionSnapshots.length
  };
}

/* ── SUBMIT ──────────────────────────────────── */
function submitMemo() {
  if (STATE.submitted) return;
  STATE.submitted = true;

  flushReadTime();
  takeSnapshot(); // final snapshot
  clearInterval(STATE.snapshotInterval);

  const sections = {};
  document.querySelectorAll('.section-textarea').forEach(ta => {
    sections[ta.dataset.section] = ta.value;
  });

  logEvidence('memo_submitted', {
    total_words: getTotalWords(),
    sections_filled: SECTIONS.filter(s => (sections[s.id] || '').trim().length > 10).length,
    elapsed_ms: Date.now() - STATE.startTime,
    sources_read: Object.keys(STATE.sourceReadTimes).length,
    snapshots: STATE.sectionSnapshots.length,
    evidence_events: STATE.evidence.length
  });

  const result = scoreRun();
  renderResults(result);
  document.getElementById('results-overlay').classList.add('open');
  document.getElementById('construct-banner').classList.add('hidden');
}

/* ── RENDER RESULTS ──────────────────────────── */
function renderResults(r) {
  const dimBarsHtml = PACK.dimensions.map(d => {
    const val = r.dimScores[d.id] || 0;
    const barClass = val >= 70 ? 'bar-high' : val >= 40 ? 'bar-mid' : 'bar-low';
    return `<div class="skill-bar-row">
      <div class="skill-bar-header"><span>${d.icon} ${esc(d.name)}</span><span>${val}</span></div>
      <div class="skill-bar-track"><div class="skill-bar-fill ${barClass}" style="width:${Math.max(2, val)}%"></div></div>
    </div>`;
  }).join('');

  const feedbackHtml = r.feedback.map(f => `
    <div class="feedback-item">
      <span class="feedback-icon ${f.good ? 'feedback-good' : 'feedback-bad'}">${f.good ? '✓' : '✗'}</span>
      <div><div class="feedback-dim">${f.dim}</div><div class="feedback-note">${esc(f.note)}</div></div>
    </div>
  `).join('');

  const tipsHtml = PACK.coaching_tips.map(t => `<li>${esc(t)}</li>`).join('');

  const tierClass = `tier-${r.overallLabel.tier}`;

  document.getElementById('results-container').innerHTML = `
    <div class="results-header">
      <h2>Memo Results</h2>
      <p>${esc(PACK.construct_name)}</p>
      <div class="results-score-circle">
        <span class="score-num">${r.composite}</span>
        <span class="score-of">/ 100</span>
      </div>
      <div style="text-align:center">
        <span class="results-tier ${tierClass}">${esc(r.overallLabel.label)}</span>
      </div>
    </div>

    <div class="results-card">
      <h4>Dimension Scores</h4>
      ${dimBarsHtml}
    </div>

    <div class="results-card">
      <h4>Feedback</h4>
      ${feedbackHtml}
    </div>

    <div class="results-card">
      <h4>Process Evidence</h4>
      <div class="process-stat"><span class="process-stat-label">Sources read</span><span class="process-stat-value">${r.readSources} / ${SCENARIO.sources.length}</span></div>
      <div class="process-stat"><span class="process-stat-label">Total reading time</span><span class="process-stat-value">${r.totalReadSec}s</span></div>
      <div class="process-stat"><span class="process-stat-label">Sources cited</span><span class="process-stat-value">${r.citedSources}</span></div>
      <div class="process-stat"><span class="process-stat-label">Final word count</span><span class="process-stat-value">${r.totalWords}</span></div>
      <div class="process-stat"><span class="process-stat-label">Time spent</span><span class="process-stat-value">${r.elapsedMin} min</span></div>
      <div class="process-stat"><span class="process-stat-label">Writing snapshots</span><span class="process-stat-value">${r.snapshots}</span></div>
      <div class="process-stat"><span class="process-stat-label">Process score</span><span class="process-stat-value">${r.processScore} / 100</span></div>
    </div>

    <div class="results-card">
      <h4>Coaching Tips</h4>
      <ul class="coaching-list">${tipsHtml}</ul>
    </div>

    <div class="results-actions">
      <a class="results-primary" href="index.html">Back to Hub</a>
      <button class="results-secondary" onclick="document.getElementById('results-overlay').classList.remove('open')">Review Memo</button>
    </div>
  `;
}

/* ── INIT ────────────────────────────────────── */
function init() {
  // Populate top bar
  document.getElementById('scenario-title').textContent = SCENARIO.title;
  document.getElementById('topic-tag').textContent = PACK.construct_name;
  document.getElementById('target-range').textContent = `Target: ${SCENARIO.word_range[0]}–${SCENARIO.word_range[1]} words`;

  // Construct banner
  document.getElementById('cb-name').textContent = PACK.construct_name;
  document.getElementById('cb-dims').innerHTML = PACK.dimensions.map(d =>
    `<span class="construct-dim-tag">${d.icon} ${esc(d.name)}</span>`
  ).join('');

  renderSourceTabs();
  switchSource(0);
  renderEditor();
  renderInfoDrawer();
  renderWelcome();
}

(async () => {
  PACK = await loadPack();
  SCENARIO = PACK.scenario;
  init();
})();
