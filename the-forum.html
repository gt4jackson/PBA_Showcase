<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Forum — PBA Showcase</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a212b;
  --surface: #242e3d;
  --surface-alt: #2c3849;
  --surface-hover: #344256;
  --text: #f2e9d8;
  --text-secondary: #b8b0a0;
  --text-tertiary: #7e7a72;
  --border: rgba(242,233,216,0.08);
  --border-strong: rgba(242,233,216,0.15);
  --accent: #4dd3fe;
  --accent-light: rgba(77,211,254,0.12);
  --accent-glow: rgba(77,211,254,0.3);
  --emerald: #468254;
  --emerald-bg: rgba(70,130,84,0.15);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.15);
  --rose: #f43f5e;
  --rose-bg: rgba(244,63,94,0.15);
  --violet: #9e9eff;
  --violet-bg: rgba(158,158,255,0.15);
  --teal: #103d4b;
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: 'Beausite Classic', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden;
  padding: 8px;
  display: flex; flex-direction: column;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: rgba(242,233,216,0.15); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── TOP BAR ─────────────────────────────── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); border-radius: 10px 10px 0 0; flex-shrink: 0;
}
.top-bar-left { display: flex; align-items: center; gap: 12px; }
.top-bar-right { display: flex; align-items: center; gap: 10px; }
.back-btn {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 13px; padding: 4px 8px;
  border-radius: var(--radius-sm); transition: all 0.15s;
}
.back-btn:hover { color: var(--text); background: var(--surface-alt); }
.scenario-title { font-size: 14px; font-weight: 600; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); }
.tag-violet { background: var(--violet-bg); color: var(--violet); border-color: rgba(158,158,255,0.2); }
.timer-tag {
  font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 4px;
  background: var(--surface-alt); color: var(--text-secondary); border: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}
.info-btn {
  font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); cursor: pointer; font-weight: 500;
  background: none; color: var(--text-secondary); transition: all 0.15s;
}
.info-btn:hover { color: var(--text); background: var(--surface-alt); }
.submit-btn {
  font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--accent); cursor: pointer; font-weight: 600;
  background: var(--accent); color: #0a1628; transition: all 0.15s;
}
.submit-btn:hover { background: #3bbde5; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── CONSTRUCT BANNER ────────────────────── */
.construct-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; background: rgba(26,33,43,0.85);
  border-bottom: 1px solid var(--border); font-size: 12px; flex-shrink: 0;
}
.construct-banner.hidden { display: none; }
.cb-label { color: var(--text-tertiary); }
.cb-name { color: var(--accent); font-weight: 600; }
.cb-plus { color: var(--text-tertiary); margin: 0 2px; }
.cb-name2 { color: var(--emerald); font-weight: 600; }
.cb-dims { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
.cb-dim { padding: 2px 8px; border-radius: 3px; font-size: 10px; background: var(--accent-light); color: var(--accent); border: 1px solid rgba(77,211,254,0.15); }
.cb-dim-collab { background: var(--emerald-bg); color: var(--emerald); border-color: rgba(70,130,84,0.2); }

/* ── WORKSPACE ───────────────────────────── */
.workspace { flex: 1; display: flex; gap: 8px; padding: 6px; overflow: hidden; border-radius: 0 0 10px 10px; max-width: 100vw; }

/* LEFT: Thread */
.thread-panel {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.thread-header {
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;
}
.thread-header .channel-icon { color: var(--text-tertiary); }
.thread-body {
  flex: 1; overflow-y: auto; padding: 16px; display: flex;
  flex-direction: column; gap: 2px;
}

/* Messages */
.msg { display: flex; gap: 10px; padding: 6px 0; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: var(--bg);
}
.msg-body { flex: 1; min-width: 0; }
.msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.msg-name { font-size: 13px; font-weight: 600; color: var(--text); }
.msg-role { font-size: 10px; color: var(--text-tertiary); padding: 1px 5px; border-radius: 3px; background: var(--surface-alt); }
.msg-time { font-size: 10px; color: var(--text-tertiary); }
.msg-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.msg-text strong { color: var(--text); }
.msg-actions {
  display: flex; gap: 4px; margin-top: 4px; opacity: 0;
  transition: opacity 0.15s;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-action-btn {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: var(--surface-alt); color: var(--text-tertiary);
  border: 1px solid var(--border); cursor: pointer;
}
.msg-action-btn:hover { color: var(--text); border-color: var(--border-strong); }

.msg-reactions { display: flex; gap: 4px; margin-top: 4px; }
.reaction-chip {
  font-size: 11px; padding: 2px 6px; border-radius: 10px;
  background: var(--surface-alt); border: 1px solid var(--border); cursor: pointer;
}
.reaction-chip.user-reacted { border-color: var(--accent); background: var(--accent-light); }

.msg-divider {
  text-align: center; font-size: 10px; color: var(--text-tertiary);
  margin: 12px 0; position: relative;
}
.msg-divider::before, .msg-divider::after {
  content: ''; position: absolute; top: 50%; height: 1px;
  background: var(--border); width: 35%;
}
.msg-divider::before { left: 0; }
.msg-divider::after { right: 0; }

.typing-indicator {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; font-size: 12px; color: var(--text-tertiary);
}
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%; background: var(--text-tertiary);
  animation: dotPulse 1.3s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes dotPulse {
  0%,55%,100% { opacity: 0.3; transform: translateY(0); }
  27% { opacity: 1; transform: translateY(-3px); }
}

/* Compose */
.compose-bar {
  padding: 12px 16px; background: var(--surface);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.compose-replying {
  font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.compose-replying .cancel-reply {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 14px; padding: 0 4px;
}
.compose-replying .cancel-reply:hover { color: var(--rose); }
.compose-row { display: flex; gap: 8px; align-items: flex-end; }
.compose-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 12px;
  color: var(--text); font-family: inherit; font-size: 13px;
  resize: none; outline: none; min-height: 38px; max-height: 120px;
  line-height: 1.5;
}
.compose-input:focus { border-color: var(--accent); }
.compose-input::placeholder { color: var(--text-tertiary); }
.compose-send {
  padding: 8px 16px; background: var(--accent); color: var(--bg);
  border: none; border-radius: var(--radius-sm); font-size: 12px;
  font-weight: 600; cursor: pointer; flex-shrink: 0; height: 38px;
}
.compose-send:hover { background: #3bbde5; }
.compose-send:disabled { opacity: 0.3; cursor: not-allowed; }

/* RIGHT: Context sidebar */
.context-panel {
  width: 300px; min-width: 0; flex-shrink: 0;
  display: flex; flex-direction: column; overflow: hidden;
  border: 1px solid var(--border); border-radius: 8px;
}
.context-tabs {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ctx-tab {
  flex: 1; padding: 10px 8px; font-size: 11px; font-weight: 500;
  color: var(--text-tertiary); background: none; border: none;
  cursor: pointer; text-align: center; position: relative;
}
.ctx-tab:hover { color: var(--text-secondary); }
.ctx-tab.active { color: var(--accent); }
.ctx-tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 8px; right: 8px;
  height: 2px; background: var(--accent); border-radius: 1px;
}
.context-body { flex: 1; overflow-y: auto; padding: 14px; }

/* Context: Agenda */
.agenda-item {
  padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 8px;
  background: var(--surface); border: 1px solid var(--border);
}
.agenda-item.active { border-color: var(--accent); background: var(--accent-light); }
.agenda-item.completed { border-color: rgba(70,130,84,0.3); }
.agenda-num {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 2px;
}
.agenda-item.active .agenda-num { color: var(--accent); }
.agenda-item.completed .agenda-num { color: var(--emerald); }
.agenda-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.agenda-desc { font-size: 11px; color: var(--text-tertiary); line-height: 1.4; }
.agenda-check { color: var(--emerald); margin-right: 4px; }

/* Context: Team roster */
.team-card {
  display: flex; gap: 10px; padding: 10px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border); margin-bottom: 8px;
}
.team-card-avatar {
  width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--bg);
}
.team-card-info { flex: 1; min-width: 0; }
.team-card-name { font-size: 12px; font-weight: 600; color: var(--text); }
.team-card-role { font-size: 11px; color: var(--text-tertiary); }
.team-card-trait { font-size: 10px; color: var(--text-tertiary); font-style: italic; margin-top: 2px; }

/* Context: Reference */
.ref-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px;
}
.ref-block h4 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 12px; margin-bottom: 6px;
}
.ref-block p, .ref-block li { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.ref-block ul { padding-left: 14px; margin: 4px 0; }
.ref-block table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 6px 0; }
.ref-block th { text-align: left; padding: 4px 6px; background: var(--bg); color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--border-strong); }
.ref-block td { padding: 3px 6px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }

/* ── DECISION MODAL ──────────────────────── */
.decision-overlay {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(10,22,40,0.85); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
}
.decision-overlay.hidden { display: none; }
.decision-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); max-width: 520px; width: 90%;
  padding: 24px 28px; box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.decision-card h3 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 16px; margin-bottom: 12px;
}
.decision-card p { font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.5; }
.decision-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.decision-opt {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: var(--radius-sm); background: var(--bg);
  border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
}
.decision-opt:hover { border-color: var(--border-strong); }
.decision-opt.selected { border-color: var(--accent); background: var(--accent-light); }
.decision-opt input[type="checkbox"] { accent-color: var(--accent); }
.decision-opt-label { font-size: 12px; color: var(--text); }
.decision-opt-desc { font-size: 11px; color: var(--text-tertiary); }
.decision-rationale {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  color: var(--text); font-family: inherit; font-size: 12px;
  line-height: 1.6; resize: vertical; min-height: 70px; outline: none;
}
.decision-rationale:focus { border-color: var(--accent); }
.decision-rationale::placeholder { color: var(--text-tertiary); }
.decision-submit {
  margin-top: 14px; width: 100%; padding: 10px; background: var(--accent);
  color: #0a1628; border: none; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 700; cursor: pointer;
}
.decision-submit:hover { background: #3bbde5; }
.decision-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── WELCOME OVERLAY ─────────────────────── */
.welcome-overlay {
  position: fixed; inset: 0; z-index: 160;
  background: rgba(10,22,40,0.85); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
}
.welcome-overlay.hidden { display: none; }
.welcome-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); max-width: 560px; width: 90%;
  padding: 28px 32px; box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.welcome-card h2 {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 20px; margin-bottom: 8px;
}
.welcome-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; }
.welcome-constructs {
  display: flex; gap: 10px; margin: 14px 0;
}
.wc-box {
  flex: 1; padding: 10px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.wc-box-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 2px; }
.wc-box-name { font-size: 13px; font-weight: 600; }
.wc-accent .wc-box-name { color: var(--accent); }
.wc-green .wc-box-name { color: var(--emerald); }
.welcome-dims { display: flex; gap: 5px; flex-wrap: wrap; margin: 6px 0 16px; }
.welcome-start {
  width: 100%; padding: 12px; background: var(--accent); color: #0a1628;
  border: none; border-radius: var(--radius-sm); font-size: 14px;
  font-weight: 700; cursor: pointer;
}
.welcome-start:hover { background: #3bbde5; }
.splash-back {
  position: absolute; top: 16px; left: 16px;
  display: flex; align-items: center; gap: 6px;
  color: var(--text-tertiary); text-decoration: none; font-size: 13px;
  padding: 6px 10px; border-radius: 6px; transition: all 0.15s;
}
.splash-back:hover { color: var(--text); background: rgba(255,255,255,0.08); }

/* ── TUTORIAL SYSTEM ─────────────────────── */
.tut-overlay{display:none;position:fixed;inset:0;z-index:9000}
.tut-overlay.active{display:block}
.tut-dim{position:fixed;background:rgba(0,0,0,.72)}
.tut-ring{position:fixed;border:2px solid var(--accent,#4dd3fe);border-radius:6px;box-shadow:0 0 16px rgba(77,211,254,.35);pointer-events:none;transition:all .2s}
.tut-card{position:fixed;background:var(--surface,#242e3d);border:1px solid rgba(77,211,254,.4);border-radius:10px;padding:16px 18px;max-width:280px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9002;transition:top .2s,left .2s}
.tut-step-count{font-size:11px;color:var(--text-tertiary,#666);margin-bottom:4px}
.tut-card h4{font-size:14px;font-weight:600;color:var(--text,#f2e9d8);margin:0 0 7px;font-family:Georgia,serif}
.tut-card p{font-size:12px;color:var(--text-secondary,#b8b0a0);line-height:1.65;margin:0 0 14px}
.tut-actions{display:flex;gap:8px;justify-content:space-between;align-items:center}
.tut-skip-btn{background:none;border:none;color:var(--text-tertiary,#666);font-size:12px;cursor:pointer;padding:5px 0}
.tut-skip-btn:hover{color:var(--text,#eee);text-decoration:underline}
.tut-next-btn{background:var(--accent,#4dd3fe);color:#0a1628;border:none;font-size:12px;font-weight:700;cursor:pointer;padding:7px 14px;border-radius:5px}
.tut-next-btn:hover{background:#3bbde5}
.tut-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:14px 0;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid rgba(255,255,255,.08);cursor:pointer}
.tut-toggle-label{font-size:13px;color:var(--text-secondary,#b8b0a0);pointer-events:none}
.tut-switch{position:relative;width:36px;height:20px;flex-shrink:0}
.tut-switch input{opacity:0;width:0;height:0;position:absolute}
.tut-track{position:absolute;inset:0;background:rgba(255,255,255,.08);border-radius:20px;border:1px solid rgba(255,255,255,.15);cursor:pointer;transition:.2s}
.tut-track:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:rgba(255,255,255,.3);border-radius:50%;transition:.2s}
.tut-switch input:checked+.tut-track{background:rgba(77,211,254,.15);border-color:var(--accent,#4dd3fe)}
.tut-switch input:checked+.tut-track:before{transform:translateX(16px);background:var(--accent,#4dd3fe)}

/* ── RESULTS OVERLAY ─────────────────────── */
.results-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: linear-gradient(160deg,#1a212b 0%,#103d4b 50%,#1a212b 100%); overflow-y: auto; }
.results-overlay.open { display: block; }
.results-container { max-width: 700px; margin: 40px auto; padding: 0 20px 60px; }
.results-header { text-align: center; margin-bottom: 20px; }
.results-header h2 { font-family: 'Speckless', Georgia, 'Times New Roman', serif; font-size: 26px; margin-bottom: 4px; }
.results-header p { color: var(--text-secondary); font-size: 14px; }

.dual-scores { display: flex; gap: 20px; justify-content: center; margin: 24px 0; }
.score-circle-wrap { text-align: center; }
.score-circle {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 8px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; box-shadow: 0 0 30px rgba(77,211,254,0.12);
}
.score-circle-domain { background: linear-gradient(135deg, var(--accent), var(--violet)); }
.score-circle-collab { background: linear-gradient(135deg, var(--emerald), #5cb86f); }
.score-circle .sc-num { font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
.score-circle .sc-of { font-size: 10px; color: rgba(255,255,255,0.7); }
.score-circle-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; }

.results-tier { text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 20px; padding: 6px 18px; border-radius: 20px; display: inline-block; }
.tier-gold { background: rgba(245,158,11,0.15); color: #f59e0b; }
.tier-silver { background: rgba(148,163,184,0.15); color: #94a3b8; }
.tier-bronze { background: rgba(205,127,50,0.15); color: #cd7f32; }
.tier-developing { background: rgba(244,63,94,0.1); color: var(--rose); }

.results-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
.results-card h4 { font-family: 'Speckless', Georgia, 'Times New Roman', serif; font-size: 14px; margin-bottom: 12px; }
.skill-bar-row { margin-bottom: 10px; }
.skill-bar-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: var(--text-secondary); }
.skill-bar-track { height: 6px; border-radius: 3px; background: var(--bg); overflow: hidden; }
.skill-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.bar-high { background: linear-gradient(90deg, var(--emerald), #5cb86f); }
.bar-mid { background: linear-gradient(90deg, var(--amber), #fbbf24); }
.bar-low { background: linear-gradient(90deg, var(--rose), #fb7185); }
.feedback-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.feedback-item:last-child { border-bottom: none; }
.feedback-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }

<script>
'use strict';

async function loadPack() {
  const params = new URLSearchParams(window.location.search);
  const url = params.get('scenario') || DEFAULT_SCENARIO;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    return await resp.json();
  } catch (e) {
    console.warn('Fetch failed, using inline fallback:', e.message);
    return CONSTRUCT_PACK_INLINE;
  }
}

let PACK = null, SC = null;

const STATE = {
  startTime: null, round: 0, evidence: [],
  userMessages: [], replyTargets: {}, reactions: {},
  scheduledFired: {}, triggersFired: {},
  currentReplyTo: null, ctxTab: 'agenda',
  decisionSubmitted: false, submitted: false,
  messageReadTimes: {}
};

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function logEvidence(event, data={}) { STATE.evidence.push({ event, ...data, ts: Date.now(), elapsed_ms: STATE.startTime ? Date.now()-STATE.startTime : 0 }); }

// ── TIMER ──
function startTimer() {
  STATE.startTime = Date.now();
  setInterval(() => {
    const s = Math.floor((Date.now()-STATE.startTime)/1000);
    document.getElementById('timer').textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
}

// ── THREAD RENDERING ──
function addMessage(from, text, opts={}) {
  const tb = document.getElementById('thread-body');
  const teammate = SC.teammates.find(t => t.id === from);
  const isUser = !teammate;
  const name = isUser ? SC.user_role.name : teammate.name;
  const title = isUser ? SC.user_role.title : teammate.title;
  const color = isUser ? SC.user_role.color : teammate.color;
  const avatar = isUser ? '👤' : teammate.avatar;
  const elapsed = STATE.startTime ? Math.floor((Date.now()-STATE.startTime)/1000) : 0;
  const timeStr = `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}`;
  const msgId = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

  const div = document.createElement('div');
  div.className = 'msg';
  div.id = msgId;
  div.innerHTML = `
    <div class="msg-avatar" style="background:${color}">${avatar}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name">${esc(name)}</span>
        <span class="msg-role">${esc(title)}</span>
        <span class="msg-time">${timeStr}</span>
      </div>
      <div class="msg-text">${text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>
      ${!isUser ? `<div class="msg-actions">
        <button class="msg-action-btn" onclick="setReply('${from}','${msgId}')">↩ Reply</button>
        <button class="msg-action-btn" onclick="addReaction('${msgId}','👍')">👍</button>
        <button class="msg-action-btn" onclick="addReaction('${msgId}','🤔')">🤔</button>
      </div>` : ''}
      <div class="msg-reactions" id="reactions-${msgId}"></div>
    </div>`;
  tb.appendChild(div);
  tb.scrollTop = tb.scrollHeight;

  if (!isUser) {
    logEvidence('teammate_message', { from, msg_id: msgId, round: STATE.round });
  }
  return msgId;
}

function showTyping(name) {
  const tb = document.getElementById('thread-body');
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = 'typing-' + name;
  el.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div> ${esc(name)} is typing...`;
  tb.appendChild(el);
  tb.scrollTop = tb.scrollHeight;
}
function hideTyping(name) {
  const el = document.getElementById('typing-' + name);
  if (el) el.remove();
}

function addDivider(text) {
  const tb = document.getElementById('thread-body');
  const div = document.createElement('div');
  div.className = 'msg-divider';
  div.textContent = text;
  tb.appendChild(div);
  tb.scrollTop = tb.scrollHeight;
}

// ── REACTIONS ──
function addReaction(msgId, emoji) {
  if (!STATE.reactions[msgId]) STATE.reactions[msgId] = {};
  STATE.reactions[msgId][emoji] = !STATE.reactions[msgId][emoji];
  const container = document.getElementById('reactions-' + msgId);
  if (container) {
    container.innerHTML = Object.entries(STATE.reactions[msgId])
      .filter(([,v]) => v)
      .map(([e]) => `<span class="reaction-chip user-reacted">${e} 1</span>`)
      .join('');
  }
  logEvidence('reaction', { msg_id: msgId, emoji, added: STATE.reactions[msgId][emoji] });
}

// ── REPLY TARGETING ──
function setReply(from, msgId) {
  const tm = SC.teammates.find(t => t.id === from);
  STATE.currentReplyTo = { from, msgId };
  document.getElementById('reply-target-name').textContent = tm ? tm.name : from;
  document.getElementById('compose-replying').classList.remove('hidden');
  document.getElementById('compose-input').focus();
}
function cancelReply() {
  STATE.currentReplyTo = null;
  document.getElementById('compose-replying').classList.add('hidden');
}

// ── COMPOSE ──
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = el.value.trim().length === 0;
}

function sendMessage() {
  const input = document.getElementById('compose-input');
  const text = input.value.trim();
  if (!text) return;

  const msgId = addMessage('user', esc(text));
  STATE.userMessages.push({ id: msgId, text, replyTo: STATE.currentReplyTo, round: STATE.round, ts: Date.now() });

  logEvidence('user_message', {
    msg_id: msgId, text, word_count: text.split(/\s+/).length,
    reply_to: STATE.currentReplyTo ? STATE.currentReplyTo.from : null,
    round: STATE.round
  });

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  cancelReply();

  // Check triggers
  checkTriggers(text);

  // Enable decision after enough participation
  if (STATE.userMessages.length >= 3 && STATE.round >= 3) {
    document.getElementById('decide-btn').disabled = false;
  }
}

// ── TRIGGER ENGINE ──
function checkTriggers(text) {
  const lower = text.toLowerCase();
  for (const trig of (SC.trigger_messages || [])) {
    if (STATE.triggersFired[trig.trigger] && trig.once) continue;
    const match = trig.keywords.some(k => lower.includes(k.toLowerCase()));
    if (match) {
      STATE.triggersFired[trig.trigger] = true;
      const tm = SC.teammates.find(t => t.id === trig.from);
      setTimeout(() => {
        showTyping(tm.name);
        setTimeout(() => {
          hideTyping(tm.name);
          addMessage(trig.from, trig.text);
        }, 1500 + Math.random() * 1500);
      }, 1000 + Math.random() * 2000);
    }
  }
}

// ── ROUND SCHEDULER ──
function runRound(roundNum) {
  STATE.round = roundNum;
  const msgs = SC.message_schedule.filter(m => m.round === roundNum);
  const agenda = SC.agenda[roundNum - 1];

  // Update agenda
  if (agenda) {
    document.querySelectorAll('.agenda-item').forEach(el => {
      const id = el.dataset.id;
      const idx = SC.agenda.findIndex(a => a.id === id);
      if (idx < roundNum - 1) { el.classList.add('completed'); el.classList.remove('active'); }
      else if (idx === roundNum - 1) { el.classList.add('active'); el.classList.remove('completed'); }
      else { el.classList.remove('active', 'completed'); }
    });
  }

  addDivider(agenda ? `— ${agenda.title} —` : `— Round ${roundNum} —`);

  msgs.forEach(m => {
    const tm = SC.teammates.find(t => t.id === m.from);
    setTimeout(() => {
      showTyping(tm.name);
      setTimeout(() => {
        hideTyping(tm.name);
        addMessage(m.from, m.text);
        STATE.scheduledFired[m.id] = true;
      }, 1200 + Math.random() * 1800);
    }, m.delay);
  });
}

function advanceRound() {
  const next = STATE.round + 1;
  if (next <= 3) {
    setTimeout(() => runRound(next), 2000);
  }
}

function updateDecision() {

  document.getElementById('decision-rationale').oninput = () => {

function submitDecision() {
  const checks = [...document.querySelectorAll('#decision-options input:checked')];
  const ids = checks.map(c => c.value);
  const rationale = document.getElementById('decision-rationale').value.trim();
  const totalPts = ids.reduce((sum, id) => sum + (SC.decision_options.find(o => o.id === id)?.points || 0), 0);

  STATE.decisionSubmitted = true;
  document.getElementById('decision-overlay').classList.add('hidden');

  // Post decision to thread
  const featureNames = ids.map(id => SC.decision_options.find(o => o.id === id)?.name).join(' + ');
  addMessage('user', `**My proposal:** ${featureNames} (${totalPts} pts)\n\n${esc(rationale)}`);

  logEvidence('decision_submitted', { features: ids, total_points: totalPts, rationale, within_budget: SC.budget_points == null || totalPts <= SC.budget_points });

  // Teammates react
  setTimeout(() => {

      hideTyping(SC.teammates[0].name);
      addMessage(SC.teammates[0].id, "Thanks for pulling that together. I can work with this — let's write it up for the VP.");

  }, 1500);
}

// ── FINAL SCORING ──
function finalSubmit() {
  if (STATE.submitted) return;
  STATE.submitted = true;

  logEvidence('task_completed', { total_messages: STATE.userMessages.length, elapsed_ms: Date.now()-STATE.startTime, evidence_events: STATE.evidence.length });

  const result = scoreRun();
  renderResults(result);
  document.getElementById('results-overlay').classList.add('open');
  document.getElementById('construct-banner').classList.add('hidden');
}

function scoreRun() {
  const allText = STATE.userMessages.map(m => m.text).join(' ').toLowerCase();
  const msgCount = STATE.userMessages.length;
  const repliedTo = new Set(STATE.userMessages.filter(m => m.replyTo).map(m => m.replyTo.from));
  const reactionCount = Object.values(STATE.reactions).reduce((s, r) => s + Object.values(r).filter(Boolean).length, 0);
  const totalWords = STATE.userMessages.reduce((s, m) => s + m.text.split(/\s+/).length, 0);

  // COLLABORATION SCORING
  const collabDims = {};
  // Engagement
  const engScore = Math.min(100, msgCount * 18 + reactionCount * 5);
  collabDims.engagement = engScore;

  // Building
  const _rubric = PACK.rubric || {};
  const _collab = _rubric.collaboration || {};
  const _domain = _rubric.domain || {};
  const buildHits = (_collab.build_keywords || []).filter(k => allText.match(new RegExp(k, 'i'))).length;
  const buildScore = Math.min(100, repliedTo.size * 20 + buildHits * 12);
  collabDims.building = buildScore;

  // Challenging
  const challengeHits = (_collab.challenge_keywords || []).filter(k => allText.includes(k)).length;
  collabDims.challenging = Math.min(100, challengeHits * 15);

  // Synthesizing
  const synthHits = (_collab.synthesis_keywords || []).filter(k => allText.includes(k)).length;
  collabDims.synthesizing = Math.min(100, synthHits * 20 + (STATE.decisionSubmitted ? 30 : 0));

  const collabComposite = Math.round(Object.values(collabDims).reduce((a, b) => a + b, 0) / 4);

  // DOMAIN SCORING
  const domainDims = {};
  const tradeHits = (_domain.tradeoff_keywords || []).filter(k => allText.includes(k)).length;
  domainDims.tradeoff_analysis = Math.min(100, tradeHits * 12);

  const evidHits = (_domain.evidence_keywords || []).filter(k => allText.includes(k)).length;
  domainDims.evidence_use = Math.min(100, evidHits * 10);

  const flawHits = (_domain.flaw_keywords || []).filter(k => allText.includes(k)).length;
  domainDims.flaw_detection = Math.min(100, flawHits * 15);

  // Decision quality
  let dqScore = 0;
  if (STATE.decisionSubmitted) {
    const decEvt = STATE.evidence.find(e => e.event === 'decision_submitted');
    if (decEvt) {
      dqScore += decEvt.within_budget ? 40 : 0;
      dqScore += decEvt.features.length === 2 ? 20 : 0;
      dqScore += decEvt.rationale.length >= 40 ? 20 : 10;
      const validCombo = (_domain.decision_valid_combos || []).find(c =>
        c.ids.length === decEvt.features.length && c.ids.every(id => decEvt.features.includes(id)));
      dqScore += validCombo ? 20 : 0;
    }
  }
  domainDims.decision_quality = Math.min(100, dqScore);

  const domainComposite = Math.round(Object.values(domainDims).reduce((a, b) => a + b, 0) / 4);
  const composite = Math.round((domainComposite + collabComposite) / 2);
  const _ol = PACK.overall_labels || [];
  const overallLabel = _ol.find(l => composite >= l.min && composite <= l.max) || _ol[_ol.length - 1] || { text: "Task complete." };

  // Feedback
  const feedback = [];
  PACK.domain_dimensions.forEach(d => {
    const val = domainDims[d.id] || 0;
    feedback.push({ dim: `${d.icon} ${d.name}`, good: val >= 50, note: val >= 50 ? `Solid — scored ${val}/100 on ${d.name.toLowerCase()}.` : `Room to grow — only ${val}/100. Try referencing more specific data and trade-offs.` });
  });
  PACK.collaboration_construct.dimensions.forEach(d => {
    const val = collabDims[d.id] || 0;
    feedback.push({ dim: `${d.icon} ${d.name}`, good: val >= 50, note: val >= 50 ? `Strong collaboration signal — ${val}/100.` : `More ${d.name.toLowerCase()} needed — ${val}/100. Try replying directly to teammates.` });
  });

  const elapsedMin = Math.round((Date.now()-STATE.startTime)/60000);

  return { domainDims, collabDims, domainComposite, collabComposite, composite, overallLabel, feedback, msgCount, totalWords, repliedTo: repliedTo.size, reactionCount, elapsedMin };
}

const TUTORIAL_STEPS = [
  { target: '.thread-panel',  title: 'Team Discussion',    text: 'Your teammates\' messages appear here. Read all of them — each person brings a different perspective on the problem.' },
  { target: '.compose-bar',   title: 'Your Replies',       text: 'Type your message and hit Send to join the conversation. Use the Reply button to respond to a specific teammate.' },
  { target: '.context-panel', title: 'Context & Reference', text: 'Switch between Agenda, Team bios, and reference Data here. The agenda tracks the checkpoints the discussion should hit.' },
];
const TUT = { step: 0, steps: [], done: null };
function tutStart(steps, onDone) { TUT.steps = steps; TUT.done = onDone; TUT.step = 0; document.getElementById('tut-overlay').classList.add('active'); tutShow(0); }
function tutShow(i) {
  const s = TUT.steps[i], n = TUT.steps.length, PAD = 8, VW = window.innerWidth, VH = window.innerHeight;
  document.getElementById('tut-step-count').textContent = `${i+1} of ${n}`;
  document.getElementById('tut-title').textContent = s.title;
  document.getElementById('tut-text').textContent = s.text;
  document.getElementById('tut-next-btn').textContent = i === n-1 ? 'Start Task →' : 'Next →';
  const el = s.target ? document.querySelector(s.target) : null;
  if (el) {
    const r = el.getBoundingClientRect();
    const x1 = Math.max(0,r.left-PAD), y1 = Math.max(0,r.top-PAD), x2 = Math.min(VW,r.right+PAD), y2 = Math.min(VH,r.bottom+PAD);
    document.getElementById('tut-dim-top').style.cssText = `left:0;top:0;right:0;height:${y1}px`;
    document.getElementById('tut-dim-bottom').style.cssText = `left:0;bottom:0;right:0;height:${VH-y2}px`;
    document.getElementById('tut-dim-left').style.cssText = `left:0;top:${y1}px;width:${x1}px;height:${y2-y1}px`;
    document.getElementById('tut-dim-right').style.cssText = `right:0;top:${y1}px;width:${VW-x2}px;height:${y2-y1}px`;
    const ring = document.getElementById('tut-ring'); ring.style.cssText = `left:${x1}px;top:${y1}px;width:${x2-x1}px;height:${y2-y1}px`; ring.style.display='';
    const card = document.getElementById('tut-card'), cW=280, cH=160;
    let cx=x2+14; if(cx+cW>VW-12) cx=x1-cW-14; if(cx<12) cx=Math.round((VW-cW)/2);
    let cy=Math.max(12,Math.min(y1+(r.height/2)-(cH/2),VH-cH-12));
    card.style.cssText=`left:${cx}px;top:${cy}px;transform:none`;
  } else {
    ['tut-dim-top','tut-dim-bottom','tut-dim-left','tut-dim-right'].forEach(id=>document.getElementById(id).style.cssText='inset:0');
    document.getElementById('tut-ring').style.display='none';
    document.getElementById('tut-card').style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';
  }
}
function tutNext() { TUT.step++; TUT.step>=TUT.steps.length ? tutEnd() : tutShow(TUT.step); }
function tutSkip() { tutEnd(); }
function tutEnd() { document.getElementById('tut-overlay').classList.remove('active'); if(TUT.done) TUT.done(); }

function beginTask() {
  document.getElementById('welcome-overlay').classList.add('hidden');
  const useTut = document.getElementById('tut-enabled')?.checked !== false;
  const go = () => {
    startTimer();
    logEvidence('task_started');
    runRound(1);

    // Auto-advance rounds based on user participation
    const checkAdvance = setInterval(() => {
      if (STATE.submitted) { clearInterval(checkAdvance); return; }
      const userInRound = STATE.userMessages.filter(m => m.round === STATE.round).length;
      if (userInRound >= 1 && STATE.round < 3) {
        advanceRound();
      }
    }, 3000);
  };
  if (useTut) { tutStart(TUTORIAL_STEPS, go); } else { go(); }
}

  renderCtx();
  renderInfo();
  renderWelcome();

  document.getElementById('compose-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.getElementById('info-drawer').classList.remove('open'); } });
})();
</script>
<!-- TUTORIAL OVERLAY -->
<div id="tut-overlay" class="tut-overlay">
  <div id="tut-dim-top" class="tut-dim"></div>
  <div id="tut-dim-bottom" class="tut-dim"></div>
  <div id="tut-dim-left" class="tut-dim"></div>
  <div id="tut-dim-right" class="tut-dim"></div>
  <div id="tut-ring" class="tut-ring"></div>
  <div id="tut-card" class="tut-card">
    <div class="tut-step-count" id="tut-step-count"></div>
    <h4 id="tut-title"></h4>
    <p id="tut-text"></p>
    <div class="tut-actions">
      <button class="tut-skip-btn" onclick="tutSkip()">Skip tour</button>
      <button class="tut-next-btn" id="tut-next-btn" onclick="tutNext()">Next →</button>
    </div>
  </div>
</div>

<div class="version-badge">v1.101</div>
<script src="feedback.js"></script>
</body>
