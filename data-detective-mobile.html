<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Data Detective — Mobile</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a212b;
  --surface: #242e3d;
  --surface-alt: #2c3849;
  --surface-hover: #344256;
  --text: #f2e9d8;
  --text-secondary: #b8b0a0;
  --text-tertiary: #7e7a72;
  --border: rgba(242,233,216,0.08);
  --border-strong: rgba(242,233,216,0.15);
  --accent: #4dd3fe;
  --accent-light: rgba(77,211,254,0.12);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.12);
  --emerald: #468254;
  --emerald-bg: rgba(70,130,84,0.12);
  --rose: #f43f5e;
  --rose-bg: rgba(244,63,94,0.12);
  --violet: #9e9eff;
  --violet-bg: rgba(158,158,255,0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

input, select, textarea, button { font-family: inherit; }
input, select, textarea { font-size: 16px; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: rgba(242,233,216,0.15); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── TOP BAR ───────────────────────────────── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; padding-top: calc(8px + var(--safe-top));
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; min-height: 44px;
}
.top-bar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.top-bar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.back-btn {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 20px; padding: 6px;
  border-radius: var(--radius-sm); min-width: 42px; min-height: 42px;
  display: flex; align-items: center; justify-content: center;
}
.back-btn:active { background: var(--surface-alt); }
.scenario-title {
  font-size: 14px; font-weight: 600; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.timer {
  font-size: 12px; font-weight: 600; padding: 4px 10px;
  border-radius: 4px; background: var(--surface-alt);
  color: var(--text-secondary); font-variant-numeric: tabular-nums;
  min-width: 52px; text-align: center;
}
.progress-pill {
  font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600;
  background: var(--accent-light); color: var(--accent);
  border: 1px solid rgba(77,211,254,0.25); white-space: nowrap;
}

/* ── TAB SWITCHER ──────────────────────────── */
.tab-bar {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 600;
  border: none; background: transparent; color: var(--text-tertiary);
  cursor: pointer; text-align: center; position: relative;
  min-height: 44px; display: flex; align-items: center; justify-content: center;
  gap: 4px; transition: color 0.15s;
}
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 12px; right: 12px;
  height: 2px; background: var(--accent); border-radius: 1px;
}

/* ── TAB PANELS ────────────────────────────── */
.tab-panels { flex: 1; min-height: 0; position: relative; overflow: hidden; }
.tab-panel {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
.tab-panel.active { opacity: 1; pointer-events: auto; }

/* ── DATA TAB ──────────────────────────────── */
.filter-row {
  display: flex; gap: 6px; padding: 8px 12px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
.filter-select {
  flex: 1; min-width: 90px; font-size: 16px; padding: 8px 10px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg); color: var(--text); appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%237e7a72'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center;
  padding-right: 28px;
}
.filter-input {
  flex: 2; min-width: 100px; font-size: 16px; padding: 8px 10px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg); color: var(--text); outline: none;
}
.filter-input:focus, .filter-select:focus { border-color: var(--accent); }
.filter-btn {
  padding: 8px 14px; border-radius: var(--radius-sm); border: none;
  background: var(--accent); color: var(--bg); font-weight: 600;
  font-size: 14px; cursor: pointer; min-height: 42px; min-width: 60px;
}
.clear-btn {
  padding: 8px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface-alt);
  color: var(--text-secondary); font-size: 14px; cursor: pointer;
  min-height: 42px;
}
.row-count-bar {
  font-size: 11px; color: var(--text-tertiary); padding: 6px 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.data-table-wrap { flex: 1; overflow: auto; min-height: 0; -webkit-overflow-scrolling: touch; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
.data-table th {
  position: sticky; top: 0; background: var(--surface); z-index: 2;
  text-align: left; font-weight: 600; padding: 10px 10px;
  border-bottom: 2px solid var(--border-strong); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-secondary);
  cursor: pointer; user-select: none; white-space: nowrap;
}
.data-table th:active { color: var(--accent); }
.sort-arrow { margin-left: 4px; font-size: 10px; opacity: 0.5; }
.data-table th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
.data-table td {
  padding: 10px 10px; border-bottom: 1px solid var(--border);
  color: var(--text-secondary); white-space: nowrap;
}
.data-table td.numeric { text-align: right; font-variant-numeric: tabular-nums; }

/* ── CSS BAR CHART ─────────────────────────── */
.chart-section {
  flex-shrink: 0; border-top: 2px solid var(--border-strong);
  padding: 12px; background: var(--surface);
}
.chart-controls {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px;
}
.chart-controls label { font-size: 11px; color: var(--text-tertiary); font-weight: 600; }
.chart-select {
  font-size: 16px; padding: 6px 8px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  flex: 1; min-width: 80px; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%237e7a72'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 8px center;
  padding-right: 24px;
}
.chart-bars { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label {
  font-size: 11px; color: var(--text-secondary); width: 70px;
  text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}
.bar-track {
  flex: 1; height: 22px; background: var(--surface-alt); border-radius: 4px;
  overflow: hidden; position: relative;
}
.bar-fill {
  height: 100%; border-radius: 4px; transition: width 0.3s ease;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 6px; font-size: 10px; font-weight: 600; color: var(--bg);
  min-width: 0;
}
.bar-value-outside {
  font-size: 10px; color: var(--text-tertiary); width: 48px; flex-shrink: 0;
  text-align: left; font-variant-numeric: tabular-nums;
}

/* ── NOTES TAB ─────────────────────────────── */
.notes-panel { padding: 12px; flex: 1; display: flex; flex-direction: column; }
.notes-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 8px;
}
.notepad-textarea {
  flex: 1; width: 100%; background: var(--surface-alt); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; font-size: 16px; line-height: 1.7; resize: none;
  outline: none;
}
.notepad-textarea::placeholder { color: var(--text-tertiary); }
.notepad-textarea:focus { border-color: var(--accent); }

/* ── FINDINGS TAB ──────────────────────────── */
.findings-panel { padding: 12px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

.question-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
}
.question-num {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 6px;
}
.question-num.descriptive { color: var(--accent); }
.question-num.diagnostic { color: var(--amber); }
.question-num.prescriptive { color: var(--emerald); }
.question-text { font-size: 14px; line-height: 1.6; margin-bottom: 6px; }
.question-hint {
  font-size: 12px; color: var(--text-tertiary); font-style: italic;
  margin-bottom: 10px; line-height: 1.5;
}
.answer-textarea {
  width: 100%; background: var(--surface-alt); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; font-size: 16px; line-height: 1.6; resize: none;
  outline: none; min-height: 80px;
}
.answer-textarea:focus { border-color: var(--accent); }
.answer-status {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px;
}
.submit-answer-btn {
  font-size: 14px; padding: 10px 18px; border-radius: var(--radius-sm);
  border: none; background: var(--accent); color: var(--bg);
  cursor: pointer; font-weight: 600; min-height: 42px;
}
.submit-answer-btn:disabled { background: var(--surface-alt); color: var(--text-tertiary); }
.answer-submitted { font-size: 12px; color: var(--emerald); font-weight: 600; }

.submit-final-bar {
  flex-shrink: 0; padding: 12px; padding-bottom: calc(12px + var(--safe-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.submit-final-info { font-size: 12px; color: var(--text-tertiary); text-align: center; }
.submit-final-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  border: none; background: var(--accent); color: var(--bg);
  font-size: 15px; font-weight: 700; cursor: pointer; min-height: 48px;
}
.submit-final-btn:disabled { background: var(--surface-alt); color: var(--text-tertiary); }

/* ── LANDING OVERLAY ───────────────────────── */
.landing-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 300;
  display: flex; align-items: center; justify-content: center;
  padding: 24px; padding-top: calc(24px + var(--safe-top));
  padding-bottom: calc(24px + var(--safe-bottom));
  overflow-y: auto;
}
.landing-overlay.hidden { display: none; }
.splash-back {
  position: absolute; top: 16px; left: 16px;
  display: flex; align-items: center; gap: 5px;
  color: var(--text-tertiary); text-decoration: none; font-size: 13px;
  padding: 6px 10px; border-radius: 6px; transition: all 0.15s;
}
.splash-back:hover { color: var(--text); background: rgba(255,255,255,0.08); }
.landing-inner { max-width: 500px; width: 100%; }
.landing-tag {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--amber); margin-bottom: 12px;
}
.landing-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 26px; font-weight: 400; margin-bottom: 14px; line-height: 1.3;
}
.landing-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px; }
.landing-dims { font-size: 12px; color: var(--text-tertiary); margin-bottom: 24px; line-height: 1.8; }
.landing-start-btn {
  width: 100%; padding: 14px; background: var(--accent); color: var(--bg);
  border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 700; cursor: pointer; min-height: 48px;
}
.landing-start-btn:active { background: #3bbde5; }

/* ── RESULTS OVERLAY ───────────────────────── */
.results-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 300;
  overflow-y: auto; display: none;
  padding: 20px; padding-top: calc(20px + var(--safe-top));
  padding-bottom: calc(20px + var(--safe-bottom));
}
.results-overlay.open { display: block; }
.results-container { max-width: 500px; margin: 0 auto; }

.results-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.results-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 4px; }
.results-scenario-title { font-family: Georgia, serif; font-size: 20px; font-weight: 400; }

.composite-block { text-align: right; flex-shrink: 0; }
.composite-label { font-size: 11px; color: var(--text-tertiary); }
.composite-score { font-size: 36px; font-weight: 700; line-height: 1; }
.tier-label { font-size: 12px; font-weight: 600; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; }
.stat-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-tertiary); }
.stat-box-value { font-size: 22px; font-weight: 600; margin-top: 2px; }

.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.result-card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 10px; }

.skill-bar-row { margin-bottom: 8px; }
.skill-bar-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.skill-bar-track { height: 8px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; }
.skill-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.bar-high { background: var(--emerald); }
.bar-mid { background: var(--accent); }
.bar-low { background: var(--rose); }

.feedback-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 13px; }
.feedback-icon { flex-shrink: 0; margin-top: 2px; }
.feedback-good { color: var(--emerald); }
.feedback-bad { color: var(--rose); }
.feedback-dim { font-weight: 600; color: var(--text); }
.feedback-note { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

.si-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
.si-table th, .si-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
.si-table th { color: var(--text-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; font-size: 10px; }
.si-table td { color: var(--text-secondary); }

.tip-list { list-style: disc; padding-left: 18px; color: var(--text-secondary); font-size: 12px; line-height: 1.8; }

.results-actions { display: flex; gap: 10px; margin-top: 20px; }
.results-actions button {
  flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-size: 14px; font-weight: 600; cursor: pointer; min-height: 48px;
}
.r-btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.r-btn-ghost { background: var(--surface-alt); color: var(--text-secondary); }

.hidden { display: none !important; }
</style>
</head>

<script>
'use strict';

// ── PACK LOADER ────────────────────────────────
async function loadPack() {
  const params = new URLSearchParams(window.location.search);
  const url = params.get('scenario') || DEFAULT_SCENARIO;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    return await resp.json();
  } catch (e) {
    console.warn('Could not fetch scenario JSON (' + url + '), using inline fallback:', e.message);
    return CONSTRUCT_PACK_INLINE;
  }
}

let PACK = null;
let DS = null;

const STATE = {
  evidence: [],
  startTime: null,
  sortCol: null,
  sortAsc: true,
  filterCol: null,
  filterVal: '',
  filteredRows: [],
  answers: {},
  answersSubmitted: {},
  chartX: null,
  chartY: null,
  noteSnapshots: 0,
  timerInterval: null,
  activeTab: 'data'
};

// ── EVIDENCE LOGGER ─────────────────────────
function logEvidence(event, data = {}) {
  STATE.evidence.push({
    event, timestamp: new Date().toISOString(),
    elapsed_ms: STATE.startTime ? Date.now() - STATE.startTime : 0,
    ...data
  });
}

// ── TAB SWITCHING ───────────────────────────
function switchTab(tabId) {
  STATE.activeTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabId));
  logEvidence('tab_switched', { tab: tabId });
}

// ── TIMER ───────────────────────────────────
function startTimer() {
  const el = document.getElementById('ws-timer');
  STATE.timerInterval = setInterval(() => {
    const sec = Math.floor((Date.now() - STATE.startTime) / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }, 1000);
}

// ── INIT FROM PACK ──────────────────────────
function initFromPack() {
  document.title = 'Data Detective — Mobile';
  document.getElementById('landing-category').textContent = PACK.pba_category.name;
  document.getElementById('landing-title').textContent = 'Data Detective';
  document.getElementById('landing-desc').textContent = DS.description;
  const dimsHtml = PACK.dimensions.map(d => d.icon + ' <strong>' + esc(d.name) + '</strong> (' + Math.round(d.weight*100) + '%)').join('<br>');
  document.getElementById('landing-dims').innerHTML = 'Skills assessed:<br>' + dimsHtml;
  document.getElementById('ws-title').textContent = 'Data Detective';

  // Filter column dropdown
  const filterCol = document.getElementById('filter-col');
  DS.columns.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.label;
    filterCol.appendChild(opt);
  });

  // Chart axis dropdowns
  const chartX = document.getElementById('chart-x');
  const chartY = document.getElementById('chart-y');
  DS.columns.forEach(c => {
    const optX = document.createElement('option'); optX.value = c.id; optX.textContent = c.label;
    const optY = document.createElement('option'); optY.value = c.id; optY.textContent = c.label;
    chartX.appendChild(optX);
    chartY.appendChild(optY);
  });
  const textCol = DS.columns.find(c => c.type === 'text');
  const numCol = DS.columns.find(c => c.type === 'number');
  if (textCol) chartX.value = textCol.id;
  if (numCol) chartY.value = numCol.id;
  STATE.chartX = chartX.value;
  STATE.chartY = chartY.value;

  chartX.addEventListener('change', () => { STATE.chartX = chartX.value; drawChart(); logEvidence('chart_axis_changed', { axis: 'x', value: chartX.value }); });
  chartY.addEventListener('change', () => { STATE.chartY = chartY.value; drawChart(); logEvidence('chart_axis_changed', { axis: 'y', value: chartY.value }); });

  renderTable();
  renderQuestions();
  drawChart();
}

// ── DATA TABLE ──────────────────────────────
function renderTable() {
  const thead = document.getElementById('data-thead');
  const tbody = document.getElementById('data-tbody');

  thead.innerHTML = '<tr>' + DS.columns.map(c => {
    const isSorted = STATE.sortCol === c.id;
    const arrow = isSorted ? (STATE.sortAsc ? '▲' : '▼') : '⇅';
    return '<th class="' + (isSorted ? 'sorted' : '') + '" onclick="sortBy(\'' + c.id + '\')">' + esc(c.label) + ' <span class="sort-arrow">' + arrow + '</span></th>';
  }).join('') + '</tr>';

  const rows = STATE.filteredRows;
  tbody.innerHTML = rows.map(r => '<tr>' + DS.columns.map(c => {
    const val = r[c.id];
    return '<td class="' + (c.type === 'number' ? 'numeric' : '') + '">' + esc(String(val)) + '</td>';
  }).join('') + '</tr>').join('');

  document.getElementById('row-count-bar').textContent = 'Showing ' + rows.length + ' of ' + DS.rows.length + ' rows';
}

function sortBy(colId) {
  if (STATE.sortCol === colId) {
    STATE.sortAsc = !STATE.sortAsc;
  } else {
    STATE.sortCol = colId;
    STATE.sortAsc = true;
  }

  const col = DS.columns.find(c => c.id === colId);
  STATE.filteredRows.sort((a, b) => {
    let va = a[colId], vb = b[colId];
    if (col.type === 'number') { va = Number(va); vb = Number(vb); }
    else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    if (va < vb) return STATE.sortAsc ? -1 : 1;
    if (va > vb) return STATE.sortAsc ? 1 : -1;
    return 0;
  });

  logEvidence('table_sorted', { column: colId, direction: STATE.sortAsc ? 'asc' : 'desc' });
  renderTable();
}

function applyFilter() {
  const col = document.getElementById('filter-col').value;
  const val = document.getElementById('filter-value').value.trim().toLowerCase();
  if (!val) { clearFilter(); return; }

  STATE.filterCol = col;
  STATE.filterVal = val;

  const colDef = DS.columns.find(c => c.id === col);
  STATE.filteredRows = DS.rows.filter(r => {
    const cell = String(r[col]).toLowerCase();
    if (colDef.type === 'number') {
      return cell.includes(val) || cell === val;
    }
    return cell.includes(val);
  });

  logEvidence('filter_applied', { column: col, value: val, rows_remaining: STATE.filteredRows.length });
  renderTable();
  drawChart();
}

function clearFilter() {
  STATE.filterCol = null;
  STATE.filterVal = '';
  document.getElementById('filter-value').value = '';
  STATE.filteredRows = [...DS.rows];
  if (STATE.sortCol) { sortBy(STATE.sortCol); }
  logEvidence('filter_cleared');
  renderTable();
  drawChart();
}

// ── CSS BAR CHART ───────────────────────────
function drawChart() {
  const container = document.getElementById('chart-bars');
  const xCol = STATE.chartX;
  const yCol = STATE.chartY;
  const yColDef = DS.columns.find(c => c.id === yCol);

  if (!yColDef || yColDef.type !== 'number') {
    container.innerHTML = '<div style="text-align:center;color:var(--text-tertiary);padding:12px;font-size:13px;">Select a numeric column for Y axis</div>';
    return;
  }

  const rows = STATE.filteredRows;
  const groups = {};
  rows.forEach(r => {
    const key = String(r[xCol]);
    if (!groups[key]) groups[key] = { sum: 0, count: 0 };
    groups[key].sum += Number(r[yCol]) || 0;
    groups[key].count++;
  });

  const labels = Object.keys(groups);
  const values = labels.map(k => groups[k].sum);
  if (labels.length === 0) { container.innerHTML = ''; return; }

  const maxVal = Math.max(...values) * 1.05 || 1;
  const colors = ['#4dd3fe', '#9e9eff', '#f59e0b', '#468254', '#f43f5e', '#b8b0a0'];

  container.innerHTML = labels.map((label, i) => {
    const pct = Math.max(1, (values[i] / maxVal) * 100);
    const color = colors[i % colors.length];
    const displayVal = Number.isInteger(values[i]) ? values[i].toLocaleString() : values[i].toFixed(1);
    return '<div class="bar-row">' +
      '<span class="bar-label">' + esc(label) + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + ';">' +
      (pct > 20 ? displayVal : '') +
      '</div></div>' +
      '<span class="bar-value-outside">' + (pct <= 20 ? displayVal : '') + '</span>' +
      '</div>';
  }).join('');

  logEvidence('chart_drawn', { x_axis: xCol, y_axis: yCol, type: 'bar', data_points: labels.length });
}

// ── QUESTIONS ───────────────────────────────
function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = PACK.questions.map(q =>
    '<div class="question-card" id="qcard-' + q.id + '">' +
      '<div class="question-num ' + q.type + '">' + esc(q.label) + '</div>' +
      '<div class="question-text">' + esc(q.text) + '</div>' +
      '<div class="question-hint">' + esc(q.hint) + '</div>' +
      '<div>' +
        '<textarea class="answer-textarea" id="answer-' + q.id + '" placeholder="Type your answer..." oninput="onAnswerInput(\'' + q.id + '\')"></textarea>' +
        '<div class="answer-status">' +
          '<span id="status-' + q.id + '" class="answer-submitted hidden">✓ Submitted</span>' +
          '<button class="submit-answer-btn" id="btn-' + q.id + '" onclick="submitAnswer(\'' + q.id + '\')" disabled>Submit answer</button>' +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('');
}

function onAnswerInput(qId) {
  const text = document.getElementById('answer-' + qId).value.trim();
  document.getElementById('btn-' + qId).disabled = text.length < 10;
  STATE.answers[qId] = text;
}

function submitAnswer(qId) {
  const text = STATE.answers[qId] || '';
  STATE.answersSubmitted[qId] = text;
  document.getElementById('status-' + qId).classList.remove('hidden');
  document.getElementById('btn-' + qId).disabled = true;
  document.getElementById('btn-' + qId).textContent = 'Submitted';
  document.getElementById('answer-' + qId).readOnly = true;
  document.getElementById('answer-' + qId).style.opacity = '0.7';

  logEvidence('answer_submitted', { question_id: qId, answer_length: text.length });
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(STATE.answersSubmitted).length;
  const total = PACK.questions.length;
  document.getElementById('ws-progress').textContent = answered + '/' + total;
  document.getElementById('submit-final-btn').disabled = answered < total;
  document.getElementById('submit-bar-info').textContent = answered < total
    ? 'Answer all ' + total + ' questions to submit'
    : 'All questions answered — ready to submit!';
}

// ── NOTEPAD LOGGING ─────────────────────────
let lastNoteLog = 0;
document.addEventListener('input', function(e) {
  if (e.target.id !== 'notepad') return;
  const now = Date.now();
  if (now - lastNoteLog > 5000) {
    lastNoteLog = now;
    STATE.noteSnapshots++;
    const notepad = document.getElementById('notepad');
    logEvidence('note_snapshot', { length: notepad.value.length, word_count: notepad.value.trim().split(/\s+/).filter(Boolean).length });
  }
});

// ── SCORING ENGINE ──────────────────────────
function scoreRun() {
  const notepad = document.getElementById('notepad');
  const feedback = [];
  let totalPoints = 0;
  let maxPoints = 0;
  const questionScores = {};

  for (const q of PACK.questions) {
    const answer = (STATE.answersSubmitted[q.id] || '').toLowerCase();
    const hits = q.scorer.key_concepts.filter(k => answer.includes(k.toLowerCase())).length;
    const lengthOk = answer.length >= q.scorer.length_threshold;
    const conceptRatio = hits / q.scorer.key_concepts.length;

    let score = 0;
    score += Math.round(conceptRatio * q.scorer.max_points * 0.7);
    if (lengthOk) score += Math.round(q.scorer.max_points * 0.3);
    score = Math.min(q.scorer.max_points, score);

    totalPoints += score;
    maxPoints += q.scorer.max_points;
    questionScores[q.id] = { score, max: q.scorer.max_points, hits, total_concepts: q.scorer.key_concepts.length };

    const good = score >= q.scorer.max_points * 0.6;
    feedback.push({
      dim: q.label,
      good,
      note: good
        ? 'Strong answer — referenced ' + hits + ' key concepts with sufficient detail.'
        : 'Could be stronger — only ' + hits + ' of ' + q.scorer.key_concepts.length + ' key concepts mentioned. ' + (!lengthOk ? 'Answer could use more detail.' : '')
    });
  }

  // Process quality from evidence
  const sorts = STATE.evidence.filter(e => e.event === 'table_sorted').length;
  const filters = STATE.evidence.filter(e => e.event === 'filter_applied').length;
  const charts = STATE.evidence.filter(e => e.event === 'chart_drawn').length;
  const noteWords = notepad.value.trim().split(/\s+/).filter(Boolean).length;

  let processScore = 0;
  processScore += Math.min(25, sorts * 5);
  processScore += Math.min(25, filters * 8);
  processScore += Math.min(25, charts * 4);
  processScore += Math.min(25, noteWords >= 20 ? 25 : noteWords >= 5 ? 12 : 0);

  // Dimension scores
  const explorationScore = Math.min(100, sorts * 12 + filters * 15 + (STATE.filteredRows.length !== DS.rows.length ? 10 : 0));
  const patternScore = questionScores['q1'] ? Math.round((questionScores['q1'].score / questionScores['q1'].max) * 100) : 0;
  const hypothesisScore = questionScores['q2'] ? Math.round((questionScores['q2'].score / questionScores['q2'].max) * 100) : 0;
  const interpScore = questionScores['q3'] ? Math.round((questionScores['q3'].score / questionScores['q3'].max) * 100) : 0;

  const dimScores = {
    exploration: Math.min(100, explorationScore),
    pattern_recognition: patternScore,
    hypothesis_testing: hypothesisScore,
    interpretation: interpScore
  };

  const answerQuality = maxPoints > 0 ? Math.round((totalPoints / maxPoints) * 100) : 0;
  const composite = Math.round(answerQuality * 0.6 + processScore * 0.4);

  const overallLabel = PACK.overall_labels.find(l => composite >= l.min && composite <= l.max) || PACK.overall_labels[0];

  return { questionScores, dimScores, answerQuality, processScore, composite, feedback, overallLabel, sorts, filters, charts, noteWords };
}

// ── SUBMIT ALL ──────────────────────────────
function submitAll() {
  const notepad = document.getElementById('notepad');
  logEvidence('investigation_submitted', {
    answers_count: Object.keys(STATE.answersSubmitted).length,
    note_length: notepad.value.length,
    elapsed_ms: Date.now() - STATE.startTime,
    evidence_events: STATE.evidence.length
  });

  if (STATE.timerInterval) clearInterval(STATE.timerInterval);

  const result = scoreRun();
  renderResults(result);
  document.getElementById('results-overlay').classList.add('open');
}

// ── RENDER RESULTS ──────────────────────────
function renderResults(r) {
  const dimBarsHtml = PACK.dimensions.map(d => {
    const val = r.dimScores[d.id] || 0;
    const barClass = val >= 70 ? 'bar-high' : val >= 40 ? 'bar-mid' : 'bar-low';
    return '<div class="skill-bar-row">' +
      '<div class="skill-bar-header"><span>' + d.icon + ' ' + esc(d.name) + '</span><span>' + val + '</span></div>' +
      '<div class="skill-bar-track"><div class="skill-bar-fill ' + barClass + '" style="width:' + Math.max(2, val) + '%"></div></div>' +
    '</div>';
  }).join('');

  const feedbackHtml = r.feedback.map(f =>
    '<div class="feedback-item">' +
      '<span class="feedback-icon ' + (f.good ? 'feedback-good' : 'feedback-bad') + '">' + (f.good ? '✓' : '✗') + '</span>' +
      '<div><div class="feedback-dim">' + esc(f.dim) + '</div><div class="feedback-note">' + esc(f.note) + '</div></div>' +
    '</div>'
  ).join('');

  const tipsHtml = PACK.coaching_tips.map(t => '<li>' + esc(t) + '</li>').join('');

  document.getElementById('results-container').innerHTML =
    '<div class="results-header">' +
      '<div>' +
        '<div class="results-label">Investigation report</div>' +
        '<div class="results-scenario-title">Data Detective</div>' +
      '</div>' +
      '<div class="composite-block">' +
        '<div class="composite-label">Composite</div>' +
        '<div class="composite-score">' + r.composite + '</div>' +
        '<div class="tier-label">' + r.overallLabel.emoji + ' ' + esc(r.overallLabel.label) + '</div>' +
      '</div>' +
    '</div>' +

    '<div class="stat-grid">' +
      '<div class="stat-box"><div class="stat-box-label">Answers</div><div class="stat-box-value">' + r.answerQuality + '</div></div>' +
      '<div class="stat-box"><div class="stat-box-label">Process</div><div class="stat-box-value">' + r.processScore + '</div></div>' +
      '<div class="stat-box"><div class="stat-box-label">Composite</div><div class="stat-box-value">' + r.composite + '</div></div>' +
    '</div>' +

    '<div class="result-card">' +
      '<div class="result-card-title">Dimension scores</div>' +
      dimBarsHtml +
    '</div>' +

    '<div class="result-card">' +
      '<div class="result-card-title">Question feedback</div>' +
      feedbackHtml +
    '</div>' +

    '<div class="result-card">' +
      '<div class="result-card-title">Investigation process</div>' +
      '<table class="si-table">' +
        '<tr><td>Columns sorted</td><td>' + r.sorts + '</td></tr>' +
        '<tr><td>Filters applied</td><td>' + r.filters + '</td></tr>' +
        '<tr><td>Charts created</td><td>' + r.charts + '</td></tr>' +
        '<tr><td>Notes (words)</td><td>' + r.noteWords + '</td></tr>' +
        '<tr><td>Total time</td><td>' + Math.round((Date.now() - STATE.startTime) / 1000 / 60) + ' min</td></tr>' +
        '<tr><td>Evidence events</td><td>' + STATE.evidence.length + '</td></tr>' +
      '</table>' +
    '</div>' +

    '<div class="result-card">' +
      '<div class="result-card-title">Tips for next time</div>' +
      '<ul class="tip-list">' + tipsHtml + '</ul>' +
    '</div>' +

    '<div class="results-actions">' +
      '<button class="r-btn-primary" onclick="location.reload()">Try again</button>' +
      '<button class="r-btn-ghost" onclick="location.href=\'index.html\'">Back to showcase</button>' +
    '</div>';
}

// ── NAVIGATION ──────────────────────────────
function startWorkspace() {
  STATE.startTime = Date.now();
  logEvidence('investigation_started');
  document.getElementById('screen-landing').classList.add('hidden');
  const ws = document.getElementById('screen-workspace');
  ws.classList.remove('hidden');
  ws.style.display = 'flex';
  startTimer();
  drawChart();
}

function exitToHub() { window.location.href = 'index.html'; }

// ── UTILITIES ───────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── BOOT ────────────────────────────────────
(async () => {
  PACK = await loadPack();
  DS = PACK.dataset;
  STATE.filteredRows = [...DS.rows];
  initFromPack();
})();
</script>
