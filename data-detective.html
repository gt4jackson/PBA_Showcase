<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Detective — PBA Showcase</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ETS 2024 Rebrand Palette */
  --bg: #1a212b;
  --surface: #242e3d;
  --surface-alt: #2c3849;
  --surface-hover: #344256;
  --text: #f2e9d8;
  --text-secondary: #b8b0a0;
  --text-tertiary: #7e7a72;
  --border: rgba(242,233,216,0.08);
  --border-strong: rgba(242,233,216,0.15);
  --accent: #4dd3fe;
  --accent-light: rgba(77,211,254,0.12);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.12);
  --emerald: #468254;
  --emerald-bg: rgba(70,130,84,0.12);
  --rose: #f43f5e;
  --rose-bg: rgba(244,63,94,0.12);
  --violet: #9e9eff;
  --violet-bg: rgba(158,158,255,0.12);
  --teal: #103d4b;
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: 'Beausite Classic', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  padding: 8px;
  display: flex;
  flex-direction: column;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: rgba(242,233,216,0.15); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── TOP BAR ─────────────────────────────── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); border-radius: 10px 10px 0 0; flex-shrink: 0;
}
.top-bar-left { display: flex; align-items: center; gap: 12px; }
.top-bar-right { display: flex; align-items: center; gap: 10px; }
.back-btn {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 13px; padding: 4px 8px;
  border-radius: var(--radius-sm); transition: all 0.15s;
}
.back-btn:hover { color: var(--text); background: var(--surface-alt); }
.scenario-title { font-size: 14px; font-weight: 600; }
.tag {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  background: var(--surface-alt); color: var(--text-secondary); border: 1px solid var(--border);
}
.progress-indicator {
  font-size: 11px; padding: 3px 10px; border-radius: 4px; font-weight: 600;
  background: var(--accent-light); color: var(--accent); border: 1px solid rgba(77,211,254,0.25);
}
.info-btn {
  font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm);
  border: 1px solid rgba(158,158,255,0.3); cursor: pointer; font-weight: 500;
  background: var(--violet-bg); color: var(--violet); transition: all 0.15s;
}
.info-btn:hover { background: rgba(158,158,255,0.2); }

/* ── MAIN LAYOUT ─────────────────────────── */
.workspace {
  flex: 1; display: grid;
  grid-template-columns: 1fr minmax(280px, 320px);
  grid-template-rows: 1fr 1fr;
  gap: 8px; padding: 6px; background: var(--bg); min-height: 0;
  overflow: hidden; border-radius: 0 0 10px 10px; max-width: 100vw;
}

.panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  display: flex; flex-direction: column; min-height: 0;
  overflow: hidden;
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}

.panel-header-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-tertiary);
}

.panel-body { flex: 1; overflow: auto; min-height: 0; }

/* ── DATA TABLE ──────────────────────────── */
.data-panel { grid-column: 1; grid-row: 1; }

.table-controls {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
}

.filter-select, .filter-input {
  font-size: 11px; padding: 4px 8px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-family: inherit; outline: none;
}
.filter-select:focus, .filter-input:focus { border-color: var(--accent); }

.filter-btn {
  font-size: 11px; padding: 4px 10px; border-radius: 4px;
  border: none; background: var(--accent); color: var(--bg);
  cursor: pointer; font-weight: 600;
}

.clear-btn {
  font-size: 11px; padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--surface-alt);
  color: var(--text-secondary); cursor: pointer;
}

.data-table-wrap { overflow: auto; flex: 1; min-height: 0; }

.data-table {
  width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px;
}

.data-table th {
  position: sticky; top: 0; background: var(--surface); z-index: 2;
  text-align: left; font-weight: 600; padding: 8px 10px;
  border-bottom: 2px solid var(--border-strong); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-secondary);
  cursor: pointer; user-select: none; white-space: nowrap;
}

.data-table th:hover { color: var(--accent); }
.data-table th .sort-arrow { margin-left: 4px; font-size: 10px; opacity: 0.5; }
.data-table th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

.data-table td {
  padding: 7px 10px; border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  color: var(--text-secondary); white-space: nowrap;
}
.data-table td:last-child { border-right: none; }

.data-table th {
  border-right: 1px solid var(--border);
}
.data-table th:last-child { border-right: none; }

.data-table tr:hover td { background: var(--surface-alt); }

.data-table td.numeric { text-align: center; font-variant-numeric: tabular-nums; }
.data-table th.numeric { text-align: center; }

.row-count {
  font-size: 11px; color: var(--text-tertiary); padding: 6px 14px;
  background: var(--surface); border-top: 1px solid var(--border);
}

/* ── CHART BUILDER ───────────────────────── */
.chart-panel { grid-column: 1; grid-row: 2; }

.chart-controls {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
}

.chart-type-btn {
  font-size: 11px; padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
}
.chart-type-btn:hover { border-color: var(--accent); color: var(--text-secondary); }
.chart-type-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.chart-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px; min-height: 0;
}

.chart-canvas { width: 100%; height: 100%; }

.chart-empty {
  text-align: center; color: var(--text-tertiary); font-size: 13px;
}

/* ── RIGHT COLUMN: QUESTIONS + NOTEPAD ──── */
.right-col {
  grid-column: 2; grid-row: 1 / 3;
  display: flex; flex-direction: column; min-height: 0;
  background: var(--bg); overflow: hidden;
}

.question-section {
  flex: 1; min-height: 0; overflow-y: auto; border-bottom: 1px solid var(--border);
}

.question-card {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}

.question-num {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 4px;
}

.question-num.descriptive { color: var(--accent); }
.question-num.diagnostic { color: var(--amber); }
.question-num.prescriptive { color: var(--emerald); }

.question-type-label {
  font-size: 10px; padding: 2px 6px; border-radius: 3px;
  margin-left: 6px; font-weight: 500;
}

.question-text {
  font-size: 13px; line-height: 1.6; color: var(--text); margin-bottom: 10px;
}

.question-hint {
  font-size: 11px; color: var(--text-tertiary); font-style: italic;
  margin-bottom: 10px; line-height: 1.5;
}

.answer-area textarea {
  width: 100%; background: var(--surface-alt); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 10px; font-size: 12px; line-height: 1.6;
  resize: none; outline: none; font-family: inherit; min-height: 60px;
}

.answer-area textarea:focus { border-color: var(--accent); }

.answer-status {
  font-size: 11px; margin-top: 4px; display: flex;
  align-items: center; justify-content: space-between;
}

.submit-answer-btn {
  font-size: 11px; padding: 4px 12px; border-radius: 4px;
  border: none; background: var(--accent); color: var(--bg);
  cursor: pointer; font-weight: 600; transition: all 0.15s;
}
.submit-answer-btn:hover { background: #3bbde5; }
.submit-answer-btn:disabled { background: var(--surface-alt); color: var(--text-tertiary); cursor: not-allowed; }

.answer-submitted {
  font-size: 11px; color: var(--emerald); font-weight: 500;
}

/* ── NOTEPAD ─────────────────────────────── */
.notepad-section {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

.notepad-area {
  flex: 1; min-height: 0;
}

.notepad-area textarea {
  width: 100%; height: 100%; background: var(--bg);
  color: var(--text); border: none; padding: 12px 16px;
  font-size: 12px; line-height: 1.7; resize: none; outline: none;
  font-family: inherit;
}

.notepad-area textarea::placeholder { color: var(--text-tertiary); }

/* ── FINAL SUBMIT BAR ──────────────────── */
.submit-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--surface);
  border-top: 1px solid var(--border); flex-shrink: 0;
}

.submit-bar-info { font-size: 12px; color: var(--text-tertiary); }

.submit-final-btn {
  font-size: 13px; padding: 8px 20px; border-radius: var(--radius-sm);
  border: none; background: var(--accent); color: var(--bg);
  cursor: pointer; font-weight: 600; transition: all 0.15s;
}
.submit-final-btn:hover { background: #3bbde5; }
.submit-final-btn:disabled { background: var(--surface-alt); color: var(--text-tertiary); cursor: not-allowed; }

/* ── LANDING SCREEN ──────────────────────── */
.landing-screen {
  flex: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 40px;
}
.landing-inner { max-width: 600px; }
.landing-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--amber); margin-bottom: 12px; }
.landing-title {
  font-family: 'Speckless', Georgia, 'Times New Roman', serif;
  font-size: 32px; font-weight: 400; margin-bottom: 14px; line-height: 1.3;
}
.landing-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
.landing-dims { font-size: 12px; color: var(--text-tertiary); margin-bottom: 24px; line-height: 1.8; }
.splash-back {
  position: absolute; top: 16px; left: 16px;
  display: flex; align-items: center; gap: 6px;
  color: var(--text-tertiary); text-decoration: none; font-size: 13px;
  padding: 6px 10px; border-radius: 6px; transition: all 0.15s;
}
.splash-back:hover { color: var(--text); background: rgba(255,255,255,0.08); }

/* ── TUTORIAL SYSTEM ─────────────────────── */
.tut-overlay{display:none;position:fixed;inset:0;z-index:9000}
.tut-overlay.active{display:block}
.tut-dim{position:fixed;background:rgba(0,0,0,.72)}
.tut-ring{position:fixed;border:2px solid var(--accent,#4dd3fe);border-radius:6px;box-shadow:0 0 16px rgba(77,211,254,.35);pointer-events:none;transition:all .2s}
.tut-card{position:fixed;background:var(--surface,#242e3d);border:1px solid rgba(77,211,254,.4);border-radius:10px;padding:16px 18px;max-width:280px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9002;transition:top .2s,left .2s}
.tut-step-count{font-size:11px;color:var(--text-tertiary,#666);margin-bottom:4px}
.tut-card h4{font-size:14px;font-weight:600;color:var(--text,#f2e9d8);margin:0 0 7px;font-family:Georgia,serif}
.tut-card p{font-size:12px;color:var(--text-secondary,#b8b0a0);line-height:1.65;margin:0 0 14px}
.tut-actions{display:flex;gap:8px;justify-content:space-between;align-items:center}
.tut-skip-btn{background:none;border:none;color:var(--text-tertiary,#666);font-size:12px;cursor:pointer;padding:5px 0}
.tut-skip-btn:hover{color:var(--text,#eee);text-decoration:underline}
.tut-next-btn{background:var(--accent,#4dd3fe);color:#0a1628;border:none;font-size:12px;font-weight:700;cursor:pointer;padding:7px 14px;border-radius:5px}
.tut-next-btn:hover{background:#3bbde5}
.tut-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:14px 0;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid rgba(255,255,255,.08);cursor:pointer}
.tut-toggle-label{font-size:13px;color:var(--text-secondary,#b8b0a0);pointer-events:none}
.tut-switch{position:relative;width:36px;height:20px;flex-shrink:0}
.tut-switch input{opacity:0;width:0;height:0;position:absolute}
.tut-track{position:absolute;inset:0;background:rgba(255,255,255,.08);border-radius:20px;border:1px solid rgba(255,255,255,.15);cursor:pointer;transition:.2s}
.tut-track:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:rgba(255,255,255,.3);border-radius:50%;transition:.2s}
.tut-switch input:checked+.tut-track{background:rgba(77,211,254,.15);border-color:var(--accent,#4dd3fe)}
.tut-switch input:checked+.tut-track:before{transform:translateX(16px);background:var(--accent,#4dd3fe)}

.landing-start-btn {
  padding: 10px 24px; background: var(--accent); color: var(--bg);
  border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.landing-start-btn:hover { background: #3bbde5; }

/* ── RESULTS OVERLAY ─────────────────────── */
.results-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 200;
  overflow-y: auto; display: none; padding: 40px 20px;
}
.results-overlay.open { display: block; }
.results-container { max-width: 720px; margin: 0 auto; }

.results-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
.results-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 4px; }
.results-scenario-title { font-family: 'Speckless', Georgia, serif; font-size: 22px; font-weight: 400; }

.composite-block { text-align: right; }
.composite-label { font-size: 11px; color: var(--text-tertiary); }
.composite-score { font-size: 40px; font-weight: 700; line-height: 1; }
.tier-label { font-size: 13px; font-weight: 600; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
.stat-box-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-tertiary); }
.stat-box-value { font-size: 24px; font-weight: 600; margin-top: 2px; }

.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
.result-card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 12px; }

.skill-bar-row { margin-bottom: 10px; }
.skill-bar-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.skill-bar-track { height: 8px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; }
.skill-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.bar-high { background: var(--emerald); }
.bar-mid { background: var(--accent); }
.bar-low { background: var(--rose); }

.feedback-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 13px; }
.feedback-icon { flex-shrink: 0; margin-top: 2px; }
.feedback-good { color: var(--emerald); }
.feedback-bad { color: var(--rose); }
.feedback-dim { font-weight: 600; color: var(--text); }
.feedback-note { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

.tip-list { list-style: disc; padding-left: 20px; color: var(--text-secondary); font-size: 12px; line-height: 1.8; }

.results-actions { display: flex; gap: 10px; margin-top: 24px; }
.results-actions button {
  padding: 8px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.r-btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.r-btn-primary:hover { background: #3bbde5; }
.r-btn-ghost { background: var(--surface-alt); color: var(--text-secondary); }
.r-btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

/* ── INFO DRAWER ─────────────────────────── */
.info-drawer {
  position: fixed; top: 0; right: -380px; width: 380px; height: 100vh;
  background: var(--surface); border-left: 1px solid var(--border-strong);
  z-index: 90; display: flex; flex-direction: column; transition: right 0.25s ease;
}
.info-drawer.open { right: 0; }
.info-drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.info-drawer-title { font-size: 14px; font-weight: 600; }
.info-drawer-close {
  background: none; border: none; color: var(--text-tertiary);
  font-size: 18px; cursor: pointer; padding: 4px;
}
.info-drawer-close:hover { color: var(--text); }
.info-drawer-body { flex: 1; overflow-y: auto; padding: 18px; }
.info-drawer-body h4 { font-size: 13px; font-weight: 700; margin: 16px 0 8px; }
.info-drawer-body h4:first-child { margin-top: 0; }
.info-drawer-body p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; }
.info-tabs { display: flex; gap: 1px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.info-tab { background: none; border: none; color: var(--text-tertiary); font-size: 12px; font-weight: 500; cursor: pointer; padding: 8px 12px; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.info-tab:hover { color: var(--text); }
.info-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.info-tab-pane { display: none; }
.info-tab-pane.active { display: block; }
.json-viewer { font-size: 11px; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; white-space: pre-wrap; word-break: break-word; color: var(--accent); background: var(--bg); border: 1px solid rgba(77,211,254,0.15); border-radius: 6px; padding: 12px; line-height: 1.5; }
.si-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 14px; }
.si-table th, .si-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
.si-table th { color: var(--text-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.si-table td { color: var(--text-secondary); }

/* ── CONSTRUCT BANNER ──────────────────── */
.construct-banner {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 6px 16px; display: flex; align-items: center; justify-content: center;
  gap: 8px; font-size: 11px; color: var(--text-tertiary); z-index: 50;
}
.construct-banner-name { font-weight: 600; color: var(--accent); }
.construct-banner a { color: var(--violet); text-decoration: none; cursor: pointer; }
.construct-banner a:hover { text-decoration: underline; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════ -->
<!--  CONSTRUCT PACK LOADER                        -->
<!--  Default: scenarios/data-detective-data-reasoning.json -->
<!--  Override via URL param: ?scenario=path.json  -->
<!-- ══════════════════════════════════════════════ -->
<script>
const DEFAULT_SCENARIO = 'scenarios/data-detective-data-reasoning.json';

const CONSTRUCT_PACK_INLINE = {
  construct_id: "data_reasoning",
  construct_name: "Data Reasoning",
  construct_description: "The ability to explore, interpret, and draw sound conclusions from data — including recognizing patterns, questioning anomalies, and translating analysis into actionable recommendations.",

  pba_category: {
    id: 3,
    name: "Process/Demonstration Assessment",
    description: "Tasks that assess the process of problem-solving, not just the final answer. The system observes and logs how you investigate."
  },

  secondary_dimensions: {
    stakes: "Low (formative / demonstration)",
    temporal: "Single-session, 12-15 min",
    collaboration: "Individual",
    problem_structure: "Ill-structured",
    authenticity: "Proximal (simulated business data)",
    scoring: "Hybrid (rule-based + process quality)"
  },

  dimensions: [
    { id: "exploration", name: "Exploration", icon: "🔍", description: "Do you examine the data broadly before jumping to conclusions?", color: "#4dd3fe", weight: 0.20 },
    { id: "pattern_recognition", name: "Pattern Recognition", icon: "📊", description: "Can you identify trends, outliers, and meaningful patterns?", color: "#f59e0b", weight: 0.25 },
    { id: "hypothesis_testing", name: "Hypothesis Testing", icon: "🧪", description: "Do you test your ideas against the data rather than assuming?", color: "#9e9eff", weight: 0.25 },
    { id: "interpretation", name: "Interpretation & Recommendation", icon: "💡", description: "Can you translate findings into clear, evidence-backed recommendations?", color: "#468254", weight: 0.30 }

<script>
'use strict';

// ── PACK LOADER ────────────────────────────────
async function loadPack() {
  const params = new URLSearchParams(window.location.search);
  const url = params.get('scenario') || DEFAULT_SCENARIO;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    return await resp.json();
  } catch (e) {
    console.warn('Could not fetch scenario JSON (' + url + '), using inline fallback:', e.message);
    return CONSTRUCT_PACK_INLINE;
  }
}

let PACK = null;
let DS = null;

const STATE = {
  evidence: [],
  startTime: null,
  sortCol: null,
  sortAsc: true,
  filterCol: null,
  filterVal: '',
  filteredRows: [],
  answers: {},
  answersSubmitted: {},
  chartType: 'bar',
  chartX: null,
  chartY: null,
  infoOpen: false,
  noteSnapshots: 0
};

// ── EVIDENCE LOGGER ─────────────────────────
function logEvidence(event, data = {}) {
  STATE.evidence.push({
    event, timestamp: new Date().toISOString(),
    elapsed_ms: STATE.startTime ? Date.now() - STATE.startTime : 0,
    ...data
  });
}

// ── INIT FROM PACK ──────────────────────────
function initFromPack() {
  document.title = 'Data Detective — PBA Showcase';
  document.getElementById('landing-category').textContent = PACK.pba_category.name;
  document.getElementById('landing-title').textContent = 'Data Detective';
  document.getElementById('landing-desc').textContent = DS.description;
  const dimsHtml = PACK.dimensions.map(d => `${d.icon} <strong>${d.name}</strong> (${Math.round(d.weight*100)}%) — ${d.description}`).join('<br>');
  document.getElementById('landing-dims').innerHTML = 'Skills assessed:<br>' + dimsHtml;

  document.getElementById('banner-construct-name').textContent = PACK.construct_name;
  document.getElementById('ws-title').textContent = 'Data Detective';
  document.getElementById('ws-dataset-name').textContent = DS.name;

  // Filter column dropdown
  const filterCol = document.getElementById('filter-col');
  DS.columns.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.label;
    filterCol.appendChild(opt);
  });

  // Chart axis dropdowns
  const chartX = document.getElementById('chart-x');
  const chartY = document.getElementById('chart-y');
  DS.columns.forEach(c => {
    const optX = document.createElement('option'); optX.value = c.id; optX.textContent = c.label;
    const optY = document.createElement('option'); optY.value = c.id; optY.textContent = c.label;
    chartX.appendChild(optX);
    chartY.appendChild(optY);
  });
  // Defaults: x = quarter, y = revenue (or first text and first number)
  const textCol = DS.columns.find(c => c.type === 'text');
  const numCol = DS.columns.find(c => c.type === 'number');
  if (textCol) chartX.value = textCol.id;
  if (numCol) chartY.value = numCol.id;
  STATE.chartX = chartX.value;
  STATE.chartY = chartY.value;

  chartX.addEventListener('change', () => { STATE.chartX = chartX.value; drawChart(); logEvidence('chart_axis_changed', { axis: 'x', value: chartX.value }); });
  chartY.addEventListener('change', () => { STATE.chartY = chartY.value; drawChart(); logEvidence('chart_axis_changed', { axis: 'y', value: chartY.value }); });

  renderTable();
  renderQuestions();
  populateInfoDrawer();
  drawChart();
}

// ── DATA TABLE ──────────────────────────────
function renderTable() {
  const thead = document.getElementById('data-thead');
  const tbody = document.getElementById('data-tbody');

  thead.innerHTML = '<tr>' + DS.columns.map(c => {
    const isSorted = STATE.sortCol === c.id;
    const arrow = isSorted ? (STATE.sortAsc ? '▲' : '▼') : '⇅';
    return `<th class="${isSorted ? 'sorted' : ''}${c.type === 'number' ? ' numeric' : ''}" onclick="sortBy('${c.id}')">${esc(c.label)} <span class="sort-arrow">${arrow}</span></th>`;
  }).join('') + '</tr>';

  const rows = STATE.filteredRows;
  tbody.innerHTML = rows.map(r => '<tr>' + DS.columns.map(c => {
    const val = r[c.id];
    return `<td class="${c.type === 'number' ? 'numeric' : ''}">${esc(String(val))}</td>`;
  }).join('') + '</tr>').join('');

  document.getElementById('row-count-header').textContent = `${rows.length} rows`;
  document.getElementById('row-count-footer').textContent = `Showing ${rows.length} of ${DS.rows.length} rows`;
}

function sortBy(colId) {
  if (STATE.sortCol === colId) {
    STATE.sortAsc = !STATE.sortAsc;
  } else {
    STATE.sortCol = colId;
    STATE.sortAsc = true;
  }

  const col = DS.columns.find(c => c.id === colId);
  STATE.filteredRows.sort((a, b) => {
    let va = a[colId], vb = b[colId];
    if (col.type === 'number') { va = Number(va); vb = Number(vb); }
    else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    if (va < vb) return STATE.sortAsc ? -1 : 1;
    if (va > vb) return STATE.sortAsc ? 1 : -1;
    return 0;
  });

  logEvidence('table_sorted', { column: colId, direction: STATE.sortAsc ? 'asc' : 'desc' });
  renderTable();
}

function applyFilter() {
  const col = document.getElementById('filter-col').value;
  const val = document.getElementById('filter-value').value.trim().toLowerCase();
  if (!val) { clearFilter(); return; }

  STATE.filterCol = col;
  STATE.filterVal = val;

  const colDef = DS.columns.find(c => c.id === col);
  STATE.filteredRows = DS.rows.filter(r => {
    const cell = String(r[col]).toLowerCase();
    if (colDef.type === 'number') {
      return cell.includes(val) || cell === val;
    }
    return cell.includes(val);
  });

  logEvidence('filter_applied', { column: col, value: val, rows_remaining: STATE.filteredRows.length });
  renderTable();
  drawChart();
}

function clearFilter() {
  STATE.filterCol = null;
  STATE.filterVal = '';
  document.getElementById('filter-value').value = '';
  STATE.filteredRows = [...DS.rows];
  if (STATE.sortCol) {
    sortBy(STATE.sortCol); // re-apply sort
  }
  logEvidence('filter_cleared');
  renderTable();
  drawChart();
}

// ── CHART BUILDER (Canvas) ──────────────────
function setChartType(type) {
  STATE.chartType = type;
  document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.toggle('active', b.dataset.chart === type));
  logEvidence('chart_type_changed', { type });
  drawChart();
}

function drawChart() {
  const canvas = document.getElementById('chart-canvas');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(2, 2);

  const w = rect.width;
  const h = rect.height;
  const pad = { top: 20, right: 20, bottom: 50, left: 60 };

  ctx.clearRect(0, 0, w, h);

  const rows = STATE.filteredRows;
  const xCol = STATE.chartX;
  const yCol = STATE.chartY;
  const yColDef = DS.columns.find(c => c.id === yCol);

  if (!yColDef || yColDef.type !== 'number') {
    ctx.fillStyle = '#7e7a72';
    ctx.font = '13px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Select a numeric column for Y axis', w/2, h/2);
    return;
  }

  // Aggregate: group by X, sum Y
  const groups = {};
  rows.forEach(r => {
    const key = String(r[xCol]);
    if (!groups[key]) groups[key] = { sum: 0, count: 0 };
    groups[key].sum += Number(r[yCol]) || 0;
    groups[key].count++;
  });

  const labels = Object.keys(groups);
  const values = labels.map(k => groups[k].sum);
  if (labels.length === 0) return;

  const maxVal = Math.max(...values) * 1.1 || 1;
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;

  // Grid lines
  ctx.strokeStyle = 'rgba(242,233,216,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + plotH - (plotH * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#7e7a72';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * i / 4).toLocaleString(), pad.left - 8, y + 3);
  }

  // Axis labels
  ctx.fillStyle = '#7e7a72';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';

  const barW = Math.min(40, (plotW / labels.length) * 0.6);
  const gap = plotW / labels.length;
  const colors = ['#4dd3fe', '#9e9eff', '#f59e0b', '#468254', '#f43f5e', '#b8b0a0'];

  if (STATE.chartType === 'bar') {
    labels.forEach((label, i) => {
      const x = pad.left + gap * i + gap / 2;
      const barH = (values[i] / maxVal) * plotH;
      const y = pad.top + plotH - barH;

      ctx.fillStyle = colors[i % colors.length];
      ctx.fillRect(x - barW/2, y, barW, barH);

      ctx.fillStyle = '#b8b0a0';
      ctx.font = '10px system-ui';
      ctx.textAlign = 'center';
      ctx.save();
      ctx.translate(x, pad.top + plotH + 12);
      if (label.length > 8) ctx.rotate(-0.4);
      ctx.fillText(label, 0, 0);
      ctx.restore();

      // Value on top
      ctx.fillStyle = '#f2e9d8';
      ctx.font = '10px system-ui';
      ctx.fillText(Math.round(values[i]).toLocaleString(), x, y - 6);
    });
  } else {
    // Line chart
    ctx.strokeStyle = '#4dd3fe';
    ctx.lineWidth = 2;
    ctx.beginPath();
    labels.forEach((label, i) => {
      const x = pad.left + gap * i + gap / 2;
      const y = pad.top + plotH - (values[i] / maxVal) * plotH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);

      ctx.fillStyle = '#b8b0a0';
      ctx.font = '10px system-ui';
      ctx.textAlign = 'center';
      ctx.save();
      ctx.translate(x, pad.top + plotH + 12);
      if (label.length > 8) ctx.rotate(-0.4);
      ctx.fillText(label, 0, 0);
      ctx.restore();
    });
    ctx.stroke();

    // Dots
    labels.forEach((label, i) => {
      const x = pad.left + gap * i + gap / 2;
      const y = pad.top + plotH - (values[i] / maxVal) * plotH;
      ctx.fillStyle = '#4dd3fe';
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f2e9d8';
      ctx.font = '10px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(Math.round(values[i]).toLocaleString(), x, y - 10);
    });
  }

  logEvidence('chart_drawn', { x_axis: xCol, y_axis: yCol, type: STATE.chartType, data_points: labels.length });
}

// ── QUESTIONS ───────────────────────────────
function renderQuestions() {

      <div class="question-text">${esc(q.text)}</div>

function onAnswerInput(qId) {
  const text = document.getElementById('answer-' + qId).value.trim();
  document.getElementById('btn-' + qId).disabled = text.length < 10;
  STATE.answers[qId] = text;
}

function submitAnswer(qId) {
  const text = STATE.answers[qId] || '';
  STATE.answersSubmitted[qId] = text;
  document.getElementById('status-' + qId).classList.remove('hidden');
  document.getElementById('btn-' + qId).disabled = true;
  document.getElementById('btn-' + qId).textContent = 'Submitted';
  document.getElementById('answer-' + qId).readOnly = true;
  document.getElementById('answer-' + qId).style.opacity = '0.7';

  logEvidence('answer_submitted', { question_id: qId, answer_length: text.length });
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(STATE.answersSubmitted).length;
  const total = PACK.questions.length;
  document.getElementById('ws-progress').textContent = `${answered} / ${total} answered`;
  document.getElementById('submit-final-btn').disabled = answered < total;
  document.getElementById('submit-bar-info').textContent = answered < total
    ? `Answer all ${total} questions to submit`
    : 'All questions answered — ready to submit!';
}

// ── SCORING ENGINE ──────────────────────────
function scoreRun() {
  const feedback = [];
  let totalPoints = 0;
  let maxPoints = 0;
  const questionScores = {};

  for (const q of PACK.questions) {
    const answer = (STATE.answersSubmitted[q.id] || '').toLowerCase();
    const hits = q.scorer.key_concepts.filter(k => answer.includes(k.toLowerCase())).length;
    const lengthOk = answer.length >= q.scorer.length_threshold;
    const conceptRatio = hits / q.scorer.key_concepts.length;

    let score = 0;
    score += Math.round(conceptRatio * q.scorer.max_points * 0.7);
    if (lengthOk) score += Math.round(q.scorer.max_points * 0.3);
    score = Math.min(q.scorer.max_points, score);

    totalPoints += score;
    maxPoints += q.scorer.max_points;
    questionScores[q.id] = { score, max: q.scorer.max_points, hits, total_concepts: q.scorer.key_concepts.length };

    const good = score >= q.scorer.max_points * 0.6;
    feedback.push({
      dim: q.label,
      good,
      note: good
        ? `Strong answer — referenced ${hits} key concepts with sufficient detail.`
        : `Could be stronger — only ${hits} of ${q.scorer.key_concepts.length} key concepts mentioned. ${!lengthOk ? 'Answer could use more detail.' : ''}`
    });
  }

  // Process quality from evidence
  const sorts = STATE.evidence.filter(e => e.event === 'table_sorted').length;
  const filters = STATE.evidence.filter(e => e.event === 'filter_applied').length;
  const charts = STATE.evidence.filter(e => e.event === 'chart_drawn').length;
  const noteWords = notepad.value.trim().split(/\s+/).filter(Boolean).length;

  let processScore = 0;
  processScore += Math.min(25, sorts * 5);
  processScore += Math.min(25, filters * 8);
  processScore += Math.min(25, charts * 4);
  processScore += Math.min(25, noteWords >= 20 ? 25 : noteWords >= 5 ? 12 : 0);

  // Dimension scores
  const explorationScore = Math.min(100, sorts * 12 + filters * 15 + (STATE.filteredRows.length !== DS.rows.length ? 10 : 0));
  const patternScore = questionScores['q1'] ? Math.round((questionScores['q1'].score / questionScores['q1'].max) * 100) : 0;
  const hypothesisScore = questionScores['q2'] ? Math.round((questionScores['q2'].score / questionScores['q2'].max) * 100) : 0;
  const interpScore = questionScores['q3'] ? Math.round((questionScores['q3'].score / questionScores['q3'].max) * 100) : 0;

  const dimScores = {
    exploration: Math.min(100, explorationScore),
    pattern_recognition: patternScore,
    hypothesis_testing: hypothesisScore,
    interpretation: interpScore
  };

  const answerQuality = maxPoints > 0 ? Math.round((totalPoints / maxPoints) * 100) : 0;
  const composite = Math.round(answerQuality * 0.6 + processScore * 0.4);

  const overallLabel = PACK.overall_labels.find(l => composite >= l.min && composite <= l.max) || PACK.overall_labels[0];

  return { questionScores, dimScores, answerQuality, processScore, composite, feedback, overallLabel, sorts, filters, charts, noteWords };
}

// ── SUBMIT ALL ──────────────────────────────
function submitAll() {
  logEvidence('investigation_submitted', {
    answers_count: Object.keys(STATE.answersSubmitted).length,
    note_length: notepad.value.length,

}

// ── TUTORIAL ────────────────────────────────
const TUTORIAL_STEPS = [
  { target: '.data-panel',   title: 'Data Table',  text: 'Explore this dataset by sorting columns and filtering rows. Look for patterns, outliers, and anomalies in the numbers.' },
  { target: '.chart-panel',  title: 'Chart Builder', text: 'Visualize relationships between columns. Try different axis combinations — charts often reveal what tables hide.' },
  { target: '.right-col',    title: 'Questions & Notepad', text: 'Answer the three investigation questions here. Use the notepad to track your working hypotheses as you explore.' },
];
const TUT = { step: 0, steps: [], done: null };
function tutStart(steps, onDone) { TUT.steps = steps; TUT.done = onDone; TUT.step = 0; document.getElementById('tut-overlay').classList.add('active'); tutShow(0); }
function tutShow(i) {
  const s = TUT.steps[i], n = TUT.steps.length, PAD = 8, VW = window.innerWidth, VH = window.innerHeight;
  document.getElementById('tut-step-count').textContent = `${i+1} of ${n}`;
  document.getElementById('tut-title').textContent = s.title;
  document.getElementById('tut-text').textContent = s.text;
  document.getElementById('tut-next-btn').textContent = i === n-1 ? 'Start Task →' : 'Next →';
  const el = s.target ? document.querySelector(s.target) : null;
  if (el) {
    const r = el.getBoundingClientRect();
    const x1 = Math.max(0,r.left-PAD), y1 = Math.max(0,r.top-PAD), x2 = Math.min(VW,r.right+PAD), y2 = Math.min(VH,r.bottom+PAD);
    document.getElementById('tut-dim-top').style.cssText = `left:0;top:0;right:0;height:${y1}px`;
    document.getElementById('tut-dim-bottom').style.cssText = `left:0;bottom:0;right:0;height:${VH-y2}px`;
    document.getElementById('tut-dim-left').style.cssText = `left:0;top:${y1}px;width:${x1}px;height:${y2-y1}px`;
    document.getElementById('tut-dim-right').style.cssText = `right:0;top:${y1}px;width:${VW-x2}px;height:${y2-y1}px`;
    const ring = document.getElementById('tut-ring'); ring.style.cssText = `left:${x1}px;top:${y1}px;width:${x2-x1}px;height:${y2-y1}px`; ring.style.display='';
    const card = document.getElementById('tut-card'), cW=280, cH=160;
    let cx = x2+14; if(cx+cW>VW-12) cx=x1-cW-14; if(cx<12) cx=Math.round((VW-cW)/2);
    let cy = Math.max(12,Math.min(y1+(r.height/2)-(cH/2),VH-cH-12));
    card.style.cssText = `left:${cx}px;top:${cy}px;transform:none`;
  } else {
    ['tut-dim-top','tut-dim-bottom','tut-dim-left','tut-dim-right'].forEach(id=>document.getElementById(id).style.cssText='inset:0');
    document.getElementById('tut-ring').style.display='none';
    document.getElementById('tut-card').style.cssText='left:50%;top:50%;transform:translate(-50%,-50%)';
  }
}
function tutNext() { TUT.step++; TUT.step>=TUT.steps.length ? tutEnd() : tutShow(TUT.step); }
function tutSkip() { tutEnd(); }
function tutEnd() { document.getElementById('tut-overlay').classList.remove('active'); if(TUT.done) TUT.done(); }

// ── NAVIGATION ──────────────────────────────
function startWorkspace() {
  const useTut = document.getElementById('tut-enabled')?.checked !== false;
  document.getElementById('screen-landing').style.display = 'none';

    tutStart(TUTORIAL_STEPS, () => {});

}

function initWorkspace() {

}
