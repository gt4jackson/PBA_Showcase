<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ----------------------------- Scenario loading ----------------------------- */

const SCENARIO_FILES = [
  { id: "market_entry_memo", file: "scenarios/scenario_market_entry.json", fallbackScriptId: "fallback-scenario-market_entry" },
  { id: "customer_queue", file: "scenarios/scenario_customer_queue.json", fallbackScriptId: "fallback-scenario-customer_queue" },
  { id: "product_launch", file: "scenarios/scenario_product_launch.json", fallbackScriptId: "fallback-scenario-product_launch" },
  { id: "agent_code_review", file: "scenarios/scenario_agent_code_review.json", fallbackScriptId: "fallback-scenario-agent_code_review" },
  { id: "agent_workflow_spec", file: "scenarios/scenario_agent_workflow_spec.json", fallbackScriptId: "fallback-scenario-agent_workflow_spec" },
  { id: "automation_audit", file: "scenarios/scenario_automation_audit.json", fallbackScriptId: "fallback-scenario-automation_audit" },
  { id: "agent_handoff", file: "scenarios/scenario_agent_handoff.json", fallbackScriptId: "fallback-scenario-agent_handoff" }
];

async function loadScenario(entry) {
  try {
    const res = await fetch(entry.file, { cache: "no-store" });
    if (!res.ok) throw new Error("fetch failed");
    return await res.json();
  } catch (e) {
    const el = document.getElementById(entry.fallbackScriptId);
    if (el && el.textContent.trim() && !el.textContent.includes("__FALLBACK_SCENARIO_JSON__")) {
      try { return JSON.parse(el.textContent); } catch {}
    }
    throw new Error("Could not load scenario. Serve this folder over HTTP (e.g. `python3 -m http.server`) or add the fallback scenario.");
  }
}

/* ------------------------------- Utilities -------------------------------- */

function classNames(...xs) { return xs.filter(Boolean).join(" "); }

function wordCount(s) {
  return (s || "").trim().split(/\s+/).filter(Boolean).length;
}

function containsAny(text, keywords) {
  if (!keywords || !keywords.length) return false;
  const t = (text || "").toLowerCase();
  return keywords.some(k => t.includes(k.toLowerCase()));
}

function allMatch(text, keywords) {
  if (!keywords || !keywords.length) return false;
  const t = (text || "").toLowerCase();
  return keywords.every(k => t.includes(k.toLowerCase()));
}

/* ------------------------------ Scoring engine ---------------------------- */

/**
 * Deterministic scorer for the Market Entry scenario.
 * Returns { rubricScores, skillScores, composite, feedback, traps }.
 * This is intentionally data-driven against the scenario's rubric so later
 * scenarios can reuse (most of) it.
 */
function scoreRun(scenario, run) {
  const memo = run.submissions[scenario.deliverable.id] || "";
  const memoLower = memo.toLowerCase();
  const wc = wordCount(memo);

  const feedback = [];
  const rubricScores = {};

  // --- Handle empty submission ---
  if (wc === 0) {
    for (const dim of scenario.rubric.dimensions) {
      rubricScores[dim.id] = { score: 0, weight: dim.weight, name: dim.name };
    }
    feedback.push({
      dim: "Deliverable",
      good: false,
      note: "No deliverable submitted. The memo was empty — all output quality dimensions scored 0."
    });

    const toolCalls = run.toolCalls || [];
    const plannedSteps = (run.plan || []).length;

    let processQuality = 0;
    processQuality += plannedSteps >= 3 ? 35 : plannedSteps >= 1 ? 15 : 0;
    const usedSearchOrExpertOnTariff = toolCalls.some(c =>
      (c.toolId === "web_search" || c.toolId === "expert") && /tariff|canada/i.test(c.prompt)
    );
    const usedCalculatorForMargin = toolCalls.some(c =>
      c.toolId === "calculator" && /margin|shipping|aov/i.test(c.prompt)
    );
    processQuality += usedSearchOrExpertOnTariff ? 35 : 0;
    processQuality += usedCalculatorForMargin ? 15 : 0;
    processQuality += toolCalls.length >= 3 ? 15 : toolCalls.length >= 1 ? 5 : 0;
    processQuality = Math.min(100, processQuality);

    if (processQuality > 0) {
      feedback.push({ dim: "Process", good: true, note: `Good news: your process work (${plannedSteps} plan steps, ${toolCalls.length} tool calls) still earned process quality points. You just need to write the memo.` });
    }

    const tokensSpent = toolCalls.reduce((s, c) => s + (c.cost || 0), 0);
    const budget = scenario.budgetTokens || 100;
    const tokensLeft = Math.max(0, budget - tokensSpent);
    const skillScores = computeSkillScores(scenario, run, { rubricScores, outputQuality: 0, processQuality });
    const composite = Math.round(processQuality * 0.30);

    return {
      rubricScores, outputQuality: 0, processQuality: Math.round(processQuality),
      efficiency: 0, skillScores, composite, tier: "None", feedback, tokensSpent, tokensLeft
    };
  }

  // --- Very short submission warning ---
  if (wc < scenario.deliverable.minWords) {
    feedback.push({
      dim: "Length warning",
      good: false,
      note: `Memo is ${wc} words — well below the ${scenario.deliverable.minWords}-word minimum. Short memos have less opportunity to demonstrate data use, caveats, and structure.`
    });
  }

  // --- Per-dimension scoring (generic, data-driven) ---
  for (const dim of scenario.rubric.dimensions) {
    let score = 0;
    let good = false;
    let note = "";

    // Trap-linked dimensions: check if the player fell for or caught the trap
    if (dim.trapId) {
      const trap = (scenario.traps || []).find(t => t.id === dim.trapId);
      const trapKeywords = trap ? getTrapKeywords(trap) : [];
      const mentionsTrap = trapKeywords.length > 0 && containsAny(memo, trapKeywords);
      const refutesOrFlags = containsAny(memo, [
        // Scenarios 1-3 (basic AI literacy)
        "phishing", "scam", "spam", "skip", "flag", "do not reply", "don't reply",
        "escalate", "legal team", "legal department", "do not draft",
        "unverified", "debunked", "false", "no tariff", "no new tariff",
        "rumor", "rumour", "could not confirm", "not accurate",
        "french agent", "french-speaking", "escalate to french",
        "coming soon", "not finalized", "TBD", "to be decided", "pending",
        "pricing details coming", "once decided", "await", "placeholder",
        "outdated", "months old", "stale", "not updated", "may be outdated",
        // Scenario 4 — code review
        "sql injection", "parameterized", "string interpolation", "string concatenation",
        "deprecated", "breaking change", "v8", "version mismatch", "incompatible",
        "off-by-one", "off by one", "page - 1", "page minus 1",
        "reject", "request changes", "do not merge", "do not approve",
        "vulnerability", "security flaw", "insecure",
        // Scenario 5 — agent spec
        "must not diagnose", "no medical advice", "cannot provide medical",
        "human physician", "clinician review", "clinical judgment", "clinical review",
        "unrealistic", "not achievable", "cannot guarantee", "confidence threshold",
        "human-in-the-loop", "human review required", "human oversight",
        // Scenario 6 — automation audit
        "training data", "contaminated", "model-generated labels", "label quality",
        "data contamination", "feedback loop", "model collapse",
        "retrain", "clean labels", "human-verified labels", "relabel",
        "test set bias", "evaluation contamination", "data leakage",
        "false positive", "correctly classified", "defensible",
        "mixed invoice", "dominant cost",
        // Scenario 7 — agentic handoff (code fixes)
        "process.env", "environment variable", "env var", "never hardcode",
        "bcrypt.compare", "compare(password", "await bcrypt",
        "don't log password", "never log password", "sanitize log", "redact",
        "remove req.body", "do not log req.body"
      ]);

      if (!mentionsTrap && !refutesOrFlags) {
        // Didn't engage — partial credit (might have correctly ignored it)
        score = 70; good = true;
        note = `${dim.name}: Not referenced (which may be fine if intentionally avoided).`;
      } else if (refutesOrFlags) {
        score = 100; good = true;
        note = `${dim.name}: Correctly identified and handled.`;
      } else {
        // Mentioned trap content without refuting
        score = 15; good = false;
        note = `${dim.name}: Appears to have been missed — ${dim.description}`;
      }
    }
    // Keyword-based dimensions
    else if (dim.keywords) {
      const positiveHits = (dim.keywords.positive || []).filter(k => memoLower.includes(k.toLowerCase())).length;
      const totalPositive = (dim.keywords.positive || []).length;
      if (totalPositive > 5) {
        // High-count keyword lists (like completeness): score by coverage ratio
        const coverage = positiveHits / Math.min(totalPositive, 8);
        score = Math.min(100, Math.round(20 + coverage * 80));
        good = coverage >= 0.5;
        note = `${dim.name}: Referenced ${positiveHits} of ${totalPositive} expected items.`;
      } else {
        // Low-count keyword lists: any hit is good
        score = positiveHits > 0 ? Math.min(100, 30 + positiveHits * 25) : 25;
        good = positiveHits >= 1;
        note = good
          ? `${dim.name}: ${positiveHits} relevant reference(s) found.`
          : `${dim.name}: Missing expected content — ${dim.description}`;
      }
    }
    // Default fallback (no keywords, no trap — use basic heuristics)
    else {
      const inRange = wc >= scenario.deliverable.minWords && wc <= scenario.deliverable.maxWords;
      const tooShort = wc < scenario.deliverable.minWords;
      const tooLong = wc > scenario.deliverable.maxWords;
      const hasStructure = /#\d|ticket|category|action|draft|escalate|skip|recommendation|reason|risk|assumption/i.test(memo);
      if (inRange && hasStructure) score = 100;
      else if (inRange || hasStructure) score = 65;
      else if (tooShort && wc > 0) score = Math.max(10, Math.round((wc / scenario.deliverable.minWords) * 40));
      else score = 30;
      good = score >= 70;
      let lengthNote = `Length: ${wc} words (target ${scenario.deliverable.minWords}-${scenario.deliverable.maxWords}).`;
      if (tooShort) lengthNote += " Too short to fully address the brief.";
      else if (tooLong) lengthNote += " Over the word limit — tighter editing recommended.";
      note = `${dim.name}: ${lengthNote} ${hasStructure ? "Good structure detected." : "Consider using clear organization (numbered items, headings, etc.)."}`;
    }

    rubricScores[dim.id] = { score, weight: dim.weight, name: dim.name };
    feedback.push({ dim: dim.name, good, note });
  }

  // Helper: derive search keywords from a trap's description for checking if the player fell for it
  function getTrapKeywords(trap) {
    switch (trap.id) {
      case "tariff_hallucination": return ["40%", "40 percent", "tariff"];
      case "phishing_reply": return ["verified your credentials", "account has been secured", "re-enter"];
      case "legal_response": return ["offer you a full refund", "cover your medical", "goodwill gesture", "settlement"];
      case "french_mishandle": return []; // hard to detect; rely on refutes check
      case "pricing_leak": return ["$299", "$199", "free for enterprise", "included in enterprise", "paid add-on"];
      case "outdated_competitor": return []; // rely on refutes check for noting staleness
      // Agentic scenarios — code review
      case "sql_injection": return []; // rely on refutes (player catches it by flagging it)
      case "deprecated_api": return []; // rely on refutes
      case "off_by_one": return []; // rely on refutes
      // Agentic scenarios — agent spec
      case "medical_advice_trap": return []; // rely on refutes
      case "accuracy_guarantee_trap": return ["99.9% accuracy", "guarantee 99.9"];
      // Agentic scenarios — automation audit
      case "surface_fix_trap": return ["adjust threshold", "add rule", "vendor-specific rule", "keyword filter"];
      case "false_positive_trap": return []; // rely on refutes (player noting it's defensible)
      // Agentic scenarios — handoff (prefilled code)
      case "hardcoded_secret": return ["kestrel-finance-2024-xK9mP2vL8nQ"];
      case "bcrypt_misuse": return ["password === user.rows[0].password_hash"];
      case "password_logging": return ["body: req.body"];
      default: return [];
    }
  }

  // --- Output quality composite ---
  const outputQuality = Object.values(rubricScores)
    .reduce((sum, r) => sum + r.score * r.weight, 0);

  // --- Process quality (did the player plan, verify, etc.) ---
  const plannedSteps = (run.plan || []).length;
  const toolCalls = run.toolCalls || [];
  const usedSearchOrExpertOnTariff = toolCalls.some(c =>
    (c.toolId === "web_search" || c.toolId === "expert") &&
    /tariff|canada/i.test(c.prompt)
  );
  const usedCalculatorForMargin = toolCalls.some(c =>
    c.toolId === "calculator" && /margin|shipping|aov/i.test(c.prompt)
  );

  let processQuality = 0;
  processQuality += plannedSteps >= 3 ? 35 : plannedSteps >= 1 ? 15 : 0;
  processQuality += usedSearchOrExpertOnTariff ? 35 : 0;
  processQuality += usedCalculatorForMargin ? 15 : 0;
  processQuality += toolCalls.length >= 3 ? 15 : toolCalls.length >= 1 ? 5 : 0;
  processQuality = Math.min(100, processQuality);

  // --- Efficiency (tokens remaining of the budget) ---
  const tokensSpent = toolCalls.reduce((s, c) => s + (c.cost || 0), 0);
  const budget = scenario.budgetTokens || 100;
  const tokensLeft = Math.max(0, budget - tokensSpent);
  // Efficiency only counts if output quality is decent — prevents "did nothing, saved everything"
  const efficiency = outputQuality >= 60 ? Math.round((tokensLeft / budget) * 100) : 0;

  // --- Skill sub-scores ---
  const skillScores = computeSkillScores(scenario, run, { rubricScores, outputQuality, processQuality });

  // --- Composite ---
  const composite = Math.round(
    outputQuality * 0.55 + processQuality * 0.30 + efficiency * 0.15
  );

  // --- Tier ---
  const minSkill = Math.min(...Object.values(skillScores));
  let tier = "None";
  if (composite >= 90 && minSkill >= 50) tier = "Gold";
  else if (composite >= 75 && minSkill >= 50) tier = "Silver";
  else if (composite >= 60 && minSkill >= 50) tier = "Bronze";

  return {
    rubricScores,
    outputQuality: Math.round(outputQuality),
    processQuality: Math.round(processQuality),
    efficiency,
    skillScores,
    composite,
    tier,
    feedback,
    tokensSpent,
    tokensLeft
  };
}

function computeSkillScores(scenario, run, ctx) {
  const toolCalls = run.toolCalls || [];
  const memo = run.submissions[scenario.deliverable.id] || "";
  const memoLower = memo.toLowerCase();

  // ---- Prompt engineering: average length & specificity ----
  let prompt = 0;
  if (toolCalls.length > 0) {
    const avgLen = toolCalls.reduce((s, c) => s + (c.prompt || "").length, 0) / toolCalls.length;
    const specific = toolCalls.filter(c => (c.prompt || "").length > 30).length;
    prompt = Math.min(100, Math.round(30 + (avgLen / 3) + specific * 8));
  }

  // ---- Critical evaluation: average score of all trap-linked rubric dims ----
  const trapDims = scenario.rubric.dimensions.filter(d => d.trapId);
  let evaluation = 50;
  if (trapDims.length > 0) {
    evaluation = Math.round(
      trapDims.reduce((sum, d) => sum + (ctx.rubricScores[d.id]?.score || 0), 0) / trapDims.length
    );
  }

  // ---- Task decomposition: plan length + whether plan covered key phases ----
  const plan = run.plan || [];
  const joined = plan.map(p => (p.text || "").toLowerCase()).join(" ");
  let decomp = 0;
  decomp += plan.length >= 3 ? 40 : plan.length * 12;
  // Generic phases that apply to any scenario
  if (/read|review|understand|assess/.test(joined)) decomp += 15;
  if (/verify|check|confirm|research|identify/.test(joined)) decomp += 15;
  if (/draft|write|compose|create|respond/.test(joined)) decomp += 15;
  if (/classify|triage|categorize|sort|organize/.test(joined)) decomp += 15;
  if (/recommend|decide|conclusion|submit|finalize/.test(joined)) decomp += 10;
  decomp = Math.min(100, decomp);

  // ---- Tool selection: right tool for right task ----
  let selection = 40; // baseline
  const uniqueTools = new Set(toolCalls.map(c => c.toolId));
  // Using multiple different tools is a good sign
  selection += Math.min(20, uniqueTools.size * 7);

  // Scenario-specific bonuses (driven by data, not hardcoded to one scenario)
  if (toolCalls.some(c => c.toolId === "web_search")) selection += 10;
  if (toolCalls.some(c => c.toolId === "calculator" && /margin|shipping|cost|break|payback|percent|ratio|split|total|error rate/i.test(c.prompt))) selection += 10;
  if (toolCalls.some(c => c.toolId === "translator")) selection += 10;
  if (toolCalls.some(c => c.toolId === "code_analyzer")) selection += 10;
  if (toolCalls.some(c => c.toolId === "log_analyzer")) selection += 10;
  if (toolCalls.some(c => c.toolId === "expert")) selection += 5;

  // Penalties for bad tool choices
  if (toolCalls.some(c => c.toolId === "chat_llm" && /\b\d+\s*[\+\-\*\/]\s*\d+/.test(c.prompt))) selection -= 15; // math in chat
  // Using chat LLM to translate when a translator tool exists
  if (scenario.workbenchTools.some(t => t.id === "translator") &&
      toolCalls.some(c => c.toolId === "chat_llm" && /translat|french|español|deutsch/i.test(c.prompt)) &&
      !toolCalls.some(c => c.toolId === "translator")) selection -= 10;
  // Using chat LLM for code analysis when code_analyzer exists
  if (scenario.workbenchTools.some(t => t.id === "code_analyzer") &&
      toolCalls.some(c => c.toolId === "chat_llm" && /security|vulnerab|bug|analyz|static/i.test(c.prompt)) &&
      !toolCalls.some(c => c.toolId === "code_analyzer")) selection -= 10;

  selection = Math.max(0, Math.min(100, selection));

  return {
    prompt_engineering: prompt,
    critical_evaluation: evaluation,
    task_decomposition: decomp,
    tool_selection: selection
  };
}

/* -------------------------------- Workbench -------------------------------- */

/**
 * Pick a scripted response for a tool+prompt using keyword matching.
 * Scored by "how many expected keywords are hit".
 */
function pickScriptedResponse(scenario, toolId, prompt) {
  const pLower = (prompt || "").toLowerCase();
  const candidates = (scenario.scriptedResponses || []).filter(r => r.toolId === toolId);
  if (!candidates.length) return null;

  let best = null;
  let bestScore = 0;
  for (const c of candidates) {
    const hits = (c.promptKeywords || []).filter(k => pLower.includes(k.toLowerCase())).length;
    if (hits > bestScore) { bestScore = hits; best = c; }
  }
  if (bestScore === 0) return null;
  return best;
}

let _defaultCounters = {};

function defaultResponse(tool) {
  const pool = DEFAULT_RESPONSES[tool.id] || ["No response."];
  const idx = (_defaultCounters[tool.id] || 0) % pool.length;
  _defaultCounters[tool.id] = idx + 1;
  return pool[idx];
}

function ScenarioWorkspace({ scenario, onFinish, onExit }) {
  const [selectedEmail, setSelectedEmail] = useState(scenario.inbox[0]?.id);
  const [selectedFile, setSelectedFile] = useState(null);
  const [leftTab, setLeftTab] = useState("inbox"); // inbox | files
  const [memo, setMemo] = useState(scenario.deliverable.prefill || "");
  const [plan, setPlan] = useState([]);
  const [planOpen, setPlanOpen] = useState(false);
  const [toolCalls, setToolCalls] = useState([]);
  const [tokensSpent, setTokensSpent] = useState(0);
  const [wbTool, setWbTool] = useState(scenario.workbenchTools[0].id);
  const [wbPrompt, setWbPrompt] = useState("");
  const [wbHistory, setWbHistory] = useState([]); // {role, toolId, content}
  const [submitting, setSubmitting] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [showScoringInfo, setShowScoringInfo] = useState(false);

  const budget = scenario.budgetTokens || 100;
  const tokensLeft = budget - tokensSpent;

  const currentTool = scenario.workbenchTools.find(t => t.id === wbTool);
  const selectedEmailObj = scenario.inbox.find(e => e.id === selectedEmail);
  const selectedFileObj = scenario.files.find(f => f.id === selectedFile);

  const wc = wordCount(memo);

  const runTool = useCallback(() => {
    if (!wbPrompt.trim() || !currentTool) return;
    if (tokensLeft < currentTool.costPerUse) {
      setWbHistory(h => [...h, { role: "system", content: `Not enough budget to run ${currentTool.name}. (${currentTool.costPerUse} needed, ${tokensLeft} left)` }]);
      return;
    }
    const scripted = pickScriptedResponse(scenario, currentTool.id, wbPrompt);
    const response = scripted ? scripted.response : defaultResponse(currentTool);
    const call = {
      toolId: currentTool.id,
      toolName: currentTool.name,
      prompt: wbPrompt,
      response,
      cost: currentTool.costPerUse,
      isHallucination: !!(scripted && scripted.isHallucination),
      trapId: scripted?.trapId || null
    };
    setToolCalls(prev => [...prev, call]);
    setTokensSpent(prev => prev + currentTool.costPerUse);
    setWbHistory(h => [...h,
      { role: "user", toolId: currentTool.id, content: wbPrompt },
      { role: "tool", toolId: currentTool.id, content: response, isHallucination: call.isHallucination }
    ]);
    setWbPrompt("");
  }, [wbPrompt, currentTool, tokensLeft, scenario]);

  const addPlanStep = (text) => {
    if (!text.trim()) return;
    setPlan(p => [...p, { id: Date.now() + Math.random(), text }]);
  };

  const removePlanStep = (id) => setPlan(p => p.filter(x => x.id !== id));

  const trySubmit = () => {
    const isShort = wc < scenario.deliverable.minWords;
    const isEmpty = wc === 0;
    if (isEmpty || isShort) {
      setShowConfirm(true);
      return;
    }
    doSubmit();
  };

  const doSubmit = () => {
    setSubmitting(true);
    setShowConfirm(false);
    const run = {
      scenarioId: scenario.id,
      plan,
      toolCalls,
      submissions: { [scenario.deliverable.id]: memo }
    };
    const result = scoreRun(scenario, run);
    onFinish(result, run);
  };

  return (
    <div className="h-full flex flex-col">
      {/* top bar */}
      <div className="flex items-center justify-between px-4 py-2 border-b border-[rgba(242,233,216,0.08)] bg-[#242e3d]">
        <div className="flex items-center gap-3">
          <button onClick={onExit} className="text-[#7e7a72] hover:text-[#f2e9d8] text-sm">← Exit</button>
          <div className="text-sm font-semibold text-[#f2e9d8]">{scenario.title}</div>
          <Tag tone="slate">{scenario.client}</Tag>
        </div>
        <div className="flex items-center gap-3">
          <Tag tone={tokensLeft < 20 ? "rose" : "emerald"}>Budget: {tokensLeft}/{budget}</Tag>
          <button
            onClick={() => setShowScoringInfo(true)}
            title="How scoring works"
            className="w-7 h-7 rounded-full border border-[rgba(158,158,255,0.3)] bg-[rgba(158,158,255,0.15)] hover:bg-[rgba(158,158,255,0.25)] text-[#9e9eff] flex items-center justify-center text-sm font-bold transition"
          >ℹ</button>
          <Button variant="ghost" onClick={() => setPlanOpen(true)}>Planner ({plan.length})</Button>
          <Button onClick={trySubmit} disabled={submitting}>Submit deliverable</Button>
        </div>
      </div>

      {/* 3 panels */}
      <div className="flex-1 min-h-0 grid grid-cols-12 gap-3 p-3">
        {/* LEFT: inbox / files */}
        <div className="col-span-3 min-h-0 flex flex-col gap-3">
          <div className="flex gap-2">
            <Button variant={leftTab === "inbox" ? "primary" : "ghost"} onClick={() => setLeftTab("inbox")}>Inbox ({scenario.inbox.length})</Button>
            <Button variant={leftTab === "files" ? "primary" : "ghost"} onClick={() => setLeftTab("files")}>Files ({scenario.files.length})</Button>
          </div>
          {leftTab === "inbox" ? (
            <Card title="Inbox" className="flex-1">
              <div className="grid grid-rows-[auto_1fr] h-full min-h-0">
                <div className="border-b border-[rgba(242,233,216,0.08)] max-h-48 overflow-auto scrollbar">
                  {scenario.inbox.map(e => (
                    <button
                      key={e.id}
                      onClick={() => setSelectedEmail(e.id)}
                      className={classNames("block w-full text-left px-3 py-2 border-b border-[rgba(242,233,216,0.08)] hover:bg-[#2c3849]", selectedEmail === e.id && "bg-[rgba(77,211,254,0.1)] border-l-2 border-l-[#4dd3fe]")}
                    >

                      <div className="text-sm text-[#f2e9d8] truncate">{e.subject}</div>
                    </button>

                <div className="p-3 text-sm text-[#b8b0a0] overflow-auto scrollbar whitespace-pre-wrap">

                    >
                      <div className="text-sm text-[#f2e9d8] truncate">{f.name}</div>
                      <div className="text-xs text-[#7e7a72]">{f.type} · {f.reliability}</div>
                    </button>
                  ))}
                </div>
                <div className="p-3 text-xs text-[#b8b0a0] overflow-auto scrollbar whitespace-pre-wrap mono">
                  {selectedFileObj ? selectedFileObj.content : <div className="text-[#7e7a72]">Select a file.</div>}
                </div>
              </div>
            </Card>
          )}
        </div>

        {/* CENTER: briefing + editor */}
        <div className="col-span-6 min-h-0 flex flex-col gap-3">
          <Card title="Briefing" className="max-h-40">
            <div className="p-3 text-sm text-[#b8b0a0] overflow-auto scrollbar">{scenario.briefing}</div>
          </Card>
          <Card
            title={`Deliverable — ${scenario.deliverable.name}`}
            right={<span className={classNames("text-xs", wc > scenario.deliverable.maxWords ? "text-rose-400" : "text-[#b8b0a0]")}>{wc} / {scenario.deliverable.maxWords} words</span>}
            className="flex-1"
          >
            <div className="h-full flex flex-col">
              <div className="px-3 py-2 text-xs text-[#7e7a72] border-b border-[rgba(242,233,216,0.08)]">{scenario.deliverable.instructions}</div>
              <textarea
                value={memo}
                onChange={(e) => setMemo(e.target.value)}
                placeholder={scenario.deliverable.prefill ? "Review and edit the code below…" : "Draft your memo here…"}
                className={classNames("flex-1 w-full bg-transparent p-3 text-sm text-[#f2e9d8] outline-none resize-none scrollbar", scenario.deliverable.prefill && "mono text-[13px] leading-relaxed")}
              />
            </div>
          </Card>
        </div>

        {/* RIGHT: AI workbench */}
        <div className="col-span-3 min-h-0">
          <Card title="AI Workbench" className="h-full">
            <div className="h-full flex flex-col">
              <div className="p-2 border-b border-[rgba(242,233,216,0.08)] flex flex-wrap gap-1">
                {scenario.workbenchTools.map(t => (
                  <button
                    key={t.id}
                    onClick={() => setWbTool(t.id)}
                    className={classNames(
                      "text-xs px-2 py-1 rounded border",
                      wbTool === t.id ? "bg-[#4dd3fe] border-[#4dd3fe] text-[#1a212b] font-semibold" : "bg-[#2c3849] border-[rgba(242,233,216,0.15)] text-[#b8b0a0] hover:border-[#4dd3fe] hover:text-[#f2e9d8]"
                    )}
                  >
                    {t.name} <span className="opacity-60">· {t.costPerUse}</span>
                  </button>
                ))}
              </div>
              <div className="px-3 py-2 text-xs text-[#7e7a72] border-b border-[rgba(242,233,216,0.08)]">{currentTool?.description}</div>

              <div className="flex-1 overflow-auto scrollbar p-3 space-y-3 text-sm">
                {wbHistory.length === 0 && (
                  <div className="text-[#7e7a72] text-xs">Pick a tool, write a prompt, and run it. Tools cost tokens from your budget.</div>
                )}
                {wbHistory.map((m, i) => (
                  <div key={i} className={classNames(
                    "rounded border p-2",
                    m.role === "user" && "bg-[#2c3849] border-[rgba(242,233,216,0.08)]",
                    m.role === "tool" && "bg-[#242e3d] border-[rgba(242,233,216,0.08)]",
                    m.role === "system" && "bg-[rgba(245,158,11,0.15)] border-[rgba(245,158,11,0.3)] text-[#f59e0b]"
                  )}>
                    <div className="text-[10px] uppercase tracking-wider text-[#7e7a72] mb-1">
                      {m.role === "user" ? `You → ${m.toolId}` : m.role === "tool" ? `${m.toolId}` : "system"}
                    </div>
                    <div className="whitespace-pre-wrap text-[#b8b0a0]">{m.content}</div>
                  </div>
                ))}
              </div>

              <div className="p-2 border-t border-[rgba(242,233,216,0.08)]">
                <textarea
                  value={wbPrompt}
                  onChange={(e) => setWbPrompt(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) runTool(); }}
                  placeholder={`Prompt the ${currentTool?.name}… (Ctrl/Cmd+Enter to run)`}
                  className="w-full bg-[#1a212b] border border-[rgba(242,233,216,0.08)] rounded p-2 text-sm text-[#f2e9d8] outline-none resize-none scrollbar focus:border-[#4dd3fe]"
                  rows={2}
                />
                <div className="flex items-center justify-between mt-1">
                  <div className="text-xs text-[#7e7a72]">Cost: {currentTool?.costPerUse} · Remaining: {tokensLeft}</div>
                  <Button onClick={runTool} disabled={!wbPrompt.trim() || tokensLeft < (currentTool?.costPerUse || 0)}>Run</Button>
                </div>
              </div>
            </div>
          </Card>
        </div>
      </div>

      {planOpen && (
        <PlannerModal
          plan={plan}
          onAdd={addPlanStep}
          onRemove={removePlanStep}
          onClose={() => setPlanOpen(false)}
        />
      )}

      {showConfirm && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
          <div className="bg-[#242e3d] border border-[rgba(242,233,216,0.15)] rounded-lg w-full max-w-md">
            <div className="px-4 py-3 border-b border-[rgba(242,233,216,0.08)]">
              <div className="font-semibold text-[#f2e9d8]">Submit early?</div>
            </div>
            <div className="p-4 space-y-3">
              {wc === 0 ? (
                <p className="text-sm text-[#b8b0a0]">
                  Your deliverable is <span className="text-rose-400 font-medium">empty</span>. You'll be scored on whatever you have — including nothing. Your process (plan, tool usage) will still be evaluated.
                </p>
              ) : (
                <p className="text-sm text-[#b8b0a0]">
                  Your deliverable is <span className="text-amber-400 font-medium">{wc} words</span> (target: {scenario.deliverable.minWords}-{scenario.deliverable.maxWords}). Shorter memos may score lower on the structure and content dimensions, but you'll be scored on whatever you have.
                </p>
              )}
              <div className="flex items-center gap-2">
                <Tag tone={wc === 0 ? "rose" : "amber"}>{wc} words</Tag>
                <Tag tone="slate">{plan.length} plan steps</Tag>
                <Tag tone="slate">{toolCalls.length} tool calls</Tag>
                <Tag tone="slate">{tokensLeft} budget left</Tag>
              </div>
            </div>
            <div className="px-4 py-3 border-t border-[rgba(242,233,216,0.08)] flex justify-end gap-2">
              <Button variant="ghost" onClick={() => setShowConfirm(false)}>Keep working</Button>
              <Button onClick={doSubmit}>Submit anyway</Button>
            </div>
          </div>
        </div>
      )}

      {showScoringInfo && (
        <ScoringInfoModal scenario={scenario} onClose={() => setShowScoringInfo(false)} />
      )}
    </div>
  );
}

              <div className="space-y-3">
                <div className="bg-[#2c3849] border border-[rgba(242,233,216,0.08)] rounded p-3">
                  <div className="font-medium text-[#f2e9d8] mb-1">Prompt Engineering</div>
                  <div className="text-[#b8b0a0] text-xs">Measures average prompt length and specificity across all tool calls. Longer, more specific prompts (30+ chars) score higher. Formula: 30 + (avgLength / 3) + (specificPrompts × 8), capped at 100.</div>
                </div>

                <div className="bg-[#2c3849] border border-[rgba(242,233,216,0.08)] rounded p-3">
                  <div className="font-medium text-[#f2e9d8] mb-1">Critical Evaluation</div>
                  <div className="text-[#b8b0a0] text-xs">Average score of all trap-linked rubric dimensions. If the scenario has 2 traps and you caught one but fell for another, your score is (100 + 15) / 2 = 57.5. This is the hardest skill to max out.</div>
                </div>

                <div className="bg-[#2c3849] border border-[rgba(242,233,216,0.08)] rounded p-3">
                  <div className="font-medium text-[#f2e9d8] mb-1">Task Decomposition</div>
                  <div className="text-[#b8b0a0] text-xs">Based on plan steps (3+ = 40 pts) and whether plan text mentions key phases: review/understand (+15), verify/check (+15), draft/write (+15), classify/triage (+15), recommend/finalize (+10). Max 100.</div>
                </div>

                <div className="bg-[#2c3849] border border-[rgba(242,233,216,0.08)] rounded p-3">
                  <div className="font-medium text-[#f2e9d8] mb-1">Tool Selection</div>
                  <div className="text-[#b8b0a0] text-xs">Baseline 40 pts. Bonuses: using multiple tools (+7 each, max +20), using web search (+10), calculator for math (+10), translator (+10), expert (+5). Penalties: using chat LLM for arithmetic (−15), using chat instead of translator (−10).</div>
                </div>
              </div>
            </>
          )}
        </div>

        <div className="px-4 py-3 border-t border-[rgba(242,233,216,0.08)] flex justify-end shrink-0">
          <Button onClick={onClose}>Close</Button>
        </div>
      </div>
    </div>
  );
}

/* -------------------------------- Planner --------------------------------- */

function PlannerModal({ plan, onAdd, onRemove, onClose }) {
  const [text, setText] = useState("");
  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
      <div className="bg-[#242e3d] border border-[rgba(242,233,216,0.15)] rounded-lg w-full max-w-lg">
        <div className="flex items-center justify-between px-4 py-3 border-b border-[rgba(242,233,216,0.08)]">
          <div className="font-semibold text-[#f2e9d8]">Planner — break the task into steps</div>
          <button onClick={onClose} className="text-[#b8b0a0] hover:text-[#f2e9d8]">✕</button>
        </div>
        <div className="p-4 space-y-3">
          <p className="text-xs text-[#b8b0a0]">Good plans include: understanding the ask, verifying claims, gathering data, analyzing, drafting, and stating a recommendation.</p>
          <div className="flex gap-2">
            <input
              value={text}
              onChange={(e) => setText(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { onAdd(text); setText(""); } }}
              placeholder="Next step… (Enter to add)"
              className="flex-1 bg-[#1a212b] border border-[rgba(242,233,216,0.08)] rounded p-2 text-sm outline-none"
            />
            <Button onClick={() => { onAdd(text); setText(""); }}>Add</Button>
          </div>
          <ol className="space-y-1">
            {plan.map((p, i) => (
              <li key={p.id} className="flex items-start gap-2 text-sm bg-[#2c3849] rounded px-2 py-1">
                <span className="text-[#7e7a72]">{i + 1}.</span>
                <span className="flex-1">{p.text}</span>
                <button onClick={() => onRemove(p.id)} className="text-[#7e7a72] hover:text-rose-400">✕</button>
              </li>
            ))}
            {plan.length === 0 && <li className="text-xs text-[#7e7a72]">No steps yet.</li>}
          </ol>
        </div>
        <div className="px-4 py-3 border-t border-[rgba(242,233,216,0.08)] flex justify-end">
          <Button onClick={onClose}>Done</Button>
        </div>
      </div>
    </div>
  );
}

    Gold: "text-[#f59e0b]",
    Silver: "text-[#b8b0a0]",
    Bronze: "text-orange-400",
    None: "text-[#7e7a72]"
  }[result.tier];

  return (
    <div className="h-full overflow-auto scrollbar p-6">
      <div className="max-w-4xl mx-auto">
        <div className="flex items-center justify-between mb-6">
          <div>
            <div className="text-xs uppercase tracking-widest text-[#4dd3fe]">Scenario report</div>
            <div className="text-xl font-semibold text-[#f2e9d8]">{scenario.title}</div>
          </div>
          <div className="text-right">
            <div className="text-xs text-[#7e7a72]">Composite</div>
            <div className="text-4xl font-bold text-[#f2e9d8]">{result.composite}</div>
            <div className={classNames("text-sm font-semibold", tierColor)}>{result.tier} tier</div>
          </div>
        </div>

        {/* score dimensions */}
        <div className="grid grid-cols-3 gap-3 mb-6">
          <StatBox label="Output quality" value={result.outputQuality} />
          <StatBox label="Process quality" value={result.processQuality} />
          <StatBox label="Efficiency" value={result.efficiency} />
        </div>

        {/* skills */}
        <div className="bg-[#242e3d] border border-[rgba(242,233,216,0.08)] rounded-lg p-4 mb-6">
          <div className="text-xs uppercase tracking-wider text-[#7e7a72] mb-3">Skill breakdown</div>
          <div className="space-y-2">
            {Object.entries(result.skillScores).map(([k, v]) => (
              <SkillBar key={k} label={k.replace("_", " ")} value={v} />
            ))}
          </div>
        </div>

        {/* rubric feedback */}
        <div className="bg-[#242e3d] border border-[rgba(242,233,216,0.08)] rounded-lg p-4 mb-6">
          <div className="text-xs uppercase tracking-wider text-[#7e7a72] mb-3">Rubric feedback</div>
          <ul className="space-y-2">
            {result.feedback.map((f, i) => (
              <li key={i} className="flex items-start gap-2 text-sm text-[#b8b0a0]">
                <span className={classNames("mt-0.5", f.good ? "text-[#468254]" : "text-[#f43f5e]")}>{f.good ? "✓" : "✗"}</span>
                <div>
                  <div className="text-[#f2e9d8] font-medium">{f.dim}</div>
                  <div className="text-[#7e7a72]">{f.note}</div>
                </div>
              </li>
            ))}
          </ul>
        </div>

        {/* trap insights */}
        <div className="bg-[#242e3d] border border-[rgba(242,233,216,0.08)] rounded-lg p-4 mb-6">
          <div className="text-xs uppercase tracking-wider text-[#7e7a72] mb-3">What to look out for next time</div>
          <ul className="text-sm text-[#b8b0a0] space-y-1 list-disc pl-5">
            <li>LLMs will confidently state false facts. Always verify numeric or legal claims with a more reliable source.</li>
            <li>Older reports (like the 2019 market report) can anchor your thinking on outdated numbers.</li>
            <li>Small, self-selected surveys are a weak signal — useful directionally, not as ground truth.</li>
            <li>Matching the tool to the task (calculator for math, search for facts, expert for judgment) saves budget and improves accuracy.</li>
          </ul>
        </div>

        <div className="flex gap-2">
          <Button onClick={onReplay}>Try again</Button>
          <Button variant="ghost" onClick={onExit}>Back to hub</Button>
        </div>
      </div>
    </div>
  );
}

function StatBox({ label, value }) {
  return (
    <div className="bg-[#242e3d] border border-[rgba(242,233,216,0.08)] rounded-lg p-4">
      <div className="text-xs uppercase tracking-wider text-[#7e7a72]">{label}</div>
      <div className="text-2xl font-semibold text-[#f2e9d8]">{value}</div>
    </div>
  );
}

function SkillBar({ label, value }) {
  const color = value >= 75 ? "bg-[#468254]" : value >= 50 ? "bg-[#4dd3fe]" : "bg-[#f43f5e]";
  return (
    <div>
      <div className="flex justify-between text-xs text-[#7e7a72]"><span className="capitalize">{label}</span><span>{value}</span></div>
      <div className="h-2 bg-[#2c3849] rounded overflow-hidden mt-1">
        <div className={classNames("h-full", color)} style={{ width: `${Math.max(2, Math.min(100, value))}%` }} />
      </div>
    </div>
  );
}

/* ----------------------------------- App ---------------------------------- */

function App() {
  const [screen, setScreen] = useState("landing"); // landing | hub | scenario | report
  const [scenarios, setScenarios] = useState([]);
  const [loadError, setLoadError] = useState(null);
  const [activeScenario, setActiveScenario] = useState(null);
  const [result, setResult] = useState(null);
  const [run, setRun] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const all = [];
        for (const entry of SCENARIO_FILES) {
          all.push(await loadScenario(entry));
        }
        setScenarios(all);
      } catch (e) {
        setLoadError(e.message);
      }
    })();
  }, []);

  if (loadError) {
    return (
      <div className="h-full flex items-center justify-center p-6">
        <div className="max-w-lg text-sm text-[#b8b0a0] border border-rose-800 bg-rose-900/30 rounded-lg p-4">
          <div className="font-semibold text-[#f43f5e] mb-1">Could not load scenarios</div>
          <div className="text-[#b8b0a0] mb-2">{loadError}</div>
          <div className="text-xs text-[#7e7a72] mono">
            Run from this folder:<br />
            <span className="text-[#4dd3fe]">python3 -m http.server 8000</span><br />
            then open <span className="text-[#4dd3fe]">http://localhost:8000/ai_literacy_game.html</span>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "landing") {
    return <Landing onStart={() => setScreen("hub")} />;
  }
  if (screen === "hub") {
    return (
      <ScenarioHub
        scenarios={scenarios}
        onPick={(s) => { setActiveScenario(s); setScreen("scenario"); }}
      />
    );
  }
  if (screen === "scenario" && activeScenario) {
    return (
      <ScenarioWorkspace
        scenario={activeScenario}
        onFinish={(r, runData) => { setResult(r); setRun(runData); setScreen("report"); }}
        onExit={() => setScreen("hub")}
      />
    );
  }
  if (screen === "report" && activeScenario && result) {
    return (
      <Report
        scenario={activeScenario}
        result={result}
        run={run}
        onReplay={() => setScreen("scenario")}
        onExit={() => { setResult(null); setRun(null); setScreen("hub"); }}
      />
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
